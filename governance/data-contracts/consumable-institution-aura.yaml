    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      TRUE when the institution reports EADA (e.unitid IS NOT NULL).
      Observed: TRUE on 2,040 rows.
    dq_rules:
