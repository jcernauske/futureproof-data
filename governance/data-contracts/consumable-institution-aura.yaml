  - name: coverage_tier
    type: string
    required: true
    business_term: BT-AUR-COVERAGE-TIER  # proposed
    is_cde: true
    cde_rationale: >
      Closed-enum domain {both, finance_only, athletics_only}. Gates whether
      aura is computable (athletics_only rows always have NULL aura) and
      segments downstream confidence in the composite. Different from
      aura_score_basis (which records *which inputs computed the score*) —
      coverage_tier records *which sources contributed*. Both columns survive
      because they answer different consumer questions. Spec §6 explicitly
      lists coverage_tier in the schema and CON-AUR-005 P0 enforces the enum.
    is_pii: false
    pii_rationale: ""
    description: >
      3-value enum classifying which sources contributed to this row.
      'both' (1,492 / 46.3%): reports both IPEDS Finance AND EADA — earns
      'three_term' aura when endowment is present. 'finance_only' (1,183 /
      36.7%): reports IPEDS Finance only — non-athletic 4-years (most LACs/
      SLACs, MIT, Caltech, all for-profits without athletics). 'athletics_only'
      (548 / 17.0%): reports EADA only — institutions excluded from Finance
      by the HD ICLEVEL=1 AND HLOFFER>=5 filter; aura is NULL for these rows.
      CON-AUR-005 P0 enforces the closed enum; CON-AUR-006 P0 enforces that
      every row has at least one source TRUE.
    dq_rules:
      - CON-AUR-005
      - CON-AUR-006

  - name: promoted_at
    type: timestamp
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Consumable promotion batch timestamp. Identical across all 3,223 rows
      in a batch. Operational observability only. Distinct from upstream Base
      ingested_at stamps; downstream consumers needing per-zone freshness
      should reference the fully-qualified table name.
    dq_rules: []

