    of the pentagon (alongside ERN, ROI, GRW, RES). The pentagon shape encodes
    the brand-vs-outcome tension (high-aura/low-ERN vs high-aura/high-ERN).
  - Future MCP tools (Gemma-callable) — aura_score and aura_score_basis
    surfaced via tool responses; basis controls hedging language.
  - Future cross-institution comparison specs — composite signal for
    institution clustering or cohort selection.

