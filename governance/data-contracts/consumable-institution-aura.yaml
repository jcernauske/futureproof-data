reviewer_conditions:
  governance_reviewer_v1_eda_finalization_2026_04_30:
    source: governance/eda/consumable-institution-aura-eda.md ("v1 Promotion Decision" section)
    status: IMPLEMENTED HERE
    description: >
      The EDA promoted the aura formula from v0-draft → v1 on 2026-04-30 with
      three prerequisite spec edits: (1) aura_score_basis enum expansion 3 → 5
      values; (2) CON-AUR-030 stratification key switch from coverage_tier to
      aura_score_basis; (3) population-level P5/P95 rescale bounds (0.1413 /
      0.9400) pinned as constants in the gold transformer with annual-refresh
      recomputation. All three edits are implemented in the landed schema and
      DQ rules; this contract documents them explicitly.
  governance_reviewer_option_c_amendment_2026_04_30:
    source: docs/specs/full-pipeline-eada.md §5 Option-C amendment
    status: IMPLEMENTED HERE
    description: >
      The §5 Option-C amendment introduced athletic_fte_source as a column
      on base.eada and threaded it through to consumable.institution_aura
      so downstream consumers can stratify on FTE-denominator methodology.
      The column is flagged CDE per spec §6 Data Contract amendment 2026-04-30.
      EDA Item 7 verified the 2 × 3 (aura_score_basis × athletic_fte_source)
      interaction grid is structurally degenerate — every aura-computed row
      uses 'ipeds_finance' as its FTE source — so CON-AUR-030 stratifies
      by aura_score_basis (4 strata), NOT by athletic_fte_source.
  con_aur_011_rewrite:
    source: governance/dq-rules/consumable-institution-aura.json
    status: IMPLEMENTED HERE
    description: >
      Spec-as-written CON-AUR-011 used the legacy shorthand 'aura_score IS
      NULL exactly when has_ipeds_finance = FALSE'. EDA discovered 31 zero-
      instruction-expense edge cases that have has_ipeds_finance=TRUE but
      no usable aura signal (zero-instruction → NULL marketing_ratio →
      NULL aura). The faithful invariant is 'aura_score IS NULL ⇔
      aura_score_basis IS NULL'. CON-AUR-011 was rewritten to enforce
      the basis-tagged form; CON-AUR-034 was added as the explicit-iff
      redundant enforcement of the same invariant.

breaking_changes:
  policy: >
    Semantic versioning. Breaking changes (column removal, rename, type
    change, grain change, reduction of the CDE set, relaxation of P0 DQ
    thresholds, change to the aura formula constants — WEIGHT_MAX / WEIGHT_MEAN
    / RAW_SCORE_P5 / RAW_SCORE_P95 — without bumping aura_score_version,
    expansion or contraction of the aura_score_basis enum, change to the
    coverage_tier enum, change to the athletic_fte_source enum) require a new
    major version and 30-day deprecation notice. A change to the aura formula
    constants WITH a version bump (e.g., 'v1' → 'v2') is non-breaking
    schema-wise but changes the semantic meaning of aura_score; the version
    stamp is what protects downstream consumers from silent score-meaning
    drift. Non-breaking changes (column addition, description update,
    recalibrating the CON-AUR-021 cross-source coverage floor when a new
    cycle changes the actual coverage rate, recomputing the P5/P95 bounds
    on annual refresh as long as the aura_score_version is bumped, extending
    the data vintage to add a new cycle) ship as a minor bump without
    deprecation.
  notification: "Logged in governance/audit-trail/"

