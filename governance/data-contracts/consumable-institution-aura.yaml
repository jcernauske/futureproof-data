---
# Data Contract: consumable.institution_aura
# Spec: full-pipeline-eada (post-EDA v1 amendment + §5 Option-C amendment, 2026-04-30)
# Zone: Gold (Consumable) — first cross-source fusion in the FutureProof pipeline
# Status: draft (pending @bs:staff-engineer post-implementation sign-off)
# Tagged by: @cde-tagger (governance/cde-tagging/consumable-institution-aura.md, separate companion artifact)
# Documented by: @doc-generator
# Date: 2026-04-30
# Parent contracts:
#   - governance/data-contracts/consumable-ipeds-finance-profile.yaml (sibling consumable; reads from same base.ipeds_finance)
#   - (no separate base contracts authored — base.eada and base.ipeds_finance contracts are deferred per spec §8)
#
# NAMING NOTE: This file is named consumable-institution-aura.yaml per the project
# convention documented in governance/data-contracts/consumable-regional-price-parities.yaml:
# Gold/Consumable zone data contracts are named after the target Iceberg namespace
# (`consumable-<table>.yaml`), matching consumable-ipeds-finance-profile.yaml,
# consumable-regional-price-parities.yaml, consumable-career-outcomes.yaml,
# consumable-career-branches.yaml, consumable-program-career-paths.yaml, etc.

table: consumable.institution_aura
namespace: consumable
zone: gold
version: "1.0.0"
grain:
  - unitid
status: draft
record_count: 3223
data_vintage: >
  IPEDS Finance Survey FY2023 cycle (academic year 2022-23, fiscal year ending
  June 30 2023) FULL OUTER JOIN EADA 2022 reporting year on UNITID. The
  consumable is built from base.ipeds_finance (snapshot 1277941459950591173,
  2,675 rows) and base.eada (snapshot 973879610917339278, 2,040 rows).
  Coverage breakdown: both 1,492 (46.3%) / finance_only 1,183 (36.7%) /
  athletics_only 548 (17.0%). The aura_score is a v1 composite EDA-finalized
  2026-04-30 (rejected v0-draft after 11/14 anchor failures); v1 passes 13/13
  anchors at the §6-required aura_score >= 8 threshold. The aura_score_basis
  column expands the spec-as-written 3-value enum to 5 values during EDA after
  discovering 677 finance reporters with NULL endowment. The athletic_fte_source
  column was added via the §5 Option-C amendment 2026-04-30 to surface FTE-
  denominator methodology to downstream consumers (3 values: ipeds_finance /
  eada_fte_headcount / NULL).
source: >
  base.ipeds_finance (Silver) FULL OUTER JOIN base.eada (Silver) on UNITID.
  Cross-source fusion — first in the FutureProof pipeline that joins two
  distinct upstream Base tables on UNITID and produces a derived composite
  signal (aura_score). The consumable is NOT joined to any other consumable
  table at promote time — CON-AUR-020 / CON-AUR-021 are runtime DQ checks
  against consumable.career_outcomes, not promote-time joins.
spec_reference: docs/specs/full-pipeline-eada.md
parent_spec_reference: docs/specs/full-pipeline-eada.md
owner: "@bs:data-steward"
sla: >
  Annual refresh aligned with the upstream IPEDS Finance + EADA cadences (IPEDS
  Finance typically publishes in December for the previous fiscal year; EADA
  typically publishes in October for the previous reporting year). Consumable
  runs immediately after both Base refreshes. The full bronze->base->consumable
  promotion chain is idempotent and re-runnable.

quality_tier: >
  partial_verification — carried forward from the v1 EDA. 14/14 P0 DQ rules pass
  on the live snapshot 5887248523326294782; 4/5 P1 rules pass (CON-AUR-021 lands
  0.32 pp below the spec-pinned 90% cross-source coverage threshold; live
  measurement 89.68% — P1 warning, does NOT block the P0 gate). Aura score is
  validated against 14 EDA-pinned anchor schools spanning three classes (extreme
  endowment, extreme athletics, extreme marketing); 14/14 anchors match expected
  v1 scores exactly (CON-AUR-032). The per-row provenance controls are the
  aura_score_basis and athletic_fte_source columns (columns 15 and 11 of this
  contract), explicitly carried forward so downstream consumers can stratify or
  hedge cross-stratum comparisons. Every downstream consumer (the FutureProof
  career-outcomes pentagon, future MCP tools, future cross-institution
  comparison specs) is expected to read aura_score_basis and surface the
  appropriate hedging language at the row level rather than rely on the
  contract-level tier alone.

quality:
  row_count_guarantee: 3223
  row_count_tolerance_band: [2675, 4715]
  row_count_tolerance_note: >
    Hard guarantee: row count in [max(N_finance, N_eada), N_finance + N_eada]
    (CON-AUR-001 P0 FULL OUTER conservation invariant). Lower bound trips on
    silent INNER-degradation; upper bound trips on accidental cross-join
    multiplication. Live: 2,675 <= 3,223 <= 4,715. Soft band varies cycle-to-
    cycle within the Base count drift (typically +/- 10% on each side).
  null_guarantee: >
    Eight columns guaranteed 100% non-null (record_id, unitid, institution_name,
    aura_score_version, has_ipeds_finance, has_eada, coverage_tier,
    promoted_at). Eleven columns are NULLABLE by design (the four finance
    signals NULL on athletics-only rows; the three athletics signals NULL on
    finance-only rows; athletic_fte_source NULL on finance-only rows; the four
    aura columns aura_score / aura_score_continuous / aura_score_basis NULL
    together on the 579 rows with no usable signal). NULLs propagate honestly
    from Base through Consumable per the standing user constraint "no
    substitution-based degraded states."
  completeness_threshold: 0.62
  completeness_threshold_note: >
    62.0% on endowment_per_fte (1,998 / 3,223 — structural NULL on F3 + 548
    athletics-only rows); 82.0% on marketing_ratio (2,644 / 3,223 — 31 zero-
    instruction edge cases NULL); 63.3% on athletic_spend_per_fte (2,040 /
    3,223). 100% non-null on the eight identity / coverage / version /
    timestamp columns. The 62% contract-level threshold reflects the lowest-
    completeness aura input (endowment); per-column completeness is summarized
    by aura_score_basis at the row level.
  validity_threshold: 1.00
  validity_threshold_note: >
    100% validity on the four enums (coverage_tier ∈ {both, finance_only,
    athletics_only} via CON-AUR-005; aura_score_basis ∈ {three_term,
    two_term_finance_only, two_term_no_endowment, one_term_marketing_only}
    via CON-AUR-033; aura_score_version = 'v1' via CON-AUR-012;
    athletic_fte_source ∈ {ipeds_finance, eada_fte_headcount, none} —
    documented but not pinned via a P0 rule per spec §6).
    100% validity on arithmetic invariants (CON-AUR-007: marketing-ratio
    arithmetic identity within 0.001 — live observation differences within
    1e-6 across 2,620 rows; CON-AUR-013: aura_score = ROUND(aura_score_continuous)).
    100% validity on aura range (CON-AUR-010 / CON-AUR-014).
    100% validity on the iff-NULL invariant (CON-AUR-011 / CON-AUR-034:
    aura_score IS NULL ⇔ aura_score_basis IS NULL — replaces spec-as-written
    iff has_ipeds_finance = FALSE shorthand).
  uniqueness_guarantee:
    - "unitid is unique (3,223 distinct values) — CON-AUR-003 P0"
    - "record_id is unique (3,223 distinct values) — CON-AUR-004 P0"
  freshness_sla: >
    Annual IPEDS Finance + EADA publication cycle. Consumable runs after both
    Base refreshes complete. promoted_at is refreshed on every Consumable
    promote (identical across all 3,223 rows in a batch).
  cross_source_coverage:
    rule: ">= 90% of distinct UNITIDs in consumable.career_outcomes find a matching row here"
    measured: "89.68% (live 2026-05-01)"
    p1_floor: 0.90
    p1_rule_id: CON-AUR-021
    drift_cap_rule_id: CON-AUR-020
    drift_cap_value: 1611
    drift_cap_measured: 928
    note: >
      Spec pinned 90%; live measurement reveals 264 College Scorecard
      institutions with program-completion rows are absent from BOTH
      base.ipeds_finance and base.eada (mostly small religious / specialty /
      late-filer institutions, plus institutions that don't satisfy the
      ICLEVEL=1 AND HLOFFER>=5 4-year filter applied at the IPEDS Finance HD
      ingest). 0.32 pp below threshold — P1 warning, does NOT block P0 gate.
      @governance-reviewer to acknowledge as P1 and either (a) widen threshold
      to 0.89 with rationale, or (b) enumerate the 264 missing UNITIDs as
      documented drift in EDA. CON-AUR-020 (the inverse drift cap of 1,611)
      passes by margin (live 928).
  aura_score_distribution:
    overall_buckets_populated_floor: 6
    overall_buckets_measured: 10
    per_stratum_buckets_populated_floor: 4
    per_stratum_buckets_measured_min: 5
    p1_rule_id: CON-AUR-030
    median_band: [4, 7]
    median_measured: 7
    median_p1_rule_id: CON-AUR-031
    stratification_key: aura_score_basis
    stratification_count: 4
    stratification_note: >
      Stratification is by aura_score_basis (4 strata: three_term,
      two_term_finance_only, two_term_no_endowment, one_term_marketing_only),
      NOT by athletic_fte_source (which is structurally degenerate per EDA
      Item 7 — every aura-computed row uses 'ipeds_finance' as its FTE source;
      the 548 'eada_fte_headcount' rows never enter aura computation).
  anchor_validation:
    rule_id: CON-AUR-032
    anchor_count: 14
    anchors_passing: 14
    anchors:
      - {unitid: 166027, name: "Harvard",      class: "endowment", v1_score: 9}
      - {unitid: 186131, name: "Princeton",    class: "endowment", v1_score: 10}
      - {unitid: 243744, name: "Stanford",     class: "endowment", v1_score: 10}
      - {unitid: 166683, name: "MIT",          class: "endowment", v1_score: 9}
      - {unitid: 130794, name: "Yale",         class: "endowment", v1_score: 9}
      - {unitid: 198419, name: "Duke",         class: "endowment", v1_score: 9}
      - {unitid: 190415, name: "Cornell",      class: "endowment", v1_score: 9}
      - {unitid: 147767, name: "Northwestern", class: "endowment", v1_score: 9}
      - {unitid: 100751, name: "Alabama",      class: "athletics", v1_score: 9}
      - {unitid: 484613, name: "U Phoenix",    class: "marketing", v1_score: 10}
      - {unitid: 204796, name: "Ohio State",   class: "athletics", v1_score: 8}
      - {unitid: 170976, name: "Michigan",     class: "athletics", v1_score: 9}
      - {unitid: 104717, name: "Grand Canyon", class: "marketing", v1_score: 8}
