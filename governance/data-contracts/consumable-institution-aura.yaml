columns:
  - name: record_id
    type: string
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Deterministic Gold grain surrogate. Derived as
      compute_grain_id(row, ['unitid'], prefix='aur'). 3,223 distinct values,
      one per institution. Format: aur-<16 hex>. The 'aur' prefix is distinct
      from upstream Base prefixes (ipf, ead) and from the sibling consumable
      prefix (ifp) — no cross-zone hash collisions.
    dq_rules:
      - CON-AUR-004

  - name: unitid
    type: long
    required: true
    business_term: BT-001
    is_cde: true
    cde_rationale: >
      Primary key of the Consumable table and dedup grain for
      compute_grain_id(['unitid'], prefix='aur'). Join anchor for every
      downstream consumer (the FutureProof career-outcomes pentagon, future
      MCP tools, future cross-institution comparison specs). IPEDS UNITID is
      the universal institution identifier across the entire pipeline.
      Coalesced from base.ipeds_finance.unitid and base.eada.unitid (both
      sides P0 non-null upstream).
    is_pii: false
    pii_rationale: ""
    description: >
      The 6-digit IPEDS UNITID. COALESCE(f.unitid, e.unitid) from FULL OUTER.
      Natural key. The universal join key linking institution_aura to every
      other institution-keyed table in the pipeline.
    dq_rules:
      - CON-AUR-002
      - CON-AUR-003

  - name: institution_name
    type: string
    required: true
    business_term: BT-002
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      The official name of the institution. COALESCE(f.institution_name,
      e.institution_name) from FULL OUTER. Display-only — do not use for
      joins (case, punctuation, and -Main Campus suffix conventions vary
      across IPEDS sources).
    dq_rules: []

  - name: endowment_per_fte
    type: double
    required: false
    business_term: BT-IPF-PER-FTE
    is_cde: true
    cde_rationale: >
      Per-student endowment value — the "wealth backing" signal. Direct aura
      input (feeds rp_endowment in the v1 composite). Re-affirmed CDE from
      Base + sibling consumable.ipeds_finance_profile CDE set per spec §6
      Data Contract. NULL on F3 (structural — no F3H family on for-profit
      schedule) and on athletics-only rows.
    is_pii: false
    pii_rationale: ""
    description: >
      Per-student endowment value, promoted verbatim from
      base.ipeds_finance.endowment_per_fte. Computed at Base as
      endowment_value / total_fte_enrollment. Aura input feeds rp_endowment.
      Observed: 1,998 / 3,223 (62.0%) non-null.
    dq_rules: []

  - name: institutional_support_per_fte
    type: double
    required: false
    business_term: BT-IPF-PER-FTE
    is_cde: true
    cde_rationale: >
      Per-student spending on administration. Re-affirmed CDE from Base +
      sibling consumable.ipeds_finance_profile CDE set. NOT a direct aura
      input — the marketing-side aura input is marketing_ratio (which is
      derived from this column over instruction_per_fte); CON-AUR-007 cross-
      checks the arithmetic identity.
    is_pii: false
    pii_rationale: ""
    description: >
      Per-student administrative-and-overhead spending, promoted verbatim
      from base.ipeds_finance.institutional_support_per_fte. NOT a direct
      aura input. Observed: 62% non-null (NULL on athletics-only rows).
    dq_rules:
      - CON-AUR-007

  - name: instruction_per_fte
    type: double
    required: false
    business_term: BT-IPF-PER-FTE
    is_cde: true
    cde_rationale: >
      Per-student instructional spending. Re-affirmed CDE from Base + sibling
      consumable.ipeds_finance_profile CDE set. NOT a direct aura input.
    is_pii: false
    pii_rationale: ""
    description: >
      Per-student spending on instructional divisions, promoted verbatim from
      base.ipeds_finance.instruction_per_fte. NOT a direct aura input.
      Observed: 62% non-null.
    dq_rules:
      - CON-AUR-007

  - name: marketing_ratio
    type: double
    required: false
    business_term: BT-IPF-MARKETING-RATIO
    is_cde: true
    cde_rationale: >
      The most analytically loaded finance-side aura input — feeds
      rp_marketing in the v1 composite and is the only signal that produces
      non-NULL aura on the one_term_marketing_only basis (573 rows, mostly
      for-profits without athletics). Re-affirmed CDE from Base + sibling
      consumable. The CON-AUR-007 P0 invariant carries the arithmetic
      identity forward into this consumable.
    is_pii: false
    pii_rationale: ""
    description: >
      The dimensionless ratio of institutional support expenses to instruction
      expenses. Higher = more administrative spend relative to teaching.
      Promoted verbatim from base.ipeds_finance.marketing_ratio. Observed:
      82.0% non-null (2,644 / 3,223; 31 zero-instruction edge cases NULL).
      P5=0.183 / P50=0.545 / P95=2.345. Long pathological tail dominated by
      IPEDS reporting artifacts (system offices). Aura input feeds rp_marketing.
    dq_rules:
      - CON-AUR-007

  - name: athletic_spend_per_fte
    type: double
    required: false
    business_term: BT-AUR-ATHLETIC-SPEND-PER-FTE  # proposed; final ID @bs:data-steward's call
    is_cde: true
    cde_rationale: >
      Direct aura input (feeds rp_athletic in the v1 composite). New CDE at
      consumable per spec §6 Data Contract. FTE denominator provenance is
      stamped in athletic_fte_source — the two strata (ipeds_finance vs
      eada_fte_headcount) differ ~3x at the median, but only the
      ipeds_finance stratum enters aura computation per EDA Item 7.
    is_pii: false
    pii_rationale: ""
    description: >
      Per-student athletic-program expense. Sum of all sport-level athletic
      expenses divided by the FTE denominator declared in athletic_fte_source.
      Promoted verbatim from base.eada.athletic_spend_per_fte. Aura input
      feeds rp_athletic. Observed: 2,040 / 3,223 (63.3%) non-null;
      P5=$148 / P50=$1,579 / P95=$7,177.
    dq_rules: []

  - name: athletic_revenue_per_fte
    type: double
    required: false
    business_term: BT-AUR-ATHLETIC-REVENUE-PER-FTE  # proposed
    is_cde: true
    cde_rationale: >
      Surfaced as a CDE candidate per spec §6 (paired with athletic_spend_per_fte
      and athletic_subsidy_ratio). Context column only — NOT an aura input.
      Downstream consumers may compute custom revenue / spend ratios for
      "athletics is profitable" surfaces.
    is_pii: false
    pii_rationale: ""
    description: >
      Per-student athletic-program revenue, promoted verbatim from
      base.eada.athletic_revenue_per_fte. Context column only. Observed:
      63.3% non-null.
    dq_rules: []

  - name: athletic_subsidy_ratio
    type: double
    required: false
    business_term: BT-EAD-ATHLETIC-SUBSIDY-RATIO
    is_cde: true
    cde_rationale: >
      Surfaced as a CDE candidate per spec §6 because downstream consumers
      may want a "subsidy intensity" signal. CRITICAL: this is a CONTEXT
      column only — explicitly EXCLUDED from the aura composite per spec
      §2 Decision 11 (the ratio encodes a normative judgment that overlaps
      with ROI / ERN; including it in aura would remove the analytical
      tension between aura and the rest of the pentagon). EDA Item 6
      verified by code inspection of all four candidate formulas.
    is_pii: false
    pii_rationale: ""
    description: >
      The fraction of athletic expenses not covered by athletic revenue:
      (expenses - revenue) / expenses. Positive = institution subsidizes
      athletics; near-zero = self-sustaining; negative = profitable.
      Context column only — NOT an aura input. Observed: 1,284 / 2,040 rows
      are exactly 0 (silver-zone clipping artifact at the EADA grand-total
      grain — EADA convention requires reported revenues to at least equal
      expenses). Promoted verbatim from base.eada.athletic_subsidy_ratio.
    dq_rules: []

  - name: athletic_fte_source
    type: string
    required: false
    business_term: BT-AUR-FTE-SOURCE  # proposed
    is_cde: true
    cde_rationale: >
      Methodological-provenance CDE — affects how athletic_spend_per_fte,
      athletic_revenue_per_fte, and athletic_subsidy_ratio are interpreted
      across rows. Added to the CDE set via the §5 Option-C amendment
      2026-04-30 after the spec was amended to surface FTE-denominator
      methodology to downstream consumers. The two strata (ipeds_finance
      vs eada_fte_headcount) are NOT identical — IPEDS-Finance FTE is
      annualized, EADA's headcount is unduplicated 12-month — and athletic_
      spend_per_fte differs ~3x at the median between strata.
    is_pii: false
    pii_rationale: ""
    description: >
      Provenance for the FTE denominator behind the three EADA per-FTE /
      ratio columns. Enum: 'ipeds_finance' (1,492 rows, all coverage_tier=
      'both'; preferred — matches the IPEDS-Finance FTE used by the finance-
      side per-FTE columns in the same row), 'eada_fte_headcount' (548 rows,
      all coverage_tier='athletics_only'; EADA's own 12-month student
      headcount), 'none' / NULL (1,183 rows, all coverage_tier='finance_only';
      no EADA reporting). Pass-through from base.eada.fte_source.
      Surfaced for downstream stratification only — every aura-computed row
      uses ipeds_finance per EDA Item 7, so the methodology mix never affects
      the aura distribution.
    dq_rules: []

  - name: aura_score
    type: int
    required: false
    business_term: BT-AUR-AURA-SCORE  # proposed
    is_cde: true
    cde_rationale: >
      THE CORE consumer-facing signal of this consumable. Drives the fifth
      point of the FutureProof pentagon (alongside ERN, ROI, GRW, RES); will
      be surfaced via future MCP tools. Versioned via aura_score_version
      (currently 'v1'); EDA-finalized 2026-04-30 after v0-draft failed 11/14
      anchor schools. Validated against 14 anchor schools spanning three
      classes (extreme endowment, extreme athletics, extreme marketing);
      14/14 anchors match expected v1 scores exactly (CON-AUR-032).
      Critical disambiguation: HIGHER aura is NOT "better" — it is more brand
      presence. Whether brand gravity translates to good outcomes for students
      emerges only when aura is read alongside ERN and ROI.
    is_pii: false
    pii_rationale: ""
    description: >
      Integer 1-10 brand-gravity score, derived as ROUND(aura_score_continuous)
      where the continuous value comes from the v1 MAX+MEAN composite over
      the available rank-percentile inputs (marketing_ratio, endowment_per_fte,
      athletic_spend_per_fte). NULL when no usable signal — i.e., aura_score_
      basis IS NULL (CON-AUR-011 / CON-AUR-034 P0 invariant). Observed:
      2,644 / 3,223 non-null; integer 1..10 all 10 buckets populated; median = 7;
      band distribution [1,3]=17.4% / [4,6]=25.7% / [7,10]=56.9%.
    dq_rules:
      - CON-AUR-010
      - CON-AUR-011
      - CON-AUR-013
      - CON-AUR-030
      - CON-AUR-031
      - CON-AUR-032
      - CON-AUR-034

  - name: aura_score_continuous
    type: double
    required: false
    business_term: ""  # no separate term — same conceptual signal as aura_score
    is_cde: true
    cde_rationale: >
      Pre-rounding continuous value, retained for downstream auditability and
      for the CON-AUR-013 round-correctness invariant. Bumped to CDE because
      it is computationally upstream of aura_score and any deviation from
      ROUND(aura_score_continuous) would surface as a CON-AUR-013 P0 violation.
    is_pii: false
    pii_rationale: ""
    description: >
      Pre-rounding continuous value in [1.0, 10.0]. Computed as
      1.0 + 9.0 * clip((raw_score - 0.1413) / (0.9400 - 0.1413), 0, 1)
      where raw_score = 0.65 * MAX(available_rp_*) + 0.35 * MEAN(available_rp_*).
      The available_rp_* values are determined per-row by aura_score_basis.
      NULL when aura_score is NULL.
    dq_rules:
      - CON-AUR-013
      - CON-AUR-014

  - name: aura_score_version
    type: string
    required: true
    business_term: ""  # Brightsmith convention
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Provenance stamp identifying the formula version that produced the aura
      score. Always 'v1' for rows produced by this snapshot (CON-AUR-012 P0).
      v0-draft was rejected during EDA after failing 11/14 anchor schools
      (composite-collapse at the tails because three near-equal weights cap
      any one-signal-extreme school at ~7). The version stamp is for the
      *formula*, not the score-existence — every row carries 'v1' regardless
      of whether the score itself is NULL. A future v2 score (e.g., after a
      P5/P95 rebound on annual refresh, or a fourth signal addition) would
      land as a new aura_score_version stamp.
    dq_rules:
      - CON-AUR-012

  - name: aura_score_basis
    type: string
    required: false
    business_term: BT-AUR-AURA-SCORE-BASIS  # proposed
    is_cde: true
    cde_rationale: >
      Gates downstream interpretation of cross-stratum aura comparison —
      comparing a 'three_term' Stanford to a 'one_term_marketing_only'
      Phoenix is NOT apples-to-apples in the same way as comparing two
      'three_term' flagships. Downstream consumers (the pentagon UI, MCP
      tools, comparison specs) MUST read the basis when surfacing aura
      comparisons. The 5-value enum was expanded from spec-as-written 3
      values during EDA after discovering 677 finance reporters with NULL
      endowment.
    is_pii: false
    pii_rationale: ""
    description: >
      The 5-value enum (4 non-NULL + NULL) recording which input set was used
      to compute the aura score for this row. Values: 'three_term' (1,417
      rows; marketing + endowment + athletic), 'two_term_finance_only' (579
      rows; marketing + endowment, no EADA), 'two_term_no_endowment' (75 rows;
      marketing + athletic, NULL endowment — for-profits-with-athletics),
      'one_term_marketing_only' (573 rows; marketing only — for-profits
      without athletics, IPEDS shells), NULL (579 rows; aura_score itself
      is NULL). NULL ⇔ aura_score IS NULL (CON-AUR-034 P0).
    dq_rules:
      - CON-AUR-011
      - CON-AUR-030
      - CON-AUR-033
