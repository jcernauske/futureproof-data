    type: table
    description: >
      FK join on bls_soc_code for occupation-level context.
    contact: "@primary-agent"
    status: active
  - name: "base.onet_context_profiles"
    type: table
    description: >
      FK join on bls_soc_code for occupation-level context.
    contact: "@primary-agent"
    status: active
  - name: "base.onet_career_transitions"
    type: table
    description: >
      FK join on bls_soc_code (source and target) for occupation-level context.
    contact: "@primary-agent"
    status: active
  - name: "Gold zone career outcomes"
    type: table
    description: >
      Gold zone joins O*NET occupation data with BLS OOH and College Scorecard
      via bls_soc_code for career guidance stat generation.
    contact: "@primary-agent"
    status: planned
