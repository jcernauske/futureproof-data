    Zero PII across both tools and all 33 response fields. The NO-PII decision
    from governance/pii-scans/gold-regional-price-parities.md carries forward
    intact because: (1) every passthrough field is a state-level public
    jurisdiction identifier or macroeconomic aggregate; (2) cost_tier is a
    5-bucket lossy generalization of a non-PII aggregate and strictly
    increases k-anonymity; (3) adjusted_examples bundles reference values at
    fixed national anchors — NOT observed individual earnings; (4)
    adjusted_salary (tool 2) is a reference computation at a user-supplied
    anchor multiplied by a non-PII state-level multiplier — NOT observed
    individual earnings; the tool does not persist, log, or correlate the
    input salary with any subject identifier; (5) difference / difference_pct
    are arithmetic differences of such computations; (6) data_source is a
    row-level provenance enum with two values; (7) row_count and
    governance.* are framework operational metadata. k-anonymity floor
    remains ~584,000 (Wyoming). Sensitivity classification is `public`.

