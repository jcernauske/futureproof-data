# --------------------------------------------------------------------------
# Bronze staff-review Condition 7 closure
# --------------------------------------------------------------------------
bronze_condition_7:
  status: CLOSED AT MCP ZONE
  source: governance/approvals/raw-ingest-bea-rpp-staff-review.md
  description: >
    Bronze staff-review Condition 7 required two things of the MCP layer:
    (1) Every tool response must include a per-row verification_status
    (surfaced as data_source in the payload) so Gemma can hedge numeric
    precision when the underlying value is an estimate;
    (2) A strict mode (verified_only: true) on both tools must refuse to
    return rows where verification_status='estimate', returning a
    structured null result instead.
  closure_evidence:
    tool_1:
      data_source_field: "data.data_source (response field #9, CDE-flagged, renamed from verification_status)"
      strict_mode: "verified_only input parameter; MCP-BEA-007 pins 8/8 verified success, MCP-BEA-008 pins all 43 estimate refusals with 'strict' message"
    tool_2:
      data_source_fields:
        - "data.state_a.data_source (response field #7, CDE-flagged, renamed from verification_status)"
        - "data.state_b.data_source (response field #13, CDE-flagged, renamed from verification_status)"
      strict_mode: "verified_only input parameter; MCP-BEA-009 pins refusal when either state is non-verified with message containing 'Strict mode' and offending state name"
  gold_contract_obligation_discharged: >
    governance/data-contracts/consumable-regional-price-parities.yaml
    §staff_review_conditions.condition_7_carry_forward_to_mcp declared this
    a FORWARD-ONLY OBLIGATION owned by @primary-agent on the mcp-bea-rpp
    spec. This contract discharges it. The obligation is now fully closed
    across the Bronze → Silver → Gold → MCP chain.

