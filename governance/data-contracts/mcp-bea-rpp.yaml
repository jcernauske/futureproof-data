    → data_source rename, reduction of the CDE set, removal of strict mode,
    tightening of the unknown-state message contract, tightening of the
    8-state bea_official allow-list below 8 states) require a new major
    version and 30-day deprecation notice. Non-breaking changes (new
    optional input parameters, new response fields, description updates,
    eval set expansion, flipping the bea_official allow-list from 8 states
    to 51 states when the live BEA API refresh lands) ship as a minor bump
    without deprecation.
