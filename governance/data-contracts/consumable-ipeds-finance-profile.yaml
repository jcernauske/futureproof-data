# ────────────────────────────────────────────────────────────────────────
# CONSUMER GUIDANCE — v1.4 amendment
# ────────────────────────────────────────────────────────────────────────
# Per @fp-data-reviewer disclaimer-gap concern raised at v1.0 review and
# closed at v1.1 (see ipeds-finance-v1.4 §7), the contract carries
# interpretation-critical guidance VERBATIM at the contract layer (not just
# in field-level docstrings) so contract-reading downstream consumers
# receive the warnings programmatically without parsing column descriptions.
consumer_guidance:

  endowment_provenance:
    affected_columns:
      - endowment_value
      - endowment_value_provenance
      - endowment_per_fte
    severity: critical
    consumer_guidance_verbatim: >
      Consumers running longitudinal endowment analyses should filter to
      `endowment_value_provenance = 'R'` to limit to institution-reported
      populated values; this excludes both the no-endowment `A` population
      (community colleges, theological seminaries, etc.) and the imputed
      value populations (`N` / `P` / `Z`).
    rationale: >
      Only `R`-flagged rows carry institution-reported endowment values
      suitable for cross-cycle longitudinal comparison. `A`-flagged rows have
      `endowment_value IS NULL` by structural invariant (no endowment fund
      exists; BSE-IPF-020 P0 enforces). `N` / `P` / `Z` flagged rows carry
      NCES-imputed values (Nearest Neighbor / prior year / zero, respectively)
      whose change-over-time reflects NCES methodology rather than the
      institution's actual endowment dynamics. Filtering to `R` is
      operationally close to filtering to `endowment_value IS NOT NULL`
      because of the `A`↔NULL coupling, but the explicit `R` filter is
      correct: it drops the small `N` / `P` / `Z` imputed-value rows that do
      carry a populated `endowment_value`. Consumers running snapshot
      benchmarks may use all non-NULL endowment_value rows regardless of
      provenance.
    semantic_correction_history: >
      The v1.3 EDA §7 narrative inverted the meanings of `A` and `N` (`A`
      was described as "model-imputed" and `N` as "Not applicable").
      Authoritative semantics per the FY2023 IPEDS Finance dictionary +
      empirical evidence: `A` = Not applicable; `N` = Imputed using Nearest
      Neighbor procedure. Corrected throughout v1.4 v1.2.

  marketing_ratio_residual_admin_entities:
    affected_columns:
      - marketing_ratio
    severity: advisory
    consumer_guidance_verbatim: >
      Consumers ranking institutions by `marketing_ratio` may further wish
      to inspect rows with `total_fte_enrollment IS NULL` — these are
      typically administrative entities that the v1.4 system-office filter
      targets, but residual cases may exist.
    rationale: >
      Per the v1.3 chaos closure, the v1.4 system-office filter (8-pattern
      AND 4-clause-numeric-proxy intersection) catches the canonical
      administrative-office cluster, but a small number of edge cases may
      survive — e.g., institutions whose name does not match any of the 8
      patterns yet whose `total_fte_enrollment` is NULL. CON-IFP-014 (P1)
      enforces the filter at the contract surface; rows surviving the filter
      with `total_fte_enrollment IS NULL` are the residual cohort consumers
      should inspect when ranking by `marketing_ratio` outliers.

  system_office_filter:
    rule_id: CON-IFP-014  # P1 — confirms the filter ran with the correct semantic
    rationale: >
      Filters out IPEDS-Finance rows that represent state-system or
      district-level administrative offices rather than degree-granting
      institutions. These offices file F1A schedules for system-level
      overhead; students belong to member institutions. They produce
      distorted `marketing_ratio` outliers (e.g., UNITID 242060 Sistema
      Universitario Ana G. Mendez at MR=5,265.5×) and have no career-outcome
      counterpart by construction (no graduates). A row is excluded only
      when both clauses match: (a) institution name matches one of the 8
      organizational-name patterns, AND (b) the row has at least one of four
      organizational-shell signals (instruction NULL, instruction < $1M,
      FTE NULL, FTE < 50). The AND intersection is the deliberate guardrail
      against false-positives on small teaching institutions whose name
      happens to match a pattern (those have positive FTE).
    name_pattern_count: 8
    name_pattern_set:
      - "% office"
      - "% system"
      - "% system %"
      - "%chancellor%"
      - "%central office%"
      - "%system office%"
      - "%district office%"
      - "%sistema universitario%"  # 8th pattern — Spanish-language Puerto Rico system-office naming (added v1.1)
    numeric_proxy_clause_count: 4   # v1.3 final form (extended from v1.0/v1.1/v1.2 2-clause version)
    numeric_proxy_clauses:
      - "instruction_expenses IS NULL"
      - "instruction_expenses < 1000000.0"
      - "total_fte_enrollment IS NULL"
      - "total_fte_enrollment < 50"
    filter_sql_verbatim: |
      WHERE NOT (
        (
          LOWER(institution_name) LIKE '% office'
          OR LOWER(institution_name) LIKE '% system'
          OR LOWER(institution_name) LIKE '% system %'
          OR LOWER(institution_name) LIKE '%chancellor%'
          OR LOWER(institution_name) LIKE '%central office%'
          OR LOWER(institution_name) LIKE '%system office%'
          OR LOWER(institution_name) LIKE '%district office%'
          OR LOWER(institution_name) LIKE '%sistema universitario%'
        )
        AND (
          instruction_expenses IS NULL
          OR instruction_expenses < 1000000.0
          OR total_fte_enrollment IS NULL
          OR total_fte_enrollment < 50
        )
      )
    fy2023_excluded_count: 45
    fy2023_landed_count: 2630
    representative_excluded_examples:
      - unitid: 117681
        name: "Los Angeles Community College District Office"
        rationale: "Name matches '% office'; FTE NULL; MR=84.34"
      - unitid: 195827
        name: "SUNY-System Office"
        rationale: "Name matches '%system office%'; FTE NULL; MR=62.14"
      - unitid: 166665
        name: "University of Massachusetts-Central Office"
        rationale: "Name matches '%central office%'; FTE NULL; MR=13.66"
      - unitid: 144777
        name: "DeVry University-Administrative Office"
        rationale: "Name matches '% office'; FTE NULL; MR=8.56"
      - unitid: 242060
        name: "Sistema Universitario Ana G. Mendez"
        rationale: "Name matches '%sistema universitario%'; FTE NULL; MR=5,265.5 (the #1 marketing_ratio outlier in FY2023)"
    chaos_closure_reference: governance/chaos-reports/ipeds-finance-v1.4-chaos.md

  endowment_provenance_dictionary_subset:
    affected_columns:
      - endowment_value_provenance
    severity: advisory
    consumer_guidance_verbatim: >
      The observed FY2023 domain `{R, A, P, Z, N}` is a strict subset of
      the IPEDS dictionary's 13-code shared `Xvarname` lookup
      `{A, B, C, D, G, H, J, K, L, N, P, R, Z}`. The remaining 8 dictionary
      codes (`B, C, D, G, H, J, K, L`) are unobserved in FY2023 endowment
      data but are dictionary-legitimate. Future-cycle appearance of any of
      the 8 unobserved codes is a Significant escalation per RAW-IPF-015 —
      no silent allowed-set extension.
