table: base.college_scorecard_institution
namespace: base
zone: silver
version: "1.0.0"
grain:
  - unitid
status: draft
record_count: 3039
data_vintage: >
  Silver promotion of raw.college_scorecard_institution (one-time, Bronze→Silver,
  1:1 row pass-through; no filtering, no aggregation, no cross-source joins). The
  underlying source is U.S. Department of Education College Scorecard
  Most-Recent-Cohorts-Institution.csv; Silver inherits Bronze's vintage unchanged.
  Values represent the most recent cohort data available to the Department of
  Education at the time of the Bronze ingest.
source: >
  raw.college_scorecard_institution (Bronze). Transform: unify public/private COA
  and net-price columns into single authoritative Silver columns, keyed on
  institution_control. No concept normalization beyond control-type string
  mapping (1→'Public', 2→'Private nonprofit', 3→'Private for-profit'). No
  entity resolution (unitid is already the canonical institution identifier).
spec_reference: docs/specs/raw-ingest-college-scorecard-institution.md
parent_spec_reference: docs/specs/raw-ingest-college-scorecard-institution.md
logical_model_reference: governance/models/silver-base-college-scorecard-institution-logical.md
physical_model_reference: governance/models/silver-base-college-scorecard-institution-physical.md
lineage_reference: governance/lineage/silver-base-college-scorecard-institution-20260414T220000Z.json
cde_registry_reference: governance/cde-registry/silver-base-college-scorecard-institution-cdes.md
dq_rules_reference: governance/dq-rules/silver-base-college-scorecard-institution.json
eda_reference: docs/sessions/eda-silver-base-college-scorecard-institution.md
owner: "@doc-generator"
sla: >
  Silver runs immediately after each Bronze promotion of
  raw.college_scorecard_institution (annual refresh cadence — each fall when the
  Department of Education publishes the next Most-Recent-Cohorts file). No
  intra-year freshness guarantee. The transform is idempotent: running Silver
  against an unchanged Bronze snapshot produces a byte-identical Silver table.

filter_predicate: none  # inherited Bronze filter (PREDDEG=3 OR ICLEVEL=1) already applied upstream
dedup_policy: "promote-only (Silver is 1:1 with Bronze on unitid; record_id is deterministic)"

quality:
  row_count_guarantee: 3039
  row_count_tolerance: 5
  null_guarantee: >
    Required columns: record_id, unitid, institution_name, state_abbr,
    institution_control, source_load_date, ingested_at (7 columns, 0% nulls).
    All other columns are nullable; the cost/net-price surface is ~73.48%
    populated in the current snapshot (see known_coverage_gaps).
  completeness_threshold: 0.70  # P0 floor for net_price_annual and cost_of_attendance_annual
  validity_threshold: 1.00      # all range and invariant rules are 0-violation
  uniqueness_guarantee:
    - "unitid is unique (3,039 distinct values)"
    - "record_id is unique (3,039 distinct values, 1:1 with unitid)"
  freshness_sla: >
    Annual publication cycle. source_load_date inherited from Bronze (no
    separate Silver freshness gate). ingested_at refreshed on every Silver
    promotion.

quality_tier: >
  high — Silver is a 1:1 promotion of Bronze with only deterministic derivations
  (COALESCE, control-routed SELECT, × 4 multiplication, string mapping). No
  fuzzy matching, no entity resolution, no imputation. All 17 DQ rules pass on
  the current snapshot (see dq-rules/silver-base-college-scorecard-institution.json).
  Known coverage gaps (26.5% of rows lack both COA and net price; for-profit
  underreports) are source-side IPEDS limitations inherited from Bronze, not
  Silver-introduced defects.

columns:
  - name: record_id
    type: string
    required: true
    business_term: BT-001
    is_cde: true
    cde_rationale: >
      Deterministic surrogate grain key for Silver (compute_grain_id with
      unitid, prefix='csi'). Dedup grain for idempotent promote(). A wrong or
      collision-prone record_id silently drops rows on re-run.
    is_pii: false
    pii_rationale: ""
    description: >
      Deterministic SHA-256 grain hash of unitid. Format csi-<16 hex chars>.
      Stable across pipeline re-runs. 3,039 distinct values, one per
      institution.
    dq_rules:
      - SLV-CSI-002
      - SLV-CSI-004

  - name: unitid
    type: long
    required: true
    business_term: BT-001
    is_cde: true
    cde_rationale: >
      Sole join key to Bronze lineage, base.college_scorecard (program grain),
      and the Gold LEFT JOIN into consumable.career_outcomes. IPEDS authoritative
      identifier — auto-approved per governance/domain-context.md. Aligned with
      Bronze CDE flag on raw.college_scorecard_institution.
    is_pii: false
    pii_rationale: ""
    description: >
      IPEDS 6-digit institution identifier. Natural key. UNIQUE +
      CHECK (unitid > 0). 3,039 distinct values, 0 nulls, 0 duplicates.
    dq_rules:
      - SLV-CSI-003

  - name: institution_name
    type: string
    required: true
    business_term: BT-002
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Official institution name (display label). Not unique — 10 names map to
      multiple UNITIDs (multi-campus systems). UNITID is the authoritative
      identifier.

  - name: state_abbr
    type: string
    required: true
    business_term: BT-103
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: >
      Geographic label (2-letter USPS), not a PII field. No individual-level data.
    description: >
      2-letter USPS state abbreviation. Display/filter field. Does NOT feed the
      Gold BEA RPP join — RPP adjustment is keyed on the student-selected
      destination state, not the institution's home state. Regex CHECK (^[A-Z]{2}$).

  - name: institution_control
    type: string
    required: true
    is_cde: true
    cde_rationale: >
      Business-facing multiplexer — 'Public' / 'Private nonprofit' / 'Private
      for-profit'. Drives Gold receipt labels and any control-type segmentation
      in the MCP tool response. Also the input to 'for-profit' risk gating in
      downstream guidance logic. Promoted from Bronze CDE (control). The Silver
      transform has already consumed this mapping to route net-price and
      quintile sources; the string column is retained for display and
      segmentation at Gold.
    is_pii: false
    pii_rationale: ""
    description: >
      Derived from raw integer control (1→'Public', 2→'Private nonprofit',
      3→'Private for-profit'). CHECK-constrained to those three values. 100%
      populated. Distribution: 867 Public (28.5%), 1,754 Private nonprofit
      (57.7%), 418 Private for-profit (13.8%).
    dq_rules:
      - SLV-CSI-005
      - SLV-CSI-006

  - name: cost_of_attendance_annual
    type: double
    required: false
    business_term: BT-110
    is_cde: true
    cde_rationale: >
      Unified annual COA — COALESCE(costt4_a, costt4_p). Sticker-price receipt
      line and input to cost_of_attendance_4yr. P0 range $5,000-$100,000. P0
      invariant net_price_annual <= cost_of_attendance_annual. BT-110.
    is_pii: false
    pii_rationale: ""
    description: >
      Unified annual cost of attendance. Null when both source columns are null
      (26.5% of rows). Observed range $6,362-$87,804, median $30,354. Populated
      in 2,233 of 3,039 rows (73.48%) — row-identical in nullness with
      net_price_annual.
    dq_rules:
      - SLV-CSI-007
      - SLV-CSI-011
      - SLV-CSI-017

  - name: cost_of_attendance_4yr
    type: double
    required: false
    business_term: BT-110
    is_cde: true
    cde_rationale: >
      cost_of_attendance_annual × 4. Pre-materialized for Gold query performance.
      Receipt comparison baseline. BT-110.
    is_pii: false
    pii_rationale: ""
    description: >
      4-year total COA = cost_of_attendance_annual × 4. Null-propagating.
      IEEE-754 exactness enforced ($0.01 tolerance) by SLV-CSI-009.
    dq_rules:
      - SLV-CSI-009

  - name: net_price_annual
    type: double
    required: false
    business_term: BT-111
    is_cde: true
    cde_rationale: >
      CRITICAL CDE — the ROI denominator in the new formula
      earnings / (net_price × 4 × loan_pct). Derived via control-based routing:
      npt4_pub when institution_control='Public' else npt4_priv. Every ROI
      score and Fight Student Loans outcome in the product traces through this
      column. P1 range $-5,000-$80,000 (negatives legitimate — aid can exceed
      cost). P0 invariant net_price_annual <= cost_of_attendance_annual.
      Highest-criticality column in the Silver table. BT-111.
    is_pii: false
    pii_rationale: ""
    description: >
      Unified annual net price after aid. ROI denominator input. Can be
      negative when average grant aid exceeds cost of attendance (3 community
      colleges observed). Observed range -$1,180 to $77,180, median $18,990.
      Populated in 73.48% of rows (row-identical with COA nullness). Coverage
      by control: Public 89.27%, Private nonprofit 70.64%, Private for-profit
      52.63%.
    dq_rules:
      - SLV-CSI-007
      - SLV-CSI-010
      - SLV-CSI-012
      - SLV-CSI-013
      - SLV-CSI-014
      - SLV-CSI-016

  - name: net_price_4yr
    type: double
    required: false
    business_term: BT-111
    is_cde: true
    cde_rationale: >
      CRITICAL CDE — net_price_annual × 4, directly consumed by the ROI formula.
      Pre-materialized to eliminate a runtime × 4 in the hot path of the stat
      engine. BT-111.
    is_pii: false
    pii_rationale: ""
    description: >
      4-year total net price = net_price_annual × 4. Null-propagating. IEEE-754
      exactness enforced ($0.01 tolerance) by SLV-CSI-008.
    dq_rules:
      - SLV-CSI-008

  - name: net_price_q1
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: >
      Unified net price, $0-$30K family income band. Drives income-quintile ROI.
      Part of the aid-monotonicity DQ invariant (q1 <= q5). BT-112.
    is_pii: false
    pii_rationale: ""
    description: >
      Unified net price for $0-$30K family income band. Derived:
