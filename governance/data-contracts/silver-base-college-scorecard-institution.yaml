breaking_changes:
  policy: >
    Semantic versioning. Breaking changes (column removal, rename, type change,
    grain change, CDE flag removal, SLA relaxation, threshold relaxation that
    widens accepted data) require a major version bump and a 30-day deprecation
    notice logged in governance/audit-trail/. Non-breaking changes (column
    addition, description update, threshold tightening where existing data
    passes, new DQ rule) can ship as a minor or patch bump without deprecation.
  notification: "Logged in governance/audit-trail/"
  backward_compat:
    current_version: "1.0.0"
    previous_version: null
    notes: >
      New Silver table (greenfield). No backward-compat obligations. First
      emission.

downstream_consumers:
  - consumable.career_outcomes (Gold zone — LEFT JOIN on unitid; pulls net_price_annual, net_price_4yr, cost_of_attendance_annual, institution_control, tuition_in_state, tuition_out_of_state, room_board_on_campus for ROI derivation and receipt display)
  - consumable.program_career_paths (Gold zone — inherits cost fields via career_outcomes for the core school+major→career query)
  - ROI formula (earnings / (net_price_annual × 4 × loan_pct))
  - Fight Student Loans boss (stat engine consumer of ROI)
  - Reveal screen receipts (full cost breakdown: COA, net price, tuition, room & board, books)
  - Income-quintile ROI stretch goal (consumes net_price_q1 through net_price_q5)
  - CareerCard "Public university · $12,800 net price/yr" labels (institution_control + net_price_annual)

known_coverage_gaps:
  - description: >
      806 institutions (26.52%) have null net_price_annual AND null
      cost_of_attendance_annual. The two fields are row-identical in nullness
      (EDA Key Finding #1) — a school that reports one also reports the other.
      Concentrated in PREDDEG=0 (unclassified) and PREDDEG=4 (graduate-dominant)
      schools that entered the scope via ICLEVEL=1.
    impact: >
      Both cost fields and both 4yr derivatives will be null on these rows after
      the Gold LEFT JOIN. Downstream UIs must handle gracefully. Not a DQ
      failure — SLV-CSI-010 and SLV-CSI-011 set a 70% floor against observed
      73.48% coverage.
  - description: >
      Private for-profit (institution_control='Private for-profit') has only
      52.63% net_price_annual coverage. Known IPEDS underreporting pattern.
    impact: >
      Many for-profit-school programs will have null cost data after Gold LEFT
      JOIN. SLV-CSI-014 is P2 informational — tracks degradation below 50% but
      accepts the known ceiling.
  - description: >
      Quintile coverage degrades with income: q1 71.90% → q2 69.30% →
      q3 68.41% → q4 65.19% → q5 60.74%. High-income samples are suppressed
      more often at the source.
    impact: >
      Income-quintile ROI stretch goal must accept per-quintile nulls. The
      q1/q5 span invariant (SLV-CSI-015) only evaluates rows where both are
      populated (1,832 rows).
  - description: >
      46 institutions (2.51% of 1,832 rows with both quintiles populated) have
      q1 > q5. Magnitudes: median $1,396, max $18,121. Legitimate — federal
      aid caps at the lowest-income bracket plus merit-aid concentration at
      middle quintiles.
    impact: >
      SLV-CSI-015 allows up to 50 such violations at P1. Downstream consumers
      must not assume q1 ≤ q5 at the row level; only the aggregate tendency
      holds.

transformation_summary:
  derived_columns:
    - {column: record_id,                  derivation: "compute_grain_id(row, ['unitid'], prefix='csi')"}
    - {column: institution_control,        derivation: "{1:'Public', 2:'Private nonprofit', 3:'Private for-profit'}[raw.control]"}
    - {column: cost_of_attendance_annual,  derivation: "COALESCE(raw.costt4_a, raw.costt4_p)"}
    - {column: cost_of_attendance_4yr,     derivation: "cost_of_attendance_annual * 4 (null-propagating)"}
    - {column: net_price_annual,           derivation: "raw.npt4_pub if control=1 else raw.npt4_priv"}
    - {column: net_price_4yr,              derivation: "net_price_annual * 4 (null-propagating)"}
    - {column: net_price_q1,               derivation: "raw.npt41_pub if control=1 else raw.npt41_priv"}
    - {column: net_price_q2,               derivation: "raw.npt42_pub if control=1 else raw.npt42_priv"}
    - {column: net_price_q3,               derivation: "raw.npt43_pub if control=1 else raw.npt43_priv"}
    - {column: net_price_q4,               derivation: "raw.npt44_pub if control=1 else raw.npt44_priv"}
    - {column: net_price_q5,               derivation: "raw.npt45_pub if control=1 else raw.npt45_priv"}
    - {column: ingested_at,                derivation: "datetime.now() (UTC) at Silver promotion time"}
  pass_through_columns:
    - {silver: unitid,                 bronze: unitid}
    - {silver: institution_name,       bronze: instnm}
    - {silver: state_abbr,             bronze: stabbr}
    - {silver: tuition_in_state,       bronze: tuitionfee_in}
    - {silver: tuition_out_of_state,   bronze: tuitionfee_out}
    - {silver: room_board_on_campus,   bronze: roomboard_on}
    - {silver: room_board_off_campus,  bronze: roomboard_off}
    - {silver: books_supplies,         bronze: booksupply}
    - {silver: costt4_a_raw,           bronze: costt4_a}
    - {silver: costt4_p_raw,           bronze: costt4_p}
    - {silver: npt4_pub_raw,           bronze: npt4_pub}
    - {silver: npt4_priv_raw,          bronze: npt4_priv}
    - {silver: npt41_pub_raw,          bronze: npt41_pub}
    - {silver: npt42_pub_raw,          bronze: npt42_pub}
    - {silver: npt43_pub_raw,          bronze: npt43_pub}
    - {silver: npt44_pub_raw,          bronze: npt44_pub}
    - {silver: npt45_pub_raw,          bronze: npt45_pub}
    - {silver: npt41_priv_raw,         bronze: npt41_priv}
    - {silver: npt42_priv_raw,         bronze: npt42_priv}
    - {silver: npt43_priv_raw,         bronze: npt43_priv}
