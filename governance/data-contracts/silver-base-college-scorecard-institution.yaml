cde_summary:
  total_columns: 35
  cde_columns: 26
  pii_columns: 0
  sensitivity_classification: public
  regulatory_frameworks: []
  cde_reference: governance/cde-registry/silver-base-college-scorecard-institution-cdes.md
  cde_density_commentary: >
    74.3% CDE density is higher than the 60.7% density on the parent Bronze
    contract (17/28). The increase comes from the 9 new unified derived
    columns introduced at Silver (cost_of_attendance_annual,
    cost_of_attendance_4yr, net_price_annual, net_price_4yr, net_price_q1-q5),
    plus retention of the 14 raw pass-through columns as provenance CDEs, plus
    the surrogate record_id plus institution_control (routing multiplexer).
    All 9 derived fields are business metrics that directly feed the new ROI
    formula and downstream receipts. The 14 raw pass-throughs are flagged CDE
    specifically for audit reconstruction — a
    regulator asking "show me every CDE value for UNITID 166027" should see
    both the unified value and its raw input on a single row scan, without
    federating back to Bronze. Non-CDE residue (12 columns): institution_name,
    state_abbr, tuition_in_state, tuition_out_of_state, room_board_on_campus,
    room_board_off_campus, books_supplies (all display/receipt only), plus
    source_load_date and ingested_at (pipeline metadata). state_abbr was
    spot-checked per the tagging prompt and confirmed non-CDE — the Gold BEA
    RPP join is keyed on the student-selected destination state, not the
    institution's home state. A tripwire is documented for re-evaluation if a
    future spec introduces a direct institution.state_abbr ⋈ bea_rpp.state_abbr
    join.

