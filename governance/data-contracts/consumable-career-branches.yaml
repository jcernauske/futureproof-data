---
# Data Contract: consumable.career_branches
# Spec: gold-futureproof-engine
# Zone: Gold (Consumable)
# Status: DRAFT
# Tagged by: @cde-tagger
# Date: 2026-04-09

table: consumable.career_branches
namespace: consumable
zone: gold
version: "1.2.0"
grain:
  - soc_code
  - related_soc_code
status: draft
owner: "@doc-generator"
quality_tier: derived_multi_source
spec_reference: docs/specs/gold-futureproof-engine.md
physical_model: governance/models/gold-futureproof-engine-physical.md

columns:
  # ---- Core Identity ----

  - name: record_id
    type: varchar
    required: true
    business_term: BT-015
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Deterministic surrogate key computed via compute_grain_id(row, ['soc_code',
      'related_soc_code'], prefix='br'). Format: br-<16 hex chars>. Stable across
      pipeline re-runs.

  - name: soc_code
    type: varchar
    required: true
    business_term: BT-027
    is_cde: true
    cde_rationale: >
      Natural key component identifying the source occupation in the career
      branching graph. Required for the Stage 3 branch tree query pattern --
      when a student explores "what else can I do from this career," this field
      anchors the source node. Incorrect values break the branch tree
      visualization and misdirect career pivoting guidance.
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation SOC code in XX-XXXX format. Natural key component
      (composite with related_soc_code). Source:
      consumable.career_transitions.soc_code.
    constraints:
      - "UNIQUE (composite with related_soc_code)"
      - "CHECK (soc_code ~ '^\\d{2}-\\d{4}$')"

  - name: source_title
    type: varchar
    required: true
    business_term: BT-028
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation title. Display label; soc_code is the authoritative
      identifier. Source: consumable.career_transitions.source_title.

  - name: related_soc_code
    type: varchar
    required: true
    business_term: BT-027
    is_cde: true
    cde_rationale: >
      Natural key component identifying the branch target occupation. Required
      for the career branching query -- this field identifies the destination
      node in the branch tree. Joins to occupation_profiles and
      onet_work_profiles for the enriched stat profile. Incorrect values map
      students to wrong branch targets.
    is_pii: false
    pii_rationale: ""
    description: >
      Branch target occupation SOC code in XX-XXXX format. Natural key
      component (composite with soc_code). Source:
      consumable.career_transitions.related_soc_code.
    constraints:
      - "UNIQUE (composite with soc_code)"
      - "CHECK (related_soc_code ~ '^\\d{2}-\\d{4}$')"

  - name: related_title
    type: varchar
    required: true
    business_term: BT-028
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Branch target occupation title. Display label. Source:
      consumable.career_transitions.related_title.

  - name: best_index
    type: integer
    required: true
    business_term: BT-060
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Similarity rank (1 = most similar). Source:
      consumable.career_transitions.best_index.
    constraints:
      - "CHECK (best_index >= 1 AND best_index <= 20)"

  - name: relatedness_tier
    type: varchar
    required: true
    business_term: BT-061
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Tier classification: Primary-Short, Primary-Long, or Supplemental.
      Source: consumable.career_transitions.relatedness_tier.
    constraints:
      - "CHECK (relatedness_tier IN ('Primary-Short', 'Primary-Long', 'Supplemental'))"

  - name: is_primary
    type: boolean
    required: true
    business_term: BT-060
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      True for top 10 branches by similarity. Source:
      consumable.career_transitions.is_primary.

  # ---- Source Stats ----

  - name: source_grw
    type: integer
    required: false
    business_term: BT-047
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation GRW score (1-10). Source:
      consumable.occupation_profiles.grw_score_rounded via LEFT JOIN on
      soc_code.
    constraints:
      - "CHECK (source_grw IS NULL OR (source_grw >= 1 AND source_grw <= 10))"

  - name: source_hmn
    type: integer
    required: false
    business_term: BT-066
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation HMN score (1-10). Source:
      consumable.onet_work_profiles.hmn_score_rounded via LEFT JOIN on
      soc_code.
    constraints:
      - "CHECK (source_hmn IS NULL OR (source_hmn >= 1 AND source_hmn <= 10))"

  - name: source_burnout
    type: integer
    required: false
    business_term: BT-068
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation Burnout score (1-10). Source:
      consumable.onet_work_profiles.burnout_score_rounded via LEFT JOIN on
      soc_code.
    constraints:
      - "CHECK (source_burnout IS NULL OR (source_burnout >= 1 AND source_burnout <= 10))"

  - name: source_wage
    type: double
    required: false
    business_term: BT-036
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation median annual wage. Source:
      consumable.occupation_profiles.median_annual_wage via LEFT JOIN on
      soc_code.
    constraints:
      - "CHECK (source_wage IS NULL OR (source_wage >= 15000 AND source_wage <= 300000))"

  - name: source_res
    type: integer
    required: false
    business_term: BT-080
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation AI Resilience score (1-10). Source:
      consumable.ai_exposure.stat_res via LEFT JOIN on soc_code. Null if
      source SOC code not found in ai_exposure.
    constraints:
      - "CHECK (source_res IS NULL OR (source_res >= 1 AND source_res <= 10))"

  - name: source_ai_boss
    type: integer
    required: false
    business_term: BT-083
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Source occupation AI Boss strength (1-10). Source:
      consumable.ai_exposure.boss_ai_score via LEFT JOIN on soc_code. Null if
      source SOC code not found in ai_exposure.
    constraints:
      - "CHECK (source_ai_boss IS NULL OR (source_ai_boss >= 1 AND source_ai_boss <= 10))"

  # ---- Related Stats ----

  - name: related_grw
    type: integer
    required: false
    business_term: BT-047
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation GRW score (1-10). Source:
      consumable.occupation_profiles.grw_score_rounded via LEFT JOIN on
      related_soc_code.
    constraints:
      - "CHECK (related_grw IS NULL OR (related_grw >= 1 AND related_grw <= 10))"

  - name: related_hmn
    type: integer
    required: false
    business_term: BT-066
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation HMN score (1-10). Source:
      consumable.onet_work_profiles.hmn_score_rounded via LEFT JOIN on
      related_soc_code.
    constraints:
      - "CHECK (related_hmn IS NULL OR (related_hmn >= 1 AND related_hmn <= 10))"

  - name: related_burnout
    type: integer
    required: false
    business_term: BT-068
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation Burnout score (1-10). Source:
      consumable.onet_work_profiles.burnout_score_rounded via LEFT JOIN on
      related_soc_code.
    constraints:
      - "CHECK (related_burnout IS NULL OR (related_burnout >= 1 AND related_burnout <= 10))"

  - name: related_wage
    type: double
    required: false
    business_term: BT-036
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation median annual wage. Source:
      consumable.occupation_profiles.median_annual_wage via LEFT JOIN on
      related_soc_code.
    constraints:
      - "CHECK (related_wage IS NULL OR (related_wage >= 15000 AND related_wage <= 300000))"

  - name: related_growth_category
    type: varchar
    required: false
    business_term: BT-041
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation growth classification. Source:
      consumable.occupation_profiles.growth_category.
    constraints:
      - "CHECK (related_growth_category IS NULL OR related_growth_category IN ('declining_fast', 'declining', 'stable', 'growing', 'growing_fast', 'booming'))"

  - name: related_education_level
    type: varchar
    required: false
    business_term: BT-039
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation typical education requirement. Source:
      consumable.occupation_profiles.education_level_name.

  - name: related_res
    type: integer
    required: false
    business_term: BT-080
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation AI Resilience score (1-10). Source:
      consumable.ai_exposure.stat_res via LEFT JOIN on related_soc_code. Null
      if target SOC code not found in ai_exposure.
    constraints:
      - "CHECK (related_res IS NULL OR (related_res >= 1 AND related_res <= 10))"

  - name: related_ai_boss
    type: integer
    required: false
    business_term: BT-083
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation AI Boss strength (1-10). Source:
      consumable.ai_exposure.boss_ai_score via LEFT JOIN on related_soc_code.
      Null if target SOC code not found in ai_exposure.
    constraints:
      - "CHECK (related_ai_boss IS NULL OR (related_ai_boss >= 1 AND related_ai_boss <= 10))"

  # ---- Stat Deltas ----

  - name: grw_delta
    type: integer
    required: false
    business_term: BT-091
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      related_grw - source_grw. Positive = branch target grows faster. Null if
      either side null.
    constraints:
      - "CHECK (grw_delta IS NULL OR (grw_delta >= -9 AND grw_delta <= 9))"

  - name: hmn_delta
    type: integer
    required: false
    business_term: BT-091
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      related_hmn - source_hmn. Positive = more human edge at target. Null if
      either side null.
    constraints:
      - "CHECK (hmn_delta IS NULL OR (hmn_delta >= -9 AND hmn_delta <= 9))"

  - name: burnout_delta
    type: integer
    required: false
    business_term: BT-091
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      related_burnout - source_burnout. Positive = more burnout risk at target.
      Null if either side null.
    constraints:
      - "CHECK (burnout_delta IS NULL OR (burnout_delta >= -9 AND burnout_delta <= 9))"

  - name: wage_delta
    type: double
    required: false
    business_term: BT-091
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      related_wage - source_wage. Positive = higher pay at target. Null if
      either side null.

  - name: res_delta
    type: integer
    required: false
    business_term: BT-091
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      related_res - source_res. Positive = branch target is more AI-resilient.
      Null if either source_res or related_res is null.
    constraints:
      - "CHECK (res_delta IS NULL OR (res_delta >= -9 AND res_delta <= 9))"

  - name: ai_boss_delta
    type: integer
    required: false
    business_term: BT-091
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      related_ai_boss - source_ai_boss. Positive = branch target faces stronger
      AI boss (more AI-exposed). Null if either side is null.
    constraints:
      - "CHECK (ai_boss_delta IS NULL OR (ai_boss_delta >= -9 AND ai_boss_delta <= 9))"

  - name: branch_has_full_data
    type: boolean
    required: true
    business_term: BT-092
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      True if related occupation has both BLS and O*NET data. Derived:
      related_grw IS NOT NULL AND related_hmn IS NOT NULL.

  # ---- Experience (added in v1.2.0 per onet-experience-requirements spec) ----

  - name: related_experience_years
    type: double
    required: false
    business_term: BT-117
    is_cde: true
    cde_rationale: >
      Typical years of prior work experience for the target (related) occupation.
      Shown directly to users in the career-tree UI and feeds the default-view
      filter (experience_delta_years <= 5). Sourced from
      base.onet_experience_profiles.experience_years_typical via LEFT JOIN on
      related_soc_code. An incorrect value either under-gates (exposes students
      to unrealistic senior-level branches) or over-gates (hides legitimate
      career pivots). P0 business-critical. Identified as a CDE per spec
      §CDE & PII Assessment.
    is_pii: false
    pii_rationale: ""
    description: >
      Typical years of prior experience for the target occupation. Source:
      base.onet_experience_profiles.experience_years_typical via LEFT JOIN on
      related_soc_code. NULL when target SOC has no ETE coverage.
    constraints:
      - "CHECK (related_experience_years IS NULL OR (related_experience_years >= 0 AND related_experience_years <= 15))"

  - name: related_experience_tier
    type: varchar
    required: false
    business_term: BT-118
    is_cde: true
    cde_rationale: >
      Experience tier for the target occupation. Drives UX gating and
      decade-bucket rendering on the branching career tree ('Your 20s',
      'Your 30s', 'Your 40s' views; 'Unlocks at 8+ years' badges). Sourced
      from base.onet_experience_profiles.experience_tier via LEFT JOIN on
      related_soc_code. Misclassification silently produces unrealistic
      career suggestions; correctness is therefore a cross-boundary
      business-critical concern. P0. Identified as a CDE per spec §CDE &
      PII Assessment.
    is_pii: false
    pii_rationale: ""
    description: >
      Experience tier ('entry', 'early', 'mid', 'senior') for the target
      occupation. Source: base.onet_experience_profiles.experience_tier via
      LEFT JOIN on related_soc_code. NULL when target SOC has no ETE coverage.
    constraints:
      - "CHECK (related_experience_tier IS NULL OR related_experience_tier IN ('entry', 'early', 'mid', 'senior'))"

  - name: source_experience_years
    type: double
    required: false
    business_term: BT-117
    is_cde: true
    cde_rationale: >
      Typical years of prior experience for the source occupation. Required
      input to the NULL-propagating experience_delta_years derivation and
      used by the career_tree.py filter to anchor the user's current career
      stage. Sourced from base.onet_experience_profiles.experience_years_typical
      via LEFT JOIN on soc_code. An incorrect value distorts every delta
      computed off this source node. P0 business-critical. Identified as a
      CDE per spec §CDE & PII Assessment.
    is_pii: false
    pii_rationale: ""
    description: >
      Typical years of prior experience for the source occupation. Source:
      base.onet_experience_profiles.experience_years_typical via LEFT JOIN on
      soc_code. NULL when source SOC has no ETE coverage.
    constraints:
      - "CHECK (source_experience_years IS NULL OR (source_experience_years >= 0 AND source_experience_years <= 15))"

  - name: experience_delta_years
    type: double
    required: false
    business_term: BT-091
    is_cde: true
    cde_rationale: >
      Primary default-view threshold (branch visible iff
      experience_delta_years <= 5). NULL-propagating (NULL when either side
      is NULL) to avoid falsely reporting 'related - 0' when the source has
      no experience data. This field is the single most consequential gate
      on what a student sees in the branching career tree by default.
      Incorrect values either flood the default view with unrealistic jumps
      or suppress legitimate realistic pivots. P0 business-critical.
      Identified as a CDE per spec §CDE & PII Assessment.
    is_pii: false
    pii_rationale: ""
    description: >
      related_experience_years - source_experience_years. Positive = target
      requires more experience than source. NULL-propagating: NULL if either
      side is NULL. DQ range [-12, 12] (mathematically exact given the approved
      midpoint cap of 12 years; see governance/approvals/onet-experience-requirements-open-decisions.md).
    constraints:
      - "CHECK (experience_delta_years IS NULL OR (experience_delta_years >= -12 AND experience_delta_years <= 12))"

  # ---- Pipeline Metadata ----

  - name: promoted_at
    type: timestamp
    required: true
    business_term: BT-026
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Timestamp when the row was promoted to the Gold consumable table.
      Generated at promotion time.

# Quality thresholds
quality:
  completeness:
    required_fields_null_tolerance: 0.0
  validity:
    soc_code_format: "^\\d{2}-\\d{4}$"
    stat_range: [1, 10]
    delta_range: [-9, 9]
    relatedness_tier_values: ["Primary-Short", "Primary-Long", "Supplemental"]
  uniqueness:
    grain_zero_duplicates: true
    record_id_unique: true
  volume:
    row_count_range: [15000, 16500]
  consistency:
    delta_derivation_correct: true

# Breaking change policy
breaking_changes:
  policy: >
    Semantic versioning. Column removed, renamed, type changed, or grain changed
    triggers a major version bump (BREAKING). Column added triggers a minor bump
    (NON-BREAKING). Description change triggers a patch bump.
  notification: >
    Breaking changes logged in governance/audit-trail/ with 30-day deprecation
    notice before removal.

# Lineage reference
lineage:
  source_tables:
    - consumable.career_transitions
    - consumable.occupation_profiles
    - consumable.onet_work_profiles
    - consumable.ai_exposure
    - base.onet_experience_profiles
  transformation: src/gold/futureproof_engine.py

# Version history
version_history:
  - version: "1.2.0"
    date: 2026-04-16
    change_type: MINOR (additive)
    summary: >
      Added 4 experience columns (related_experience_years,
      related_experience_tier, source_experience_years, experience_delta_years)
      sourced from the new base.onet_experience_profiles Silver table. Bumped
      per onet-experience-requirements spec. All four columns are CDE-tagged
      and carry no PII. Additive only — no breaking changes.
