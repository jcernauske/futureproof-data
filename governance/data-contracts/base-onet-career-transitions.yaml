      ['bls_soc_code', 'related_bls_soc_code'], prefix='ct'). Format:
      ct-<16 hex chars>. Technical infrastructure field.

  - name: bls_soc_code
    type: varchar
    required: true
    business_term: BT-027
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
