      more similar. Range: 1-20.
    constraints:
      - "CHECK (best_index >= 1 AND best_index <= 20)"

  - name: relatedness_tier
    type: varchar
    required: true
    business_term: BT-061
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Tier derived from best_index: 1-5 = "Primary-Short", 6-10 =
      "Primary-Long", 11-20 = "Supplemental".
    constraints:
      - "CHECK (relatedness_tier IN ('Primary-Short', 'Primary-Long', 'Supplemental'))"

  - name: is_primary
    type: boolean
    required: true
    business_term: ""
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      True when relatedness_tier is "Primary-Short" or "Primary-Long".
      Convenience filter flag. Derived from relatedness_tier.

  - name: relationship_type
    type: varchar
    required: true
    business_term: BT-060
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
