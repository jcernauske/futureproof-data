      Source occupation: 6-digit BLS SOC code. FK to
      base.onet_occupations.bls_soc_code. Part of the natural key grain.
    constraints:
      - "CHECK (bls_soc_code ~ '^\\d{2}-\\d{4}$')"

  - name: related_bls_soc_code
    type: varchar
    required: true
    business_term: BT-027
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Target occupation: 6-digit BLS SOC code. FK to
      base.onet_occupations.bls_soc_code. Must differ from bls_soc_code.
    constraints:
      - "CHECK (related_bls_soc_code ~ '^\\d{2}-\\d{4}$')"

  - name: best_index
    type: integer
    required: true
    business_term: BT-061
