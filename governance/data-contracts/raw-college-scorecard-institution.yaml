table: raw.college_scorecard_institution
namespace: raw
zone: bronze
version: 1.0.0
grain:
  - unitid
status: DRAFT
record_count: 3039
data_vintage: >
  U.S. Department of Education College Scorecard, Most-Recent-Cohorts-Institution.csv.
  Single annual snapshot — no within-source temporal dimension. Values represent the
  most recent cohort data available to the Department of Education at time of download.
source: >
  U.S. Department of Education College Scorecard (Institution-Level). Bulk CSV download
  from https://ed-public-download.app.cloud.gov/downloads/Most-Recent-Cohorts-Institution.csv.
  License: U.S. Government Work — public domain. User-Agent: FutureProof/0.1
  (jeff@hyenastudios.com).
spec_reference: docs/specs/raw-ingest-college-scorecard-institution.md
lineage_reference: governance/lineage/raw-ingest-college-scorecard-institution-20260414T213000Z.json
cde_registry_reference: governance/cde-registry/raw-ingest-college-scorecard-institution-cdes.md
dq_rules_reference: governance/dq-rules/raw-ingest-college-scorecard-institution.json
domain_context_reference: domain/raw-ingest-college-scorecard-institution-context.md
owner: "@data-steward"
sla: >
  Annual refresh (each fall when the Department of Education publishes the next
  Most-Recent-Cohorts-Institution.csv). No intra-year freshness guarantee — this is a
  snapshot table, not a live feed.
filter_predicate: "PREDDEG == 3 OR ICLEVEL == 1"
dedup_policy: "first-row-wins on unitid"
sentinels_nullified:
  - "PrivacySuppressed"
  - "PS"
  - "NA"
  - "NULL"
  - ""
quality_tier: >
  high — source is a U.S. Government statistical publication (public domain), 3,039/3,039
  rows structurally valid, zero duplicate UNITIDs, zero cross-contamination between
  npt4_pub and npt4_priv (control-correct), zero negative values outside the legitimate
  aid-exceeds-cost pattern. All 13 DQ rules pass. Known coverage gaps (26.5% of rows
  lack COA, 47.4% of for-profit schools lack net price) are documented upstream
  limitations of IPEDS reporting, not pipeline defects.

columns:
  - name: unitid
    type: long
    required: true
    is_cde: true
    cde_rationale: >
      Sole join key to downstream consumers (base.college_scorecard_institution,
      base.college_scorecard, and the Gold LEFT JOIN into consumable.career_outcomes).
      Also the dedup grain for Bronze ingest (first row per UNITID wins). IPEDS
      authoritative identifier — auto-approved per governance/domain-context.md.
      Aligned with sibling raw-college-scorecard.yaml where unitid is CDE. Without
      this, every cost/price field in this table is an orphan.
    is_pii: false
    pii_rationale: ""
    description: >
      Institution IPEDS ID (6-digit). Grain key. Joins to raw.college_scorecard and
      consumable.career_outcomes on the same UNITID. 3,039 rows, 3,039 distinct
      values, 0 duplicates.
    dq_rules:
      - RAW-CSI-002
      - RAW-CSI-003

  - name: instnm
    type: string
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Institution name (display only). Not unique — 10 names map to multiple UNITIDs
      (multi-campus systems). UNITID is the authoritative identifier.

  - name: stabbr
    type: string
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      2-letter state or territory abbreviation. Institution-level geographic descriptor.
      Not a join key in this pipeline. 56 distinct values (50 states + DC + territories).

  - name: control
    type: int
    required: true
    is_cde: true
    cde_rationale: >
      Multiplexer that selects NPT4_PUB vs NPT4_PRIV (and the ten quintile columns) in
      the Silver transform. A mis-tagged control value routes the ROI denominator to
      the wrong source column, producing silently wrong ROI. DQ rule enforces
      control IN (1,2,3). IPEDS external standard.
    is_pii: false
    pii_rationale: ""
    description: >
      Institution control: 1=Public, 2=Private nonprofit, 3=Private for-profit.
      Distribution: 867 public (28.5%), 1,754 private nonprofit (57.7%), 418 for-profit
      (13.8%). 100% populated.
    dq_rules:
      - RAW-CSI-004

  - name: preddeg
    type: int
    required: true
    is_cde: true
    cde_rationale: >
      Ingest filter input — the scope of this table (4-year bachelor's-granting
      institutions) is defined by PREDDEG=3 OR ICLEVEL=1. Validates filter correctness.
      IPEDS external standard.
    is_pii: false
    pii_rationale: ""
    description: >
      Predominant degree awarded. 0=Not classified, 1=Certificate, 2=Associate's,
      3=Bachelor's, 4=Graduate. Used as the primary scope filter (OR ICLEVEL=1).
      Filtered set includes values 0–4 because ICLEVEL=1 captures 4-year schools
      regardless of predominant degree.

  - name: costt4_a
    type: double
    required: false
    business_term: BT-110
    is_cde: true
    cde_rationale: >
      Primary source of unified cost_of_attendance_annual in Silver
      (COALESCE(costt4_a, costt4_p)). Feeds the sticker-price receipt line and
      cost_of_attendance_4yr derivation. P0 range check $5,000-$100,000.
      BT-110 (Cost of Attendance).
    is_pii: false
    pii_rationale: ""
    description: >
      Average cost of attendance, academic-year programs. Includes tuition, fees,
      books, room & board, living expenses. Observed range $6,362-$87,804, median
      $30,288. Covers 72.1% of rows (2,192 non-null). Mutually exclusive with
      costt4_p (no institution reports both).
    dq_rules:
      - RAW-CSI-005
      - RAW-CSI-010

  - name: costt4_p
    type: double
    required: false
    business_term: BT-110
    is_cde: true
    cde_rationale: >
      Fallback source of unified cost_of_attendance_annual in Silver (used when
      costt4_a is null, for program-year institutions). BT-110 (Cost of Attendance).
    is_pii: false
    pii_rationale: ""
    description: >
      Average cost of attendance, program-year programs. Same inclusion scope as
      costt4_a. Covers 1.3% of rows (41 non-null). Mutually exclusive with costt4_a.
    dq_rules:
      - RAW-CSI-010

  - name: npt4_pub
    type: double
    required: false
    business_term: BT-111
    is_cde: true
    cde_rationale: >
      CRITICAL CDE. Direct source of net_price_annual for public institutions
      (control=1) — the ROI denominator input in the new formula
      earnings / (net_price * 4 * loan_pct). Every ROI score and Fight Student Loans
      outcome at a public school traces back through Silver to this column. P0 range
      check -$5,000 to $60,000 (negatives legitimate — aid can exceed COA). DQ rule:
      >=75% non-null where control=1. BT-111 (Net Price).
    is_pii: false
    pii_rationale: ""
    description: >
      Average net price for public institutions (COA minus grants/scholarships). ROI
      denominator for control=1. Observed range -$1,180 (Skyline College) to $32,598.
      Negative values are legitimate — they occur when average grant aid exceeds total
      cost of attendance. 774 non-null rows (89.3% of 867 public institutions).
    dq_rules:
      - RAW-CSI-006
      - RAW-CSI-011

  - name: npt4_priv
    type: double
    required: false
    business_term: BT-111
    is_cde: true
    cde_rationale: >
      CRITICAL CDE. Direct source of net_price_annual for private institutions
      (control IN (2,3)). Same role as npt4_pub for the private branch of the ROI
      formula. P0 range check -$5,000 to $80,000. DQ rule: >=65% non-null where
      control=2. BT-111 (Net Price).
    is_pii: false
    pii_rationale: ""
    description: >
      Average net price for private institutions (nonprofit or for-profit). ROI
      denominator for control IN (2,3). Observed range $1,525-$77,180 at the average
      level (quintile-level private values do go negative, e.g., MIT Q1 at -$4,129).
      1,239 non-null for control=2 (70.6%); for-profit (control=3) coverage is 52.6%.
    dq_rules:
      - RAW-CSI-007
      - RAW-CSI-012

  - name: npt41_pub
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: >
      Drives net_price_q1 in Silver for public institutions ($0-$30K income bracket).
      Feeds income-quintile ROI. BT-112 (Net Price by Income Quintile).
    is_pii: false
    pii_rationale: ""
    description: "Average net price for $0-$30K family income, public institutions."
    dq_rules:
      - RAW-CSI-013

  - name: npt42_pub
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: >
      Drives net_price_q2 in Silver for public institutions ($30K-$48K income bracket).
      Feeds income-quintile ROI. BT-112.
    is_pii: false
    pii_rationale: ""
    description: "Average net price for $30K-$48K family income, public institutions."

  - name: npt43_pub
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: >
      Drives net_price_q3 in Silver for public institutions ($48K-$75K income bracket
      — median bracket, most common student profile at public institutions). BT-112.
    is_pii: false
    pii_rationale: ""
    description: "Average net price for $48K-$75K family income, public institutions."

  - name: npt44_pub
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: "Drives net_price_q4 in Silver for public institutions ($75K-$110K income bracket). BT-112."
    is_pii: false
    pii_rationale: ""
    description: "Average net price for $75K-$110K family income, public institutions."

  - name: npt45_pub
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: >
      Drives net_price_q5 in Silver for public institutions ($110K+ income bracket).
      Part of the aid-monotonicity DQ invariant (net_price_q1 <= net_price_q5). BT-112.
    is_pii: false
    pii_rationale: ""
    description: >
      Average net price for $110K+ family income, public institutions. Typically
      closest to full COA at a public school since highest-income students receive
      least aid.
    dq_rules:
      - RAW-CSI-013

  - name: npt41_priv
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: >
      Drives net_price_q1 in Silver for private institutions ($0-$30K income bracket).
      BT-112.
    is_pii: false
    pii_rationale: ""
    description: >
      Average net price for $0-$30K family income, private institutions. Can be
      negative at high-endowment schools (e.g., MIT Q1 at -$4,129).
    dq_rules:
      - RAW-CSI-013

  - name: npt42_priv
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: "Drives net_price_q2 in Silver for private institutions ($30K-$48K income bracket). BT-112."
    is_pii: false
    pii_rationale: ""
    description: "Average net price for $30K-$48K family income, private institutions."

  - name: npt43_priv
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: "Drives net_price_q3 in Silver for private institutions ($48K-$75K income bracket). BT-112."
    is_pii: false
    pii_rationale: ""
    description: "Average net price for $48K-$75K family income, private institutions."

  - name: npt44_priv
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: "Drives net_price_q4 in Silver for private institutions ($75K-$110K income bracket). BT-112."
    is_pii: false
    pii_rationale: ""
    description: "Average net price for $75K-$110K family income, private institutions."

  - name: npt45_priv
    type: double
    required: false
    business_term: BT-112
    is_cde: true
    cde_rationale: >
      Drives net_price_q5 in Silver for private institutions ($110K+ income bracket).
      Part of the aid-monotonicity DQ invariant. BT-112.
    is_pii: false
    pii_rationale: ""
    description: >
      Average net price for $110K+ family income, private institutions. Typically
      closest to full COA at a private school since highest-income students receive
      least aid.
    dq_rules:
      - RAW-CSI-013

  - name: tuitionfee_in
    type: double
    required: false
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      In-state tuition and fees. Display/receipt only — already rolled into COA. Not a
      driver of the ROI formula (net_price_annual is the authoritative cost input).
      Observed range $600-$69,330, median $15,222. 72 public schools have equal
      in/out-of-state tuition (tribal colleges, online-only, uniform-pricing systems).
    dq_rules:
      - RAW-CSI-008

  - name: tuitionfee_out
    type: double
    required: false
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Out-of-state tuition and fees. Display/receipt only — already rolled into COA.
      At private institutions, typically equal to tuitionfee_in.

  - name: roomboard_on
    type: double
    required: false
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      On-campus room and board. Display/receipt only — already rolled into COA. Null
      at ~43% of institutions that lack on-campus housing. Observed range
      $1,000-$29,874, median $12,040.
    dq_rules:
      - RAW-CSI-009

  - name: roomboard_off
    type: double
    required: false
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Off-campus room and board (not with family). Display/receipt only — already
      rolled into COA.

  - name: booksupply
    type: double
    required: false
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Books and supplies estimate. Display/receipt only — already rolled into COA.
      Can be $0 (32 schools include books in tuition or provide them free).

  - name: ingested_at
    type: timestamp
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Pipeline metadata — Bronze promotion timestamp. Identical across all rows in a
      single batch load (acts as a batch identifier, not a per-row event time).

  - name: source_url
    type: string
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: >
      Pipeline metadata — public College Scorecard download URL. No secrets-hygiene
      concern (unauthenticated public endpoint, unlike BEA RPP).

  - name: source_method
    type: string
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: "Pipeline metadata — literal 'bulk_csv_download'."

  - name: load_date
    type: date
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
    pii_rationale: ""
    description: "Pipeline metadata — date of load."

dq_summary:
  total_rules: 13
  p0_rules: 7
  p1_rules: 6
  p2_rules: 0
  rules_reference: governance/dq-rules/raw-ingest-college-scorecard-institution.json

cde_summary:
  total_columns: 28
  cde_columns: 17
  pii_columns: 0
  sensitivity_classification: public
  regulatory_frameworks: []
  cde_reference: governance/cde-registry/raw-ingest-college-scorecard-institution-cdes.md
  cde_density_commentary: >
    60.7% CDE density is notably higher than the 37.5% density on the sibling
    raw-college-scorecard Bronze contract (6/16 flagged). The explanation is not
    governance inflation — this ingest was explicitly scoped to fields that drive a
    new business stat. The 17 CDEs break down as 1 grain key (unitid) + 2 scope/
    multiplexer fields (control, preddeg) + 2 COA sources (costt4_a, costt4_p) + 2
    primary net price (npt4_pub, npt4_priv) + 10 quintile net prices (npt41-45_pub/priv).
    The non-CDE residue is the display/receipt surface area (tuition, room-board,
    books) and pipeline metadata.

glossary_terms:
  - BT-110  # Cost of Attendance (COA)
  - BT-111  # Net Price
  - BT-112  # Net Price by Income Quintile

breaking_changes:
  policy: >
    Semantic versioning. Breaking changes (column removal, rename, type change, grain
    change, filter predicate change) require a major version bump and a 30-day
    deprecation notice. Non-breaking changes (column addition, description update,
    threshold tightening where existing data passes) can ship as a minor or patch bump
    without deprecation.
  notification: "Logged in governance/audit-trail/"
  backward_compat:
    current_version: "1.0.0"
    previous_version: null
    notes: "New table. No backward-compat obligations. First emission."

downstream_consumers:
  - base.college_scorecard_institution (Silver zone — unified net_price_annual, cost_of_attendance_annual, institution_control label, 4-year totals, quintile fields)
  - consumable.career_outcomes (Gold zone — LEFT JOIN on unitid; adds net_price_annual, cost_of_attendance_annual, net_price_4yr, institution_control, tuition_in_state, tuition_out_of_state, room_board_on_campus)
  - ROI formula (earnings / (net_price × 4 × loan_pct))
  - Fight Student Loans boss (stat engine consumer of ROI)
  - Reveal screen receipts (full cost breakdown: COA, net price, tuition, room & board, books)
  - Income-quintile ROI stretch goal

known_coverage_gaps:
  - description: "806 institutions (26.5%) have neither costt4_a nor costt4_p. Concentrated in PREDDEG=0 (288) and PREDDEG=4 (280)."
    impact: "cost_of_attendance_annual will be null for these institutions."
  - description: "CONTROL=3 (for-profit) has only 52.6% net-price coverage and 44.3% COA coverage."
    impact: "Many for-profit-school programs will have null cost data after Gold LEFT JOIN."
  - description: "207 field-of-study UNITIDs (8.1% of 2,559) have no institution match here."
    impact: "Those programs will get null cost data via the Gold LEFT JOIN. Expected; not a DQ failure."
