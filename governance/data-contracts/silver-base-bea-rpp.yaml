staff_review_conditions:
  condition_6_implemented:
    source: governance/approvals/raw-ingest-bea-rpp-staff-review.md
    description: >
      Condition 6 (Ruling 2 of the Bronze staff review) is implemented at this
      Silver layer. The verification_status column (column 7 of this contract,
      business term BT-105) is derived from a hard-coded allow-list of the 8
      spec-verified state_fips codes ({'06','15','11','34','05','28','19','40'})
      and assigns 'bea_official' to those 8 rows and 'estimate' to the other 43.
      The companion P0 DQ rule asserts COUNT(*) WHERE verification_status='bea_official' = 8.
      When the live BEA API refresh lands, the allow-list becomes all 51 codes
      and the DQ rule flips to = 51 — a contract-level minor version bump, not
      a breaking change.
  condition_7_carry_forward:
    owner: "@primary-agent on gold-regional-price-parities and mcp-bea-rpp specs"
    description: >
      Condition 7 of the Bronze staff review (MCP tool hallucination guard) is
      forward-only from this contract. Gold (consumable.regional_price_parities)
      MUST propagate verification_status as a first-class column on every row,
      and the MCP tool response MUST return a 'data_source' field derived from
      it with a strict-mode option that refuses to return 'estimate' rows.
      Silver is the canonical source for the flag; Gold and MCP are the surfaces.
      This contract does not implement those consumers but documents the
      carry-forward requirement so the Gold/MCP pre-reviews cannot overlook it.

breaking_changes:
  policy: >
    Semantic versioning. Breaking changes (column removal, rename, type change,
    grain change, reduction of the CDE set, relaxation of P0 DQ thresholds)
    require a new major version and 30-day deprecation notice. Non-breaking
    changes (column addition, description update, flipping the
    verification_status allow-list from 8 states to 51 states when the live
    BEA API refresh lands, extension of the data_year set) ship as a minor
    bump without deprecation.
  notification: "Logged in governance/audit-trail/"

downstream_consumers:
  - consumable.regional_price_parities (Gold zone — cost_tier and adjusted_* display fields; MUST carry verification_status per Condition 7)
  - MCP tool get_regional_price_parity(state) (MUST return data_source per row per Condition 7)
  - MCP tool compare_purchasing_power(salary, state_a, state_b)
  - Frontend salary adjustment display
  - Fight Location Lock boss (stretch goal)
