staff_review_conditions:
  condition_6_discharged_at_silver:
    source: governance/approvals/raw-ingest-bea-rpp-staff-review.md
    description: >
      Condition 6 (the verification_status column itself) was discharged
      at the Silver layer (base.bea_rpp, column 7). Gold explicitly
      preserves the column as column 13 of 15 and re-affirms its CDE flag.
  condition_7_implemented_at_gold:
    source: governance/approvals/raw-ingest-bea-rpp-staff-review.md
    status: IMPLEMENTED HERE
    description: >
      Condition 7 of the Bronze staff review is implemented at this Gold
      layer. The verification_status column is carried forward from Silver
      unchanged. The P0 rule GLD-RPP-036 pins COUNT(*) WHERE
      verification_status='bea_official' = 8, and the P0 rule GLD-RPP-037
      enforces the allow-list subset check on the 8 canonical FIPS codes
      ({'05','06','11','15','19','28','34','40'}). When the live BEA API
      refresh lands, both rules flip in lockstep with SIL-BEA-023 /
      SIL-BEA-024 — a minor version bump, not a breaking change.
  condition_7_carry_forward_to_mcp:
    owner: "@primary-agent on mcp-bea-rpp spec"
    status: DISCHARGED
    discharged_at: 2026-04-11
    discharged_by: mcp-bea-rpp spec (governance/approvals/mcp-bea-rpp-post-review.md)
    mcp_contract: governance/data-contracts/mcp-bea-rpp.yaml
    description: >
      Condition 7's MCP-layer requirement was forward-only from this Gold
      contract and is now DISCHARGED by mcp-bea-rpp. The mcp-bea-rpp spec:
      (1) Includes a 'data_source' field on every tool response row derived
      from verification_status (MCP-BEA-001, MCP-BEA-003, 16/16 anchor
      cases pass); and
      (2) Supports a 'verified_only' strict mode on both tools that refuses
      to return rows where verification_status='estimate'
      (MCP-BEA-007, MCP-BEA-008, MCP-BEA-009 — 8/8 verified pass, 43/43
      estimate refused, 4/4 compare-mixed refusals pass). The full Bronze
      → Silver → Gold → MCP chain for Condition 7 is now closed end-to-end
      and verified by 65/65 eval cases + 16/16 MCP-BEA DQ rules + 99/99
      mcp-bea-rpp pytest suite.

breaking_changes:
  policy: >
    Semantic versioning. Breaking changes (column removal, rename, type
    change, grain change, reduction of the CDE set, relaxation of P0 DQ
    thresholds, tightening of the cost_tier breakpoints, removal of any of
    the 4 adjusted_Nk columns) require a new major version and 30-day
    deprecation notice. Non-breaking changes (column addition, description
    update, flipping the verification_status allow-list from 8 states to
    51 states when the live BEA API refresh lands, extension of the
    data_year set) ship as a minor bump without deprecation.
  notification: "Logged in governance/audit-trail/"

downstream_consumers:
  - MCP tool get_regional_price_parity(state) — returns a row of this table verbatim; MUST include data_source per row per Condition 7 carry-forward
  - MCP tool compare_purchasing_power(salary, state_a, state_b) — reads purchasing_power_multiplier from two rows
  - Frontend salary adjustment display — reads cost_tier (color coding) and the 4 adjusted_Nk columns (display values)
  - Fight Location Lock boss (stretch goal) — reads cost_tier for difficulty tiering

lineage_reference: governance/lineage/gold-regional-price-parities-20260411.json
