    description: "Provenance URL (BEA API endpoint) or local cache path recording where the row was sourced from. The ingestor MUST NOT persist the substituted UserID=<API_KEY> query parameter into this column — store URL template or redact as UserID=REDACTED. Secrets-hygiene guardrail."
