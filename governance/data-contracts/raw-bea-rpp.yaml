columns:
  - name: geo_fips
    type: string
    required: true
    business_term: BT-100
    is_cde: true
    cde_rationale: >
      Primary key and the sole join key for every downstream use of this table.
      The student's state selection (from the frontend or MCP tool) resolves to
      a state_fips that joins back to this column through Silver and Gold.
      No other column can substitute — geo_name is display-only, and rpp_all_items
      is not unique (Iowa and Oklahoma tie at 87.8). Also the dedup grain for the
      Bronze->Silver promote. ANSI/FIPS external standard. Auto-approved as CDE
      per domain-context.md BEA RPP section.
    is_pii: false
    pii_rationale: ""
    description: "2-digit zero-padded ANSI/FIPS state code (e.g., '06' for California, '19' for Iowa, '11' for DC). 51 distinct values, 100% unique. Intentional gaps at 03, 07, 14, 43, 52 are unassigned FIPS codes."
    dq_rules:
      - RAW-BEA-004
      - RAW-BEA-009
      - RAW-BEA-010
      - RAW-BEA-011

  - name: geo_name
    type: string
    required: true
    business_term: BT-101
    is_cde: true
    cde_rationale: >
      Full human-readable state name. Flagged as CDE because it is the display
      label served by the MCP tool response and the frontend salary-adjustment UI
      (e.g., "In California, that's equivalent to about $58,700 in purchasing power").
      Also the fallback identifier when a user or LLM passes a state by name rather
      than FIPS code or abbreviation. Without it, Gemma cannot produce the
      user-facing narrative. Auto-approved as CDE per domain-context.md BEA RPP section.
    is_pii: false
    pii_rationale: ""
    description: "Full human-readable state or jurisdiction name (e.g., 'California', 'Iowa', 'District of Columbia'). 51 distinct values, 100% unique. Title-case ASCII. 'District of Columbia' is spelled out in full, not 'DC'."
    dq_rules:
      - RAW-BEA-005

  - name: rpp_all_items
    type: double
    required: true
    business_term: BT-098
    is_cde: true
    cde_rationale: >
      The entire analytical payload of this table. Every derived field in Silver
      (purchasing_power_multiplier) and Gold (cost_tier, adjusted_30k/50k/75k/100k)
      is a pure function of this one column. Every salary adjustment displayed to
      students — in Stage 2 Reveal, the Branch Tree, the Compare screen, and the
      stretch-goal Fight Location Lock boss — is national_salary * (100 / rpp_all_items).
      If this column is wrong for a state, every salary figure displayed to any
      student who selects that state is wrong. Highest-criticality column in the
      table. Auto-approved as CDE per domain-context.md BEA RPP section.
      Cross-reference BT-098 (Regional Price Parity).
    is_pii: false
    pii_rationale: ""
    description: "BEA Regional Price Parity index, All Items line code, national baseline = 100.0. Values above 100 mean prices are above the national average; below 100 means cheaper than national. Observed range in current load: [86.9, 110.7]. 50 distinct values (not 51) because Iowa and Oklahoma legitimately tie at 87.8."
    dq_rules:
      - RAW-BEA-002
      - RAW-BEA-003
      - RAW-BEA-007
      - RAW-BEA-008
      - RAW-BEA-017
      - RAW-BEA-018
      - RAW-BEA-019

  - name: data_year
    type: int
    required: true
    business_term: BT-102
    is_cde: true
    cde_rationale: >
      Provenance-critical temporal dimension. The RPP index is re-published
      annually by BEA, and values shift year-over-year as the underlying price
      index methodology updates. A row labeled with the wrong data_year silently
      misrepresents the vintage of every downstream purchasing-power figure.
      Governs annual-refresh replacement semantics and distinguishes the 8
      spec-verified rows from the 43 estimated placeholder rows in the current
      load. The DQ rule pinning data_year = 2024 is a P0 guardrail.
    is_pii: false
    pii_rationale: ""
    description: "Year of the BEA RPP estimate. Constant 2024 across all 51 rows in the current load. Bump DQ rule RAW-BEA-006 on annual refresh to the new target year."
    dq_rules:
      - RAW-BEA-006

  - name: source_url
    type: string
    required: true
    is_cde: false
    cde_rationale: ""
    is_pii: false
