# Chaos Manifest: raw-ingest-bls-oews
#
# Declarative scenario manifest for the BLS OEWS Bronze table.
# Generated by governance/chaos-manifests/bls_oews_chaos_runner.py.
#
# Each scenario describes:
#   - the corruption injected into a copy of bronze.bls_oews
#   - the rule expected to fire (intent only — barrier respected)
#   - the verdict observed across the 5-cycle run
#
# Source row counts and field semantics come from
# governance/eda/raw-bls-oews-eda.md (831 rows, 5 suppressed medians,
# 45 top-coded rows, 0 monotonicity violations on real data).

spec: raw-ingest-bls-oews
table: bronze.bls_oews
shadow_table: shadow_bronze.bls_oews
source_row_count: 831
manifest_version: "1.0"
runner: governance/chaos-manifests/bls_oews_chaos_runner.py
manifest_json: governance/chaos-manifests/raw-ingest-bls-oews-manifest.json

cycles:
  1:
    rate: 0.05
    label: format_uniqueness_title
    scenario_ids: [S5, S6, S9]
  2:
    rate: 0.06
    label: consistency_monotonicity
    scenario_ids: [S2, S3, S4]
  3:
    rate: 0.07
    label: suppression_drift
    scenario_ids: [S1]
  4:
    rate: 0.08
    label: calibration_and_negative_wage
    scenario_ids: [S7, S10]
  5:
    rate: 0.10
    label: row_count_drop
    scenario_ids: [S8]

scenarios:
  - id: S1
    name: suppression_rate_drift
    dimension: completeness
    cycle: 3
    field: wage_annual_median
    strategy: null_required_field_on_10_rows
    description: >-
      Null wage_annual_median on 10 currently-non-null rows.  Existing
      data has 5 nulls (the 27-2xxx performance-arts cluster); adding 10
      more drops the non-null rate from 99.40% to ~98.20%.
    expected_rule_id: RAW-OEWS-004
    expected_rule_intent: non_null_floor_on_wage_annual_median
    observed_fired_rule_ids: [RAW-OEWS-004]
    verdict: CAUGHT

  - id: S2
    name: top_coding_misclass_false_positive_guard
    dimension: consistency
    cycle: 2
    field: wage_capped
    strategy: flip_capped_false_with_p90_at_239200
    description: >-
      Pick a row with p90 == 239200 and wage_capped=True; flip
      wage_capped to False.  Row still has a percentile at the cap, so
      the false-positive guard rule should fire.
    expected_rule_id: RAW-OEWS-007
    expected_rule_intent: wage_capped_false_positive_guard
    observed_fired_rule_ids: [RAW-OEWS-007]
    verdict: CAUGHT

  - id: S3
    name: top_coding_underreport
    dimension: consistency
    cycle: 2
    field: wage_capped
    strategy: flip_capped_true_without_239200_percentile
    description: >-
      Pick a row with NO percentile at 239200 (Registered Nurses
      29-1141); flip wage_capped to True.  The "wage_capped iff some
      percentile = 239200" rule should fire.
    expected_rule_id: RAW-OEWS-006
    expected_rule_intent: wage_capped_iff_some_percentile_at_239200
    observed_fired_rule_ids: [RAW-OEWS-006]
    verdict: CAUGHT

  - id: S4
    name: monotonicity_inversion
    dimension: validity
    cycle: 2
    field: [wage_annual_p25, wage_annual_p75]
    strategy: swap_p25_and_p75_on_one_row
    description: >-
      Swap wage_annual_p25 and wage_annual_p75 on Nurse Practitioners
      29-1171 (full-data row).  Monotonicity rule p25 ≤ median ≤ p75
      should fire on this row.
    expected_rule_id: RAW-OEWS-005
    expected_rule_intent: monotonic_p25_le_median_le_p75
    observed_fired_rule_ids: [RAW-OEWS-005]
    verdict: CAUGHT

  - id: S5
    name: soc_format_corruption
    dimension: validity
    cycle: 1
    field: soc_code
    strategy: strip_hyphen_from_15-1252
    description: >-
      Replace `15-1252` with `151252` (no hyphen).  The XX-XXXX format
      regex rule should fire.
    expected_rule_id: RAW-OEWS-002
    expected_rule_intent: soc_regex_XX-XXXX
    observed_fired_rule_ids: [RAW-OEWS-002]
    verdict: CAUGHT

  - id: S6
    name: soc_uniqueness_violation
    dimension: uniqueness
    cycle: 1
    field: soc_code
    strategy: duplicate_row_same_soc
    description: >-
      Append a deep copy of Registered Nurses (29-1141) preserving
      soc_code.  Uniqueness rule on soc_code should fire.
    expected_rule_id: RAW-OEWS-003
    expected_rule_intent: unique_soc_code
    observed_fired_rule_ids: [RAW-OEWS-003]
    verdict: CAUGHT

  - id: S7
    name: calibration_drift_softdev
    dimension: accuracy
    cycle: 4
    field: wage_annual_median
    strategy: set_15-1252_median_to_200k
    description: >-
      Set Software Developers (15-1252) median to $200,000.  The
      Bronze spot-check rule (median in $110K–$150K window) should
      fire.  Side-effect: monotonicity also fires because $200K >
      $169K p75.
    expected_rule_id: RAW-OEWS-008
    expected_rule_intent: spot_check_softdev_median_in_110k_150k
    observed_fired_rule_ids: [RAW-OEWS-008, RAW-OEWS-005]
    verdict: CAUGHT
    notes: >-
      RAW-OEWS-005 fired as a side effect (monotonicity broken when
      median > p75).  This is correct behavior, not a false positive.

  - id: S8
    name: row_count_drop_low
    dimension: volume
    cycle: 5
    field: row_count
    strategy: drop_50_rows_excluding_spot_checks
    description: >-
      Drop 50 non-spot-check rows.  831 - 50 = 781, which falls below
      the spec's lower bound of 800.  The row_count rule should fire.
    expected_rule_id: RAW-OEWS-001
    expected_rule_intent: row_count_in_800_900
    observed_fired_rule_ids: [RAW-OEWS-001]
    verdict: CAUGHT

  - id: S9
    name: title_corruption_empty
    dimension: completeness
    cycle: 1
    field: occupation_title
    strategy: set_empty_string
    description: >-
      Set occupation_title='' on a non-spot-check row.  The title
      non-null/non-empty rule should fire.
    expected_rule_id: RAW-OEWS-010
    expected_rule_intent: occupation_title_non_null_or_non_empty
    observed_fired_rule_ids: [RAW-OEWS-010]
    verdict: CAUGHT

  - id: S10
    name: negative_wage_attack
    dimension: [validity, reasonableness]
    cycle: 4
    field: wage_annual_p25
    strategy: set_p25_to_-5000_with_p10_intact
    description: >-
      Probe.  Set wage_annual_p25 = -5000 on a non-spot-check row.
      In the 5-cycle run this co-occurred with S7 so monotonicity
      caught it as a side effect.  An isolated re-run with p10 also
      pushed negative (so monotonicity still holds) confirmed that
      NO P0 RULE flags negative wages directly.
    expected_rule_id: null
    expected_rule_intent: wage_non_negative_check (NOT_PRESENT_TODAY)
    observed_fired_rule_ids: []
    verdict: GAP_UNCAUGHT
    is_gap_probe: true
    isolation_probe_run: true
    isolation_probe_result: 0_of_10_rules_fired

# -- Negative-control / sanity expectations -----------------------------------
# In the 5-cycle run, every rule that fired matched a manifest entry's
# expected dimension.  No rule fired without a corresponding injection
# (no false positives observed).

# -- Silver / Gold synthetic chaos manifests ---------------------------------
# These tables do not yet exist (per spec workflow: Silver promotion is
# step 8, Gold enrichment is step 10).  When they materialize, the
# scenarios below should be applied to the corresponding shadow tables.

silver_synthetic_scenarios:
  table: base.bls_oews
  shadow_table: shadow_base.bls_oews
  notes: >-
    Silver promotes from bronze.bls_oews and adds record_id and
    promotion timestamps.  All Bronze scenarios are expected to be
    re-detectable on Silver (Silver DQ rules are a superset of Bronze).
  scenarios:
    - id: SS1
      reuse: [S1, S2, S3, S4, S5, S6, S7, S8, S9, S10]
      description: re-run all Bronze scenarios against shadow_base.bls_oews
    - id: SS11
      name: record_id_collision
      dimension: uniqueness
      field: record_id
      strategy: duplicate_record_id_with_different_payload
      description: >-
        Inject two rows sharing the same record_id (oews-prefixed grain
        hash) but with different occupation titles.  Silver dedup-grain
        rule on record_id should fire.
      expected_rule_intent: unique_record_id
    - id: SS12
      name: malformed_soc_post_silver
      dimension: validity
      field: soc_code
      strategy: malformed_soc_survives_silver_validation
      description: >-
        Inject a row whose soc_code is "29-114X" (one alpha char) into
        the Silver shadow.  Per spec §Silver Transformations #1, Silver
        rejects malformed codes; if any leak through, Silver DQ
        SOC-format rule must fire.
      expected_rule_intent: soc_regex_XX-XXXX_in_silver

gold_synthetic_scenarios:
  table: consumable.occupation_profiles
  shadow_table: shadow_consumable.occupation_profiles
  notes: >-
    Gold enriches occupation_profiles via LEFT JOIN on base.bls_oews.
    Spec §Zone 3 §DQ Rules (Gold) defines four wage-coverage rules
    (wage_p25 non-null ≥ 90%, monotonicity through joins, ≥ 750-SOC
    coverage).
  scenarios:
    - id: GS1
      name: gold_coverage_collapse
      dimension: coverage
      field: wage_p25
      strategy: null_wage_p25_on_100_random_rows_post_join
      description: >-
        Drop 100 wage_p25 values in the Gold shadow.  Coverage
        threshold (per EDA: tighten to ≥ 800 SOCs / ≥ 98% non-null)
        should fire.
      expected_rule_intent: wage_p25_coverage_floor
    - id: GS2
      name: gold_monotonicity_break_through_join
      dimension: validity
      field: [wage_p25, wage_p75]
      strategy: swap_p25_p75_post_join
      description: >-
        After the LEFT JOIN, swap wage_p25 ↔ wage_p75 on one row.
        Gold monotonicity rule must fire (p25 ≤ p75 100%).
      expected_rule_intent: gold_monotonic_p25_le_p75
    - id: GS3
      name: gold_cross_survey_drift
      dimension: consistency
      field: [wage_p25, median_annual_wage, wage_p75]
      strategy: shift_oews_window_so_ooh_median_outside_p25_p75
      description: >-
        Set wage_p25 = $50K and wage_p75 = $60K on a row whose existing
        OOH median_annual_wage is $130K.  Gold cross-survey rule
        (wage_p25 ≤ median_annual_wage ≤ wage_p75 in ≥ 90% of rows)
        should fire if the deflation is large enough to push the global
        rate below 90%.
      expected_rule_intent: cross_survey_band_consistency
    - id: GS4
      name: gold_orphan_join
      dimension: referential_integrity
      field: soc_code
      strategy: insert_oews_row_with_soc_not_in_occupation_profiles
      description: >-
        Add an OEWS row whose soc_code does not exist in
        consumable.occupation_profiles.  After LEFT JOIN, this row is
        either dropped (correct) or surfaces as an orphan (must be
        flagged).
      expected_rule_intent: gold_no_orphan_oews_socs

# -- Recommended new rules (gaps closed) -------------------------------------
recommended_new_rules:
  - id: RAW-OEWS-011
    target_file: governance/dq-rules/raw-ingest-bls-oews.json
    priority: P0
    title: wage_annual_non_negative
    expression: >-
      For all rows where wage_annual_p10/p25/median/p75/p90 IS NOT
      NULL, the value must be >= 0.
    rationale: >-
      Closes the S10 gap.  No P0 rule today flags negative wage values
      when monotonicity is preserved (e.g. p10=-10000, p25=-5000).
      OEWS publishes only non-negative annual wages; any negative
      value is a parser bug or upstream corruption.
    evidence: >-
      Isolation probe (chaos cycle add-on) set p10=-10000, p25=-5000
      on SOC 11-1021 General and Operations Managers; 0 of 10 P0 rules
      fired.
    suggested_check_dataset: >-
      Detected_violation_count_against_real_bronze: 0 (all 826
      non-null rows are >= $30,160 per EDA distribution; rule passes
      cleanly today).

  - id: RAW-OEWS-012
    target_file: governance/dq-rules/raw-ingest-bls-oews.json
    priority: P1
    title: wage_capped_count_band
    expression: 5 <= COUNT(*) WHERE wage_capped = TRUE <= 80
    rationale: >-
      Recommended by EDA §Edge Cases for DQ Thresholds row 4 to detect
      future BLS top-code-floor changes (cap moved from $208K to
      $239,200 in 2023).  Current actual is 45.
    evidence: governance/eda/raw-bls-oews-eda.md row 187
    detected_in_chaos_run: false
    notes: >-
      Not a chaos-detected gap, but worth adding alongside the
      RAW-OEWS-011 amendment.  Detects ingestor regressions where
      every row gets flagged or none do.
