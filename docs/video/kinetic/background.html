<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>FutureProof Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #12131F;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(45, 48, 96, 0.5) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 35%, rgba(58, 61, 117, 0.35) 0%, transparent 65%),
      radial-gradient(ellipse 70% 40% at 50% 70%, rgba(35, 37, 69, 0.6) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(58, 61, 117, 0.25) 0%, transparent 55%),
      linear-gradient(180deg, #12131F 0%, #1B1D30 30%, #181A2E 60%, #12131F 100%);
  }

  .ambient-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle,
      rgba(125,212,163,0.06) 0%,
      rgba(184,169,232,0.04) 25%,
      rgba(123,184,224,0.03) 40%,
      transparent 65%);
    pointer-events: none;
    animation: ambient-breathe 6s ease-in-out infinite;
  }

  @keyframes ambient-breathe {
    0%, 100% { transform: translate(-50%, -60%) scale(1); opacity: 0.8; }
    50% { transform: translate(-50%, -60%) scale(1.08); opacity: 1; }
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #F5F0E8;
    border-radius: 9999px;
    pointer-events: none;
    animation: twinkle var(--dur) ease-in-out var(--delay) infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.05; }
    50% { opacity: 0.45; }
  }

  .noise-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.025;
    z-index: 50;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }
</style>
</head>
<body>

  <div class="star" style="top:8%;left:12%;--delay:0s;--dur:4.2s"></div>
  <div class="star" style="top:15%;left:45%;--delay:1.1s;--dur:3.8s"></div>
  <div class="star" style="top:5%;left:72%;--delay:0.4s;--dur:4.6s"></div>
  <div class="star" style="top:22%;left:88%;--delay:2.0s;--dur:3.4s"></div>
  <div class="star" style="top:35%;left:25%;--delay:0.7s;--dur:5.0s"></div>
  <div class="star" style="top:42%;left:60%;--delay:1.8s;--dur:3.6s"></div>
  <div class="star" style="top:30%;left:92%;--delay:0.2s;--dur:4.4s"></div>
  <div class="star" style="top:55%;left:10%;--delay:1.5s;--dur:4.0s"></div>
  <div class="star" style="top:50%;left:38%;--delay:2.3s;--dur:3.2s"></div>
  <div class="star" style="top:60%;left:75%;--delay:0.9s;--dur:5.2s"></div>
  <div class="star" style="top:48%;left:55%;--delay:2.6s;--dur:3.5s"></div>
  <div class="star" style="top:70%;left:20%;--delay:0.3s;--dur:4.8s"></div>
  <div class="star" style="top:75%;left:50%;--delay:1.4s;--dur:3.9s"></div>
  <div class="star" style="top:68%;left:82%;--delay:2.1s;--dur:4.1s"></div>
  <div class="star" style="top:85%;left:35%;--delay:0.6s;--dur:4.3s"></div>
  <div class="star" style="top:80%;left:65%;--delay:1.7s;--dur:3.7s"></div>
  <div class="star" style="top:90%;left:15%;--delay:2.4s;--dur:4.5s"></div>
  <div class="star" style="top:88%;left:90%;--delay:1.0s;--dur:3.3s"></div>

  <div class="noise-overlay"></div>
</body>
</html>
