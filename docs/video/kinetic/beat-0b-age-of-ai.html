<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FutureProof Video — Beat 0b: Age of AI</title>
  <link rel="stylesheet" href="_shared/tokens.css">
  <link rel="stylesheet" href="_shared/base.css">
  <style>
    /*
     * Beat 0b — "In 2026, Gemma, Gemini, Claude and Opus ushered us into the Age of AI."
     *
     * NO RED in this beat. White on dark, hierarchy through size + weight only.
     * Pre-roll 2.0s. Beat-relative timeline:
     *   0:00 In 2026,                  -> delay 2.0s
     *   0:01 Gemma, Gemini, Claude...  -> delay 3.0s
     *   0:02 ushered us into           -> delay 4.0s
     *   0:03 the Age of AI.            -> delay 5.0s, climax line, 900-weight
     *   0:04–0:06 hold all four lines, then hold indefinitely (forwards).
     */
    .content { gap: 18px; }

    .line-1 {
      font-family: var(--intro-font);
      font-weight: 700;
      font-size: 90px;
      line-height: 1.1;
      letter-spacing: -0.015em;
      color: var(--intro-text-strong);
      animation-delay: 2.0s;
    }
    .line-2, .line-3 {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 60px;
      line-height: 1.15;
      color: var(--intro-text);
    }
    .line-2 { animation-delay: 3.0s; }
    .line-3 { animation-delay: 4.0s; }
    .line-4 {
      font-family: var(--intro-font);
      font-weight: 900;
      font-size: 110px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--intro-text-strong);
      animation-delay: 5.0s;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="content">
      <div class="line-1 fx fade-in-up">In 2026,</div>
      <div class="line-2 fx fade-in">Gemma, Gemini, Claude and Opus</div>
      <div class="line-3 fx fade-in">ushered us into</div>
      <div class="line-4 fx fade-in-up">the Age of AI.</div>
    </div>
  </div>
</body>
</html>
