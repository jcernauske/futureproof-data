<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FutureProof — Brand Reveal v2 (Wizard-of-Oz card)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* =================================================================
     * FutureProof — Brand Reveal v2
     * "The Wizard-of-Oz card" — first saturated color in the video.
     *
     * Context: This card lands at ~0:35 of the video, immediately after
     * 35 seconds of cold near-black (#0F1117) editorial slides with red
     * (#DC2626) climax accents. The previous frame is Scene 1 BEAT 1h:
     * "Which is why nobody's / fixed this for kids." (red, Inter, harsh).
     *
     * The page-turn carries the audience from that frame into THIS one.
     * Then this card holds for ~3–5s and page-turns out into Scene 2
     * BEAT 6 ("The data exists but is messy").
     *
     * EMOTIONAL ARC (5 seconds):
     *   t=0.00s   PRE-LAND  Background already visible behind page-turn
     *                       so when the curl peels away the saturation
     *                       is already there — we don't fade it in over
     *                       black. The COLOR is the reveal.
     *   t=0.30s   SETTLE    Stars finish populating, ambient glow rests
     *                       at its low pulse, sparkles wait offstage.
     *   t=0.50s   IGNITION  GemmaStar glyph (✦) fades up with insight
     *                       glow. The brand mark begins.
     *   t=0.80s   WORDMARK  "FutureProof" lands with a subtle scale-up
     *                       (0.94 → 1.00) and blooms a warm halo. This
     *                       is the moment the audience exhales.
     *   t=1.40s   SPARKLES  Six 4-point sparkles cascade in around the
     *                       wordmark with a 90ms stagger. They twinkle
     *                       on a 3.6s loop thereafter — the card never
     *                       goes static.
     *   t=1.80s   TAGLINE   Tagline line slides up and settles.
     *   t=2.20s   CREDIT    "Powered by Gemma" fades in with the Gemma
     *                       sparkle glyph next to "Gemma."
     *   t=2.50s   IDLE      Ambient breathe (6s loop), star twinkle
     *                       (4s loop), sparkle pulse (3.6s loop), and
     *                       a single drift particle every ~2s rising
     *                       from the bottom edge. Card lives.
     *   t=4.50s+  HOLD      The card can hold here indefinitely; the
     *                       page-turn out fires whenever the editor
     *                       cuts to Scene 2.
     *
     * VISUAL HIERARCHY:
     *   1. Wordmark "FutureProof" (Fredoka 700, 240px, warm white)
     *   2. Gemma sparkle glyph (✦, insight lavender, just left of "F")
     *   3. Tagline (Nunito 500, 34px, text-secondary)
     *   4. "Powered by Gemma" credit (Nunito 600, 22px, text-muted +
     *      one warm-white "Gemma" with a small ✦ glyph)
     *   5. Pentagon stat-color sparkles (decorative, atmospheric)
     *   6. Star field (background atmospheric depth)
     *   7. Ambient glow (the "lights coming up" radial wash)
     *
     * COLOR DECISIONS — every pixel is a Brightpath token:
     *   bg-deep     #1B1D30   primary canvas (the indigo "sky")
     *   bg-void     #12131F   vignette edges, deepest pocket
     *   thrive      #7DD4A3   sparkle accent (growth, "we found something")
     *   caution     #F2D477   sparkle accent (gold, ERN stat color, warmth)
     *   insight     #B8A9E8   sparkle accent + GLYPH COLOR (Gemma's color)
     *   info        #7BB8E0   sparkle accent (GRW stat color, navigation)
     *   empathy     #E88BA9   sparkle accent (HMN stat color, human)
     *   text-pri    #F5F0E8   wordmark, primary text (warm white never
     *                          blue-white — this is the warmth that pops
     *                          against the prior scene's cold #FFFFFF)
     *   text-sec    #C4BFB0   tagline
     *   text-muted  #8A8595   "Powered by"
     *
     * The five sparkle colors are deliberately the five PENTAGON STAT
     * COLORS (ERN gold, ROI green, RES purple, GRW blue, HMN pink). The
     * audience isn't told this — it's a subliminal foreshadow of the
     * pentagon they're about to see in Scene 2. Visual planting.
     *
     * WHAT CHANGED FROM v1:
     *   - Wordmark is now warm-white throughout (no green "Proof"). The
     *     Brightpath wordmark spec (DESIGN.md "Brand / Wordmark") is
     *     non-negotiable: ✦ + warm-white "FutureProof", insight glyph,
     *     no color split. v1 violated this.
     *   - Added the canonical ✦ glyph (insight lavender) to the LEFT of
     *     the wordmark — the official brand mark, not just decoration.
     *   - Wordmark uses scale + halo bloom on entrance (didn't animate at
     *     all in v1). The card now FEELS like it lands.
     *   - Sparkles now twinkle/pulse on a loop (were static in v1). The
     *     card has a heartbeat now.
     *   - Star field gets a slow twinkle on a 4s loop (matches Brightpath
     *     `twinkle` keyframe).
     *   - Ambient glow now BREATHES on a 6s ease-in-out loop (matches
     *     Brightpath `ambient-breathe` keyframe). This is the "card is
     *     alive" cue.
     *   - Added a slow drift particle layer — small motes rising from
     *     the bottom every ~2s. Subtle but it kills the "static slide"
     *     reading instantly.
     *   - Tagline placeholder is now a {{TAGLINE}} swap slot, separate
     *     line above the "Powered by Gemma" credit.
     *   - Sparkle palette swapped to the FIVE PENTAGON STAT COLORS for
     *     the foreshadow (v1 used a more random scatter).
     *   - Added Space Mono import (not used on this card but registered
     *     so the iframe matches the rest of the kinetic suite).
     *
     * MOTION CHOICES — why these specific curves:
     *   - Wordmark scale 0.94 → 1.00 with cubic-bezier(0.34, 1.56, 0.64, 1)
     *     This is the Brightpath bouncy spring approximation in CSS. The
     *     overshoot (1.56 control y) gives that "landed" feel — mass.
     *     Without overshoot the card reads as a dissolve, not an arrival.
     *   - Sparkle stagger 90ms — between Brightpath's stagger.normal (80)
     *     and stagger.slow (100). Cinematic but not sleepy.
     *   - Ambient breathe 6s — straight from DESIGN.md ambient-breathe.
     *     Matches the heartbeat of the rest of the product.
     *   - Star twinkle 4s — straight from DESIGN.md twinkle keyframe.
     *   - Sparkle pulse 3.6s — slightly faster than ambient so the layers
     *     don't lock-step. Avoids the "metronome" feel.
     *
     * RECORDING WORKFLOW: open in Chrome at 1920×1080, hit reload, the
     * card plays its entrance once and then holds with its idle loops
     * forever. Capture the first 5–6s for the cut.
     * ================================================================= */

    :root {
      /* Brightpath canonical tokens (mirror tokens.css) */
      --color-bg-void: #12131F;
      --color-bg-deep: #1B1D30;
      --color-bg-mid: #232545;
      --color-bg-surface: #2D3060;
      --color-bg-raised: #3A3D75;

      --color-accent-thrive: #7DD4A3;
      --color-accent-caution: #F2D477;
      --color-accent-insight: #B8A9E8;
      --color-accent-info: #7BB8E0;
      --color-accent-empathy: #E88BA9;

      --color-text-primary: #F5F0E8;
      --color-text-secondary: #C4BFB0;
      --color-text-muted: #8A8595;

      /* Pentagon stat colors (intentionally aliased for the
         "foreshadow" sparkle palette — see header note). */
      --stat-ern: #F2D477;  /* ERN — gold */
      --stat-roi: #7DD4A3;  /* ROI — green */
      --stat-res: #B8A9E8;  /* RES — purple */
      --stat-grw: #7BB8E0;  /* GRW — blue */
      --stat-hmn: #E88BA9;  /* HMN — pink */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Nunito', -apple-system, sans-serif;
      background: var(--color-bg-void);
    }

    /* =============================================================
     * STAGE — fixed 1920×1080 composition, centered for screen capture
     * ============================================================= */
    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      max-width: 100vw;
      max-height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      /* Canonical Brightpath background gradient — opacities match
         DESIGN.md "Background Gradient" exactly (no warmth tuning).
         The ambient layer above carries the "lights coming up" warmth. */
      background-color: var(--color-bg-deep);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(45, 48, 96, 0.5) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 35%, rgba(58, 61, 117, 0.35) 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 50% 70%, rgba(35, 37, 69, 0.6) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 90%, rgba(58, 61, 117, 0.25) 0%, transparent 55%),
        linear-gradient(180deg, #12131F 0%, #1B1D30 30%, #181A2E 60%, #12131F 100%);
    }

    /* =============================================================
     * AMBIENT GLOW — copied 1:1 from the running app (frontend/src/index.css
     * `.ambient-glow`). Small 600×600 circle, very low opacities, thrive +
     * insight + info ONLY (no gold). Positioned slightly above center via
     * translate(-50%, -60%). The wordmark's own text-shadow halo carries
     * the visual presence; this layer just adds the breathing "alive" cue
     * the rest of the app has — not a stage spotlight.
     * ============================================================= */
    .ambient {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      pointer-events: none;
      background: radial-gradient(circle,
        rgba(125, 212, 163, 0.06) 0%,
        rgba(184, 169, 232, 0.04) 25%,
        rgba(123, 184, 224, 0.03) 40%,
        transparent 65%);
      transform: translate(-50%, -60%);
      animation: ambient-breathe 6s ease-in-out infinite;
      will-change: transform, opacity;
    }
    @keyframes ambient-breathe {
      0%, 100% { transform: translate(-50%, -60%) scale(1.00); opacity: 0.80; }
      50%      { transform: translate(-50%, -60%) scale(1.08); opacity: 1.00; }
    }

    /* =============================================================
     * STAR FIELD — small dots scattered across the indigo sky.
     * Each star twinkles on a 4s loop with a randomized delay so the
     * field "shimmers" rather than blinking in unison. Five "bright"
     * stars use the pentagon stat colors with a soft glow.
     * ============================================================= */
    .stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--color-text-primary);
      border-radius: 50%;
      opacity: 0.35;
      animation: twinkle 4s ease-in-out infinite;
    }
    .star.bright {
      width: 4px;
      height: 4px;
      box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
    }
    .star.gold   { color: var(--stat-ern); background: var(--stat-ern); }
    .star.green  { color: var(--stat-roi); background: var(--stat-roi); }
    .star.purple { color: var(--stat-res); background: var(--stat-res); }
    .star.blue   { color: var(--stat-grw); background: var(--stat-grw); }
    .star.pink   { color: var(--stat-hmn); background: var(--stat-hmn); }

    @keyframes twinkle {
      0%, 100% { opacity: 0.20; transform: scale(0.85); }
      50%      { opacity: 0.85; transform: scale(1.05); }
    }

    /* =============================================================
     * DRIFT PARTICLES — tiny insight-tinted motes rising from the
     * bottom edge every ~2s. Subliminal "this card is alive" cue.
     * Three particles on staggered loops so one is always on screen.
     * ============================================================= */
    .drift {
      position: absolute;
      bottom: -20px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--color-accent-insight);
      box-shadow: 0 0 8px var(--color-accent-insight);
      opacity: 0;
      animation: drift-up 6s linear infinite;
    }
    .drift-1 { left: 28%; animation-delay: 2.5s; }
    .drift-2 { left: 52%; animation-delay: 4.5s; }
    .drift-3 { left: 74%; animation-delay: 6.5s; }
    @keyframes drift-up {
      0%   { transform: translateY(0)     translateX(0); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.4; }
      100% { transform: translateY(-1100px) translateX(20px); opacity: 0; }
    }

    /* =============================================================
     * TITLE BLOCK — wordmark + tagline + credit, centered.
     * ============================================================= */
    .title-block {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* "Introducing" pre-title — small, tracked-out, all-caps. Lands
       BEFORE the brand mark (t=0.20s) so the audience reads it as a
       setup beat, not a label competing with the wordmark. Color is
       text-muted so it never out-shouts the warm-white "FutureProof"
       arriving 0.6s later. */
    .pre-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 26px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(8px);
      animation: pre-title-in 0.7s cubic-bezier(0.2, 0.9, 0.3, 1.0) 0.20s forwards;
    }
    @keyframes pre-title-in {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Brand mark row: ✦ + FutureProof, on a single baseline.
       Per DESIGN.md "Brand / Wordmark" — the glyph is canonical, lives
       to the LEFT of the wordmark, is always insight lavender, and is
       inseparable from the wordmark. v1 omitted it; this is the fix. */
    .brand-row {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: 28px;
      opacity: 0;
      transform: scale(0.94);
      animation: brand-land 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.50s forwards;
    }
    @keyframes brand-land {
      0%   { opacity: 0;    transform: scale(0.94) translateY(8px); }
      60%  { opacity: 1;    transform: scale(1.02) translateY(0); }
      100% { opacity: 1;    transform: scale(1.00) translateY(0); }
    }

    /* The canonical ✦ glyph. Always insight (#B8A9E8). Sized to match
       the wordmark cap height — Fredoka 200px caps land near 140px. */
    .brand-glyph {
      font-family: 'Fredoka', sans-serif;
      font-weight: 500;
      font-size: 140px;
      line-height: 1;
      color: var(--color-accent-insight);
      /* Twin glow — soft long halo + tight inner bloom. Same recipe as
         the GemmaSpinner glow but scaled for hero size. */
      text-shadow:
        0 0 24px rgba(184, 169, 232, 0.55),
        0 0 60px rgba(184, 169, 232, 0.30),
        0 0 120px rgba(184, 169, 232, 0.18);
      /* Shimmers like the bright stars in the background — same 4s
         period as the star twinkle, scale + brightness modulation,
         opacity dipping into a narrow brand-safe range. The text-shadow
         halo brightens with the filter so the glow visibly "breathes." */
      animation: glyph-shimmer 4s ease-in-out infinite;
      animation-delay: 1.4s;
    }
    @keyframes glyph-shimmer {
      0%, 100% { transform: scale(0.96); filter: brightness(0.92); opacity: 0.82; }
      50%      { transform: scale(1.06); filter: brightness(1.28); opacity: 1.00; }
    }

    /* The wordmark. Single token "FutureProof", warm white, no split.
       Letter-spacing -0.025em pulls the cap-O's together so the mark
       reads as one shape, not two words. */
    .wordmark {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 200px;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--color-text-primary);
      /* Layered halo — three radii so the bloom feels diffuse, not
         like a photoshop outer-glow. Tinted faintly insight + thrive
         to pull warmth out of the underlying ambient glow. */
      text-shadow:
        0 0 40px  rgba(245, 240, 232, 0.18),
        0 0 90px  rgba(184, 169, 232, 0.18),
        0 0 140px rgba(125, 212, 163, 0.12);
    }

    /* Tagline — copywriter swaps {{TAGLINE}} with the final line.
       Slides up + fades in at t=1.80s, after the brand mark settles. */
    .tagline {
      margin-top: 36px;
      font-family: 'Nunito', sans-serif;
      font-weight: 500;
      font-size: 34px;
      letter-spacing: 0.02em;
      color: var(--color-text-secondary);
      opacity: 0;
      transform: translateY(14px);
      animation: tagline-in 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.0) 1.80s forwards;
    }
    @keyframes tagline-in {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Credit row — "Powered by Gemma" with a small ✦ glyph beside
       "Gemma" to echo the brand mark and sell the partnership.
       Fades in at t=2.20s. */
    .credit {
      margin-top: 56px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      opacity: 0;
      animation: credit-in 0.9s ease-out 2.20s forwards;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    @keyframes credit-in {
      to { opacity: 1; }
    }
    .credit .credit-glyph {
      font-family: 'Fredoka', sans-serif;
      font-weight: 500;
      font-size: 22px;
      color: var(--color-accent-insight);
      text-shadow: 0 0 10px rgba(184, 169, 232, 0.55);
      /* Same shimmer family as the hero glyph but a slightly faster
         period (3.6s vs 4.0s) so the two glyphs never lock-step. */
      animation: glyph-shimmer 3.6s ease-in-out infinite;
      animation-delay: 2.6s;
    }
    .credit .gemma-name {
      color: var(--color-text-primary);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: none;
      font-size: 26px;
    }

    /* =============================================================
     * VIGNETTE — soft darkening at the edges, focuses the center.
     * Slightly heavier than v1 to make the hero pop more after the
     * grayscale predecessor scenes' near-black backgrounds.
     * ============================================================= */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 45%,
        rgba(18, 19, 31, 0.55) 100%);
    }

    /* =============================================================
     * NOISE — Brightpath surface treatment at 2.5% opacity. Kills
     * the "flat CSS" reading on a 1920×1080 record. Inline SVG so
     * the file stays self-contained.
     * ============================================================= */
    .noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    /* =============================================================
     * REDUCED MOTION — Brightpath rule: every keyframe must respect
     * prefers-reduced-motion. Card holds at its resting frame.
     * ============================================================= */
    @media (prefers-reduced-motion: reduce) {
      .ambient,
      .star,
      .brand-glyph,
      .credit .credit-glyph,
      .drift {
        animation: none !important;
      }
      .brand-glyph,
      .credit .credit-glyph { opacity: 1; transform: scale(1); filter: none; }
      .brand-row  { opacity: 1; transform: scale(1); }
      .tagline    { opacity: 1; transform: translateY(0); }
      .credit     { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="stage">

    <!-- Layer 1: ambient breathing glow behind everything -->
    <div class="ambient"></div>

    <!-- Layer 2: star field across the indigo sky.
         Mostly small dim white twinkles + five accent-colored "bright"
         stars in pentagon stat colors. Each star has its own twinkle
         delay (set inline via animation-delay) so the field shimmers
         instead of blinking. -->
    <div class="stars">
      <!-- Dim background twinkles -->
      <div class="star" style="top:  6%; left: 11%; animation-delay: 0.2s;"></div>
      <div class="star" style="top: 13%; left: 36%; animation-delay: 1.1s;"></div>
      <div class="star" style="top:  5%; left: 61%; animation-delay: 0.6s;"></div>
      <div class="star" style="top: 11%; left: 79%; animation-delay: 2.4s;"></div>
      <div class="star" style="top: 19%; left:  7%; animation-delay: 1.7s;"></div>
      <div class="star" style="top: 22%; left: 46%; animation-delay: 0.9s;"></div>
      <div class="star" style="top:  9%; left: 88%; animation-delay: 3.0s;"></div>
      <div class="star" style="top: 17%; left: 28%; animation-delay: 0.4s;"></div>
      <div class="star" style="top: 26%; left: 70%; animation-delay: 2.1s;"></div>
      <div class="star" style="top: 32%; left:  6%; animation-delay: 1.5s;"></div>
      <div class="star" style="top: 32%; left: 92%; animation-delay: 2.7s;"></div>
      <div class="star" style="top: 39%; left: 35%; animation-delay: 0.7s;"></div>
      <div class="star" style="top: 43%; left: 65%; animation-delay: 1.3s;"></div>
      <div class="star" style="top: 60%; left:  4%; animation-delay: 2.9s;"></div>
      <div class="star" style="top: 64%; left: 95%; animation-delay: 0.3s;"></div>
      <div class="star" style="bottom: 11%; left: 10%; animation-delay: 1.8s;"></div>
      <div class="star" style="bottom: 18%; left: 33%; animation-delay: 0.5s;"></div>
      <div class="star" style="bottom:  8%; left: 56%; animation-delay: 2.2s;"></div>
      <div class="star" style="bottom: 14%; left: 76%; animation-delay: 1.0s;"></div>
      <div class="star" style="bottom: 22%; left: 91%; animation-delay: 3.1s;"></div>
      <div class="star" style="bottom:  6%; left: 25%; animation-delay: 0.8s;"></div>
      <div class="star" style="bottom: 27%; left: 68%; animation-delay: 2.5s;"></div>

      <!-- Pentagon-stat-color "bright" stars — accent foreshadow -->
      <div class="star bright gold"   style="top: 12%; left: 30%; animation-delay: 0.4s;"></div>
      <div class="star bright purple" style="top: 19%; left: 73%; animation-delay: 2.0s;"></div>
      <div class="star bright pink"   style="top:  8%; left: 50%; animation-delay: 1.2s;"></div>
      <div class="star bright green"  style="top: 24%; left: 20%; animation-delay: 2.8s;"></div>
      <div class="star bright blue"   style="top: 15%; left: 58%; animation-delay: 0.6s;"></div>
      <div class="star bright gold"   style="top: 35%; left: 82%; animation-delay: 1.6s;"></div>
      <div class="star bright purple" style="bottom: 14%; left: 42%; animation-delay: 1.9s;"></div>
      <div class="star bright pink"   style="bottom: 20%; left: 85%; animation-delay: 0.7s;"></div>
      <div class="star bright green"  style="bottom:  9%; left: 60%; animation-delay: 2.3s;"></div>
      <div class="star bright blue"   style="bottom: 30%; left: 15%; animation-delay: 1.4s;"></div>
    </div>

    <!-- Layer 4: drift particles (3 staggered loops, always one on screen) -->
    <div class="drift drift-1"></div>
    <div class="drift drift-2"></div>
    <div class="drift drift-3"></div>

    <!-- Layer 5: title block -->
    <div class="title-block">
      <!--
        Pre-title — sets up the brand mark with a tracked-out
        "Introducing" beat that lands just before the wordmark.
      -->
      <div class="pre-title">Introducing</div>

      <!--
        Brand row — canonical ✦ + FutureProof.
        Per DESIGN.md the glyph is U+2726 BLACK FOUR POINTED STAR,
        always insight lavender, always to the left of the wordmark.
        This is the official brand mark, not a decoration.
      -->
      <div class="brand-row">
        <span class="brand-glyph" aria-hidden="true">&#x2726;</span>
        <span class="wordmark">FutureProof</span>
      </div>

    </div>

    <!-- Layer 6: vignette + noise (always last so they sit on top) -->
    <div class="vignette"></div>
    <div class="noise"></div>

  </div>

</body>
