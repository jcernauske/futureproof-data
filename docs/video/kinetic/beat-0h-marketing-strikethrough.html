<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FutureProof Video — Beat 0h: Marketing Strikethrough (Signature)</title>
  <link rel="stylesheet" href="_shared/tokens.css">
  <link rel="stylesheet" href="_shared/base.css">
  <style>
    /*
     * Beat 0h — "And the colleges? They're [marketing to / preying on]
     *            the innocence of kids."
     *
     * Red usage:
     *   - "preying on" is RED — the honest accusation
     *   - strikethrough line is RED
     *   - "marketing to" stays WHITE — the swap from honest red to
     *     neutral white mirrors the editorial softening from "preying"
     *     to "marketing"
     *
     * Pre-roll 2.0s.
     *   0:00 "And the colleges?"          -> delay 2.0s
     *   0:01 "They're …"                  -> delay 3.0s
     *   0:02 "preying on" types in        -> delay 4.0s, typewriter 0.5s, RED
     *   0:03 "the innocence of kids."     -> delay 5.0s
     *   0:04–0:04.5 hold (~1s read time of full sentence)
     *   0:04.5 strikethrough draws        -> delay 6.5s, 0.4s, RED
     *   0:05 "marketing to" types in      -> delay 7.0s, WHITE typewriter 0.5s
     *   0:08+ hold indefinitely
     */
    .content { gap: 12px; }

    .line-1 {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 64px;
      color: var(--intro-text);
      animation-delay: 2.0s;
    }

    .line-2 {
      font-family: var(--intro-font);
      font-weight: 700;
      font-size: 96px;
      letter-spacing: -0.015em;
      line-height: 1.1;
      color: var(--intro-text-strong);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .row-1 {
      display: inline-flex;
      align-items: baseline;
      gap: 24px;
      white-space: nowrap;
    }

    .theyre {
      animation: fadeIn 0.6s ease-out 3.0s forwards;
      opacity: 0;
    }

    /* Stack slot — "preying on" and "marketing to" share the same horizontal slot,
       with "marketing to" sitting above to land after the strikethrough. */
    .stack {
      position: relative;
      display: inline-block;
      min-width: 560px;
      height: 1.2em;
      text-align: left;
    }

    .preying {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      overflow: hidden;
      white-space: nowrap;
      color: var(--intro-accent);
      font-weight: 700;
      animation: typewriter 0.5s steps(10, end) 4.0s forwards;
    }

    .preying::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 6px;
      background: var(--intro-accent);
      transform: translateY(-50%);
      border-radius: 2px;
      animation: strike 0.4s ease-out 6.5s forwards;
    }

    .marketing-to {
      position: absolute;
      left: 0;
      top: -1.15em;
      width: 0;
      overflow: hidden;
      white-space: nowrap;
      color: var(--intro-text-strong);
      font-weight: 700;
      animation: typewriter 0.5s steps(12, end) 7.0s forwards;
    }

    .row-2 {
      animation: fadeIn 0.6s ease-out 5.0s forwards;
      opacity: 0;
    }

    @keyframes typewriter {
      to { width: 100%; }
    }

    @keyframes strike {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="content">
      <div class="line-1 fx fade-in">And the colleges?</div>

      <div class="line-2">
        <div class="row-1">
          <span class="theyre">They're</span>
          <span class="stack">
            <span class="marketing-to">marketing to</span>
            <span class="preying">preying on</span>
          </span>
        </div>
        <div class="row-2">the innocence of kids.</div>
      </div>
    </div>
  </div>
</body>
</html>
