<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FutureProof — Brand Reveal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /*
     * FutureProof brand reveal — full-bleed 1920x1080 composition.
     *
     * Visual language: Brightpath design system (DESIGN.md is the source of
     * truth). This is the first warm color the video has shown — the moment
     * the page-turn lands and the FutureProof world appears.
     *
     * Key colors used (all from Brightpath):
     *   bg-deep   #1B1D30  primary background (matches Midjourney sky color)
     *   bg-mid    #232545  card surfaces
     *   thrive    #7DD4A3  primary accent (the "we found something" green)
     *   caution   #F2D477  gold sparkle (warmth)
     *   insight   #B8A9E8  purple sparkle (the AI / intelligence color)
     *   text-pri  #F5F0E8  warm white wordmark
     *   text-sec  #C4BFB0  "powered by gemma" line
     */

    :root {
      --bg-void: #12131F;
      --bg-deep: #1B1D30;
      --bg-mid: #232545;
      --bg-surface: #2D3060;
      --bg-raised: #3A3D75;

      --thrive: #7DD4A3;
      --caution: #F2D477;
      --insight: #B8A9E8;
      --info: #7BB8E0;
      --empathy: #E88BA9;

      --text-primary: #F5F0E8;
      --text-secondary: #C4BFB0;
      --text-muted: #8A8595;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Nunito', -apple-system, sans-serif;
      background: var(--bg-deep);
    }

    /* ===================================================
     * STAGE — fixed 1920x1080 composition
     * Centered on viewport so it screen-records cleanly
     * even if the window is bigger or smaller.
     * =================================================== */
    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      max-width: 100vw;
      max-height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background: var(--bg-deep);
    }

    /* ===================================================
     * AMBIENT GLOW — soft radial light behind the wordmark
     * Picks up the Brightpath accent palette as if light
     * is leaking through from somewhere just behind/below
     * the title.
     * =================================================== */
    .ambient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 1100px 600px at 50% 60%,
          rgba(125, 212, 163, 0.18) 0%,
          rgba(125, 212, 163, 0.08) 30%,
          transparent 65%),
        radial-gradient(ellipse 800px 400px at 50% 50%,
          rgba(184, 169, 232, 0.14) 0%,
          transparent 60%),
        radial-gradient(ellipse 1400px 800px at 50% 55%,
          rgba(242, 212, 119, 0.06) 0%,
          transparent 70%);
      pointer-events: none;
    }

    /* ===================================================
     * STAR FIELD — scattered Brightpath-colored stars
     * across the indigo sky. Mostly small dim ones with a
     * few brighter accent-colored ones. Subtle, atmospheric.
     * =================================================== */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--text-primary);
      border-radius: 50%;
      opacity: 0.4;
    }

    .star.bright {
      width: 4px;
      height: 4px;
      opacity: 0.85;
      box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
    }

    .star.gold    { color: var(--caution);  background: var(--caution); }
    .star.purple  { color: var(--insight);  background: var(--insight); }
    .star.pink    { color: var(--empathy);  background: var(--empathy); }
    .star.green   { color: var(--thrive);   background: var(--thrive); }
    .star.blue    { color: var(--info);     background: var(--info); }

    /* ===================================================
     * SPARKLES — 4-pointed stars surrounding the wordmark
     * The literal "sparkle" requirement. Drawn as SVG so
     * they scale crisply.
     * =================================================== */
    .sparkle {
      position: absolute;
      pointer-events: none;
    }

    .sparkle svg {
      display: block;
      filter: drop-shadow(0 0 12px currentColor);
    }

    /* Sparkles around the wordmark */
    .sparkle-1 { top: 32%;  left: 18%; color: var(--caution); }
    .sparkle-2 { top: 28%;  right: 22%; color: var(--insight); }
    .sparkle-3 { bottom: 30%; left: 24%; color: var(--thrive); }
    .sparkle-4 { bottom: 26%; right: 18%; color: var(--empathy); }
    .sparkle-5 { top: 22%; left: 50%; transform: translateX(-50%); color: var(--info); }
    .sparkle-6 { top: 48%; left: 12%; color: var(--thrive); }
    .sparkle-7 { top: 52%; right: 12%; color: var(--caution); }

    /* ===================================================
     * TITLE BLOCK — wordmark + tagline, centered
     * =================================================== */
    .title-block {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    .wordmark {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 220px;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      /* Soft warm glow behind the type */
      text-shadow:
        0 0 40px rgba(245, 240, 232, 0.15),
        0 0 80px rgba(125, 212, 163, 0.12),
        0 0 120px rgba(184, 169, 232, 0.08);
      /* Brand mark uses subtle weight differentiation
         on "Future" vs "Proof" to give the wordmark
         depth without literally splitting it. */
    }

    .wordmark .future { color: var(--text-primary); }
    .wordmark .proof  { color: var(--thrive); }

    .tagline {
      margin-top: 32px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 36px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .tagline .powered {
      opacity: 0.7;
    }

    .tagline .gemma {
      color: var(--text-primary);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: none;
      font-size: 40px;
      margin-left: 4px;
    }

    /* ===================================================
     * VIGNETTE — subtle darkening at edges to focus center
     * =================================================== */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 50%,
        rgba(18, 19, 31, 0.5) 100%);
    }
  </style>
</head>
<body>

  <div class="stage">

    <!-- Ambient glow layer -->
    <div class="ambient"></div>

    <!-- Star field — small dots scattered across the sky -->
    <div class="stars">
      <!-- Generated programmatically below — written out so file is self-contained -->
      <div class="star" style="top: 8%;  left: 12%;"></div>
      <div class="star" style="top: 14%; left: 38%;"></div>
      <div class="star" style="top: 6%;  left: 62%;"></div>
      <div class="star" style="top: 12%; left: 78%;"></div>
      <div class="star" style="top: 18%; left: 8%;"></div>
      <div class="star" style="top: 22%; left: 45%;"></div>
      <div class="star" style="top: 9%;  left: 88%;"></div>
      <div class="star" style="top: 16%; left: 28%;"></div>
      <div class="star" style="top: 25%; left: 70%;"></div>
      <div class="star" style="top: 30%; left: 6%;"></div>
      <div class="star" style="top: 32%; left: 92%;"></div>
      <div class="star" style="top: 38%; left: 35%;"></div>
      <div class="star" style="top: 42%; left: 65%;"></div>
      <div class="star bright gold"   style="top: 11%; left: 30%;"></div>
      <div class="star bright purple" style="top: 19%; left: 72%;"></div>
      <div class="star bright pink"   style="top: 7%;  left: 50%;"></div>
      <div class="star bright green"  style="top: 24%; left: 20%;"></div>
      <div class="star bright blue"   style="top: 15%; left: 58%;"></div>
      <div class="star bright gold"   style="top: 35%; left: 82%;"></div>
      <div class="star" style="bottom: 12%; left: 10%;"></div>
      <div class="star" style="bottom: 18%; left: 32%;"></div>
      <div class="star" style="bottom: 8%;  left: 55%;"></div>
      <div class="star" style="bottom: 15%; left: 75%;"></div>
      <div class="star" style="bottom: 22%; left: 90%;"></div>
      <div class="star" style="bottom: 6%;  left: 25%;"></div>
      <div class="star" style="bottom: 28%; left: 68%;"></div>
      <div class="star bright purple" style="bottom: 14%; left: 42%;"></div>
      <div class="star bright pink"   style="bottom: 20%; left: 85%;"></div>
      <div class="star bright green"  style="bottom: 9%;  left: 60%;"></div>
    </div>

    <!--
      Sparkle decorations — 4-point stars in Brightpath colors,
      positioned around the wordmark. The "magic" element.
      Reusable SVG path: classic 4-point star with sharp inner curve.
    -->

    <div class="sparkle sparkle-1">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="currentColor">
        <path d="M20 0 L23 17 L40 20 L23 23 L20 40 L17 23 L0 20 L17 17 Z"/>
      </svg>
    </div>

    <div class="sparkle sparkle-2">
      <svg width="50" height="50" viewBox="0 0 40 40" fill="currentColor">
        <path d="M20 0 L23 17 L40 20 L23 23 L20 40 L17 23 L0 20 L17 17 Z"/>
      </svg>
    </div>

    <div class="sparkle sparkle-3">
      <svg width="45" height="45" viewBox="0 0 40 40" fill="currentColor">
        <path d="M20 0 L23 17 L40 20 L23 23 L20 40 L17 23 L0 20 L17 17 Z"/>
      </svg>
    </div>

    <div class="sparkle sparkle-4">
      <svg width="35" height="35" viewBox="0 0 40 40" fill="currentColor">
        <path d="M20 0 L23 17 L40 20 L23 23 L20 40 L17 23 L0 20 L17 17 Z"/>
      </svg>
    </div>

    <div class="sparkle sparkle-5">
      <svg width="32" height="32" viewBox="0 0 40 40" fill="currentColor">
        <path d="M20 0 L23 17 L40 20 L23 23 L20 40 L17 23 L0 20 L17 17 Z"/>
      </svg>
    </div>

    <div class="sparkle sparkle-6">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="currentColor">
        <path d="M20 0 L23 17 L40 20 L23 23 L20 40 L17 23 L0 20 L17 17 Z"/>
      </svg>
    </div>

    <div class="sparkle sparkle-7">
      <svg width="30" height="30" viewBox="0 0 40 40" fill="currentColor">
        <path d="M20 0 L23 17 L40 20 L23 23 L20 40 L17 23 L0 20 L17 17 Z"/>
      </svg>
    </div>

    <!-- Title block -->
    <div class="title-block">
      <div class="wordmark">
        <span class="future">Future</span><span class="proof">Proof</span>
      </div>
      <div class="tagline">
        <span class="powered">Powered by</span><span class="gemma">Gemma</span>
      </div>
    </div>

    <!-- Vignette overlay -->
    <div class="vignette"></div>

  </div>

</body>
</html>
