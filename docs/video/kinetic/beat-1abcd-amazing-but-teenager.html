<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FutureProof Video — Beat 1a–1d: AI is Amazing → As a Teenager</title>
  <link rel="stylesheet" href="_shared/tokens.css">
  <link rel="stylesheet" href="_shared/base.css">
  <style>
    /*
     * Beat 1a-1d — 22-second compound beat. Climax of the entire intro.
     *
     * Red usage: ONLY on "teenager." (the visual climax).
     * "amazing", "4 months", "4 years" all stay white at heavier weight
     * or larger size — hierarchy through size + weight, not color variety.
     *
     * Pre-roll 2.0s. Beat-relative timeline:
     *
     * State 1a (0:00–0:04)   "AI is amazing."
     *   0:00 fade in              -> delay 2.0s
     *   0:04 fade out             -> delay 6.0s
     *
     * State 1b (0:04–0:10)   "But it's made it difficult to plan / for what the next /
     *                         4 months will look like..."
     *   0:04 line 1 fade in       -> delay 6.0s
     *   0:05 line 2 fade in       -> delay 7.0s
     *   0:06 line 3 fade in       -> delay 8.0s ("4 months" white 900)
     *   0:10 fade out             -> delay 12.0s
     *
     * State 1c (0:10–0:16)   "...let alone trying to plan / the next 4 years..."
     *   0:10 line 1 fade in       -> delay 12.0s
     *   0:11 line 2 fade in       -> delay 13.0s ("4 years" white 900, larger)
     *   0:16 fade out             -> delay 18.0s
     *
     * State 1d (0:16–0:22)   "...as a teenager." — THE LANDING
     *   0:17 fade in slowly        -> delay 19.0s, 2.0s fade
     *   0:19–0:22 hold (longest hold of the entire intro)
     */
    .stage { position: relative; }

    .state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .state-content {
      max-width: 1500px;
      padding: 0 80px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ---------- State 1a ---------- */
    .state-1a {
      opacity: 0;
      animation:
        fadeIn 0.8s ease-out 2.0s forwards,
        fadeOut 0.6s ease-in 6.0s forwards;
    }
    .state-1a .text {
      font-family: var(--intro-font);
      font-weight: 700;
      font-size: 150px;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--intro-text-strong);
    }
    .state-1a .em-amazing {
      /* "amazing" stays white. Hierarchy via 900 weight. */
      font-weight: 900;
    }

    /* ---------- State 1b ---------- */
    .state-1b {
      animation: fadeOut 0.6s ease-in 12.0s forwards;
    }
    .state-1b .l1, .state-1b .l2 {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 60px;
      line-height: 1.15;
      color: var(--intro-text);
      opacity: 0;
    }
    .state-1b .l3 {
      font-family: var(--intro-font);
      font-weight: 700;
      font-size: 110px;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--intro-text-strong);
      opacity: 0;
    }
    .state-1b .l1 { animation: fadeInUp 0.7s ease-out 6.0s forwards; transform: translateY(18px); }
    .state-1b .l2 { animation: fadeInUp 0.7s ease-out 7.0s forwards; transform: translateY(18px); }
    .state-1b .l3 { animation: fadeInUp 0.8s ease-out 8.0s forwards; transform: translateY(20px); }
    .state-1b .em-4months {
      font-weight: 900;
      color: var(--intro-text-strong);
    }

    /* ---------- State 1c ---------- */
    .state-1c {
      animation: fadeOut 0.6s ease-in 18.0s forwards;
    }
    .state-1c .l1 {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 60px;
      line-height: 1.15;
      color: var(--intro-text);
      opacity: 0;
      animation: fadeInUp 0.7s ease-out 12.0s forwards;
      transform: translateY(18px);
    }
    .state-1c .l2 {
      font-family: var(--intro-font);
      font-weight: 700;
      font-size: 130px;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--intro-text-strong);
      opacity: 0;
      animation: fadeInUp 0.8s ease-out 13.0s forwards;
      transform: translateY(20px);
    }
    .state-1c .em-4years {
      font-weight: 900;
      color: var(--intro-text-strong);
    }

    /* ---------- State 1d — THE CLIMAX (red, largest text in intro) ---------- */
    .state-1d {
      opacity: 0;
      animation: fadeIn 2.0s ease-out 19.0s forwards;
    }
    .state-1d .climax-prefix {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 64px;
      color: var(--intro-text);
      margin-bottom: 4px;
    }
    .state-1d .climax {
      /* "teenager." — the visual climax. Largest text in the entire intro. */
      font-family: var(--intro-font);
      font-weight: 900;
      font-size: 280px;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: var(--intro-accent);
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stage">

    <div class="state state-1a">
      <div class="state-content">
        <div class="text">AI is <span class="em-amazing">amazing.</span></div>
      </div>
    </div>

    <div class="state state-1b">
      <div class="state-content">
        <div class="l1">But it's made it difficult to plan</div>
        <div class="l2">for what the next</div>
        <div class="l3"><span class="em-4months">4 months</span> will look like…</div>
      </div>
    </div>

    <div class="state state-1c">
      <div class="state-content">
        <div class="l1">…let alone trying to plan</div>
        <div class="l2">the next <span class="em-4years">4 years</span>…</div>
      </div>
    </div>

    <div class="state state-1d">
      <div class="state-content">
        <div class="climax-prefix">…as a</div>
        <div class="climax">teenager.</div>
      </div>
    </div>

  </div>
</body>
</html>
