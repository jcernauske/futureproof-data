<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FutureProof Video — Beat 1g–1h: Hard to Find / Fixed This for Kids</title>
  <link rel="stylesheet" href="_shared/tokens.css">
  <link rel="stylesheet" href="_shared/base.css">
  <style>
    /*
     * Beat 1g-1h — "Hard to find. Hard to combine. Almost impossible to interpret.
     *               Which is why nobody's fixed this for kids."
     *
     * Last beat before "Until now" pivot to Scene 2. Must land hard.
     *
     * Red usage: ONLY on "fixed this for kids." (the closing landing).
     * "find / combine / interpret" all stay white at 900 weight — escalating
     * intensity through weight, not color variety.
     *
     * Pre-roll 2.0s.
     *
     * State 1g (0:00–0:08)
     *   0:00 "Hard to **find.**"                       -> delay 2.0s
     *   0:02 "Hard to **combine.**"                    -> delay 4.0s
     *   0:04 "Almost impossible to **interpret.**"     -> delay 6.0s
     *   0:08 fade out                                  -> delay 10.0s
     *
     * State 1h (0:08–0:12)
     *   0:09 "Which is why nobody's"                   -> delay 11.0s
     *   0:11 "**fixed this for kids.**"                -> delay 13.0s, RED, 900
     *   0:12+ hold indefinitely.
     */
    .stage { position: relative; }

    .state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .state-content {
      max-width: 1500px;
      padding: 0 80px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* State 1g — three lines, building intensity through weight, not color */
    .state-1g {
      animation: fadeOut 0.6s ease-in 10.0s forwards;
    }
    .state-1g .line {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 96px;
      letter-spacing: -0.015em;
      line-height: 1.15;
      color: var(--intro-text);
      opacity: 0;
      transform: translateY(20px);
    }
    .state-1g .l1 { animation: fadeInUp 0.7s ease-out 2.0s forwards; }
    .state-1g .l2 { animation: fadeInUp 0.7s ease-out 4.0s forwards; }
    .state-1g .l3 { animation: fadeInUp 0.7s ease-out 6.0s forwards; }
    .state-1g .em {
      font-weight: 900;
      color: var(--intro-text-strong);
    }

    /* State 1h — landing punch, RED on the closer */
    .state-1h .l1 {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 64px;
      color: var(--intro-text);
      opacity: 0;
      animation: fadeInUp 0.8s ease-out 11.0s forwards;
      transform: translateY(18px);
      margin-bottom: 4px;
    }
    .state-1h .l2 {
      font-family: var(--intro-font);
      font-weight: 900;
      font-size: 170px;
      letter-spacing: -0.03em;
      line-height: 1.0;
      color: var(--intro-accent);
      opacity: 0;
      animation: fadeInUp 0.9s ease-out 13.0s forwards;
      transform: translateY(24px);
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stage">

    <div class="state state-1g">
      <div class="state-content">
        <div class="line l1">Hard to <span class="em">find.</span></div>
        <div class="line l2">Hard to <span class="em">combine.</span></div>
        <div class="line l3">Almost impossible to <span class="em">interpret.</span></div>
      </div>
    </div>

    <div class="state state-1h">
      <div class="state-content">
        <div class="l1">Which is why nobody's</div>
        <div class="l2">fixed this for kids.</div>
      </div>
    </div>

  </div>
</body>
</html>
