<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FutureProof Video — Beat 0c: Anxiety Level</title>
  <link rel="stylesheet" href="_shared/tokens.css">
  <link rel="stylesheet" href="_shared/base.css">
  <style>
    /*
     * Beat 0c — "As the father of 3 teenagers, this has not helped my anxiety level."
     *
     * Red accent reserved for "anxiety level." (the personal hit's climax).
     * Everything else is white on dark.
     *
     * Pre-roll 2.0s.
     *   0:00 As the father of           -> delay 2.0s
     *   0:01 3 teenagers, (scale-in)    -> delay 3.0s, white 700
     *   0:02 this has not helped my     -> delay 4.0s
     *   0:03 anxiety level. (large)     -> delay 5.0s, RED, 900
     *   0:04+ pulse on "anxiety level." indefinitely, starts 6.0s
     */
    .content { gap: 18px; }

    .line-1 {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 60px;
      color: var(--intro-text);
      animation-delay: 2.0s;
    }

    .line-2 {
      font-family: var(--intro-font);
      font-weight: 700;
      font-size: 110px;
      letter-spacing: -0.015em;
      line-height: 1.1;
      color: var(--intro-text-strong);
      animation-delay: 3.0s;
    }

    .line-3 {
      font-family: var(--intro-font);
      font-weight: 500;
      font-size: 60px;
      color: var(--intro-text);
      animation-delay: 4.0s;
    }

    .line-4 { animation-delay: 5.0s; }
    .line-4-inner {
      font-family: var(--intro-font);
      font-weight: 900;
      font-size: 180px;
      letter-spacing: -0.025em;
      line-height: 1.0;
      color: var(--intro-accent);
      display: inline-block;
      animation: pulse 1.6s ease-in-out 6.0s infinite;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="content">
      <div class="line-1 fx fade-in">As the father of</div>
      <div class="line-2 fx scale-in">3 teenagers,</div>
      <div class="line-3 fx fade-in">this has not helped my</div>
      <div class="line-4 fx fade-in-up">
        <span class="line-4-inner">anxiety level.</span>
      </div>
    </div>
  </div>
</body>
</html>
