<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProof — Screen 7: Boss Gauntlet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #12131F;
    --bg-deep: #1B1D30;
    --bg-mid: #232545;
    --bg-surface: #2D3060;
    --bg-raised: #3A3D75;
    --accent-thrive: #7DD4A3;
    --accent-alert: #F4A97E;
    --accent-caution: #F2D477;
    --accent-insight: #B8A9E8;
    --accent-info: #7BB8E0;
    --accent-empathy: #E88BA9;
    --stat-ern: #F2D477;
    --stat-roi: #7DD4A3;
    --stat-res: #B8A9E8;
    --stat-grw: #7BB8E0;
    --stat-hmn: #E88BA9;
    --text-primary: #F5F0E8;
    --text-secondary: #C4BFB0;
    --text-muted: #8A8595;
    --text-inverse: #1B1D30;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.1);
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --font-data: 'Space Mono', monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;
    --shadow-md: 0 4px 16px rgba(27,29,48,0.6);
    --shadow-lg: 0 8px 32px rgba(27,29,48,0.7);
  }

  body {
    background: var(--bg-void);
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  .profile-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(18,19,31,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-size: 14px;
    color: var(--text-muted);
  }

  .scenario-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-full);
    padding: 4px;
    z-index: 200;
    box-shadow: var(--shadow-lg);
  }
  .scenario-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: var(--radius-full);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 200ms ease-out;
  }
  .scenario-btn.active { background: var(--bg-raised); color: var(--text-primary); }
  .scenario-btn:hover:not(.active) { color: var(--text-secondary); }

  /* === BOSS FIGHT ARENA === */
  .arena {
    max-width: 560px;
    margin: 0 auto;
    padding: 68px 24px 120px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Background color wash per boss */
  .boss-wash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    transition: background 600ms ease-out;
    z-index: -1;
  }

  /* Progress pips */
  .gauntlet-progress {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    align-items: center;
  }
  .progress-pip {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--bg-raised);
    transition: all 300ms ease-out;
  }
  .progress-pip.win { background: var(--accent-thrive); box-shadow: 0 0 8px rgba(125,212,163,0.4); }
  .progress-pip.lose { background: var(--accent-alert); box-shadow: 0 0 8px rgba(244,169,126,0.4); }
  .progress-pip.draw { background: var(--accent-caution); box-shadow: 0 0 8px rgba(242,212,119,0.4); }
  .progress-pip.current { transform: scale(1.4); box-shadow: 0 0 12px rgba(255,255,255,0.2); background: var(--text-primary); }
  .progress-pip.final { width: 14px; height: 14px; }
  .progress-divider {
    width: 1px;
    height: 16px;
    background: var(--border-default);
    margin: 0 4px;
  }

  /* Boss icon */
  .boss-icon {
    font-size: 80px;
    margin-bottom: 16px;
    opacity: 0;
    transform: scale(0.7);
    transition: all 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .boss-icon.visible { opacity: 1; transform: scale(1); }

  /* Boss name */
  .boss-name {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .boss-name.visible { opacity: 1; transform: translateY(0); }

  /* Stats tested */
  .stats-tested {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 300ms ease-out;
  }
  .stats-tested.visible { opacity: 1; }
  .stat-chip {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: var(--radius-full);
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Calculating beat */
  .calculating {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 20px;
    opacity: 0;
    animation: calc-shimmer 600ms ease-in-out;
  }
  @keyframes calc-shimmer {
    0% { opacity: 0; }
    30% { opacity: 0.7; }
    70% { opacity: 0.7; }
    100% { opacity: 0; }
  }

  /* Result badge */
  .result-badge {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 700;
    padding: 8px 32px;
    border-radius: var(--radius-lg);
    margin-bottom: 16px;
    opacity: 0;
    transform: scale(0.8);
    transition: all 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-badge.visible { opacity: 1; transform: scale(1); }
  .result-badge.win { color: var(--accent-thrive); background: rgba(125,212,163,0.12); }
  .result-badge.lose { color: var(--accent-alert); background: rgba(244,169,126,0.12); }
  .result-badge.draw { color: var(--accent-caution); background: rgba(242,212,119,0.12); }

  /* Narrative */
  .fight-narrative {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-secondary);
    text-align: center;
    max-width: 440px;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 400ms ease-out;
  }
  .fight-narrative.visible { opacity: 1; transform: translateY(0); }

  /* Receipt link */
  .receipt-link {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.6;
    cursor: pointer;
    margin-bottom: 32px;
    transition: opacity 200ms;
  }
  .receipt-link:hover { opacity: 1; }

  /* === REROLL SECTION === */
  .reroll-section {
    width: 100%;
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 24px;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .reroll-section.visible { opacity: 1; transform: translateY(0); }
  .reroll-header {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .reroll-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .skill-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 200ms ease-out;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .skill-card:hover { border-color: var(--accent-insight); background: rgba(45,48,96,0.8); }
  .skill-card.equipped {
    border-color: var(--accent-thrive);
    background: rgba(125,212,163,0.08);
  }
  .skill-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 2px;
  }
  .skill-rationale {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .skill-delta {
    font-family: var(--font-data);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-thrive);
    white-space: nowrap;
    margin-left: 12px;
  }
  .skill-equipped-badge {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-thrive);
    background: rgba(125,212,163,0.15);
    padding: 2px 8px;
    border-radius: var(--radius-full);
    margin-left: 8px;
  }

  /* Structural loss */
  .structural-loss {
    width: 100%;
    background: rgba(244,169,126,0.06);
    border: 1px solid rgba(244,169,126,0.15);
    border-radius: var(--radius-xl);
    padding: 24px;
    margin-bottom: 24px;
    text-align: center;
  }
  .structural-loss p {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .structural-loss strong {
    color: var(--accent-alert);
  }

  /* === ACTION BUTTONS === */
  .fight-actions {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 400px;
  }
  .btn-primary {
    flex: 1;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 700;
    color: var(--text-inverse);
    background: var(--accent-thrive);
    border: none;
    border-radius: var(--radius-lg);
    padding: 14px 24px;
    cursor: pointer;
    transition: all 200ms ease-out;
  }
  .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 24px rgba(125,212,163,0.3); }
  .btn-secondary {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    padding: 14px 16px;
    cursor: pointer;
    transition: color 200ms;
  }
  .btn-secondary:hover { color: var(--text-secondary); }

  /* === NEXT STEPS === */
  .next-steps {
    width: 100%;
    margin-top: 24px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 600ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .next-steps.visible { opacity: 1; transform: translateY(0); }
  .next-steps-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    text-align: center;
  }
  .next-steps-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 24px;
  }
  .next-steps-section {
    margin-bottom: 20px;
  }
  .next-steps-section-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--accent-info);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .next-step-item {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-secondary);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .next-step-check {
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 2px solid var(--border-default);
    border-radius: var(--radius-sm);
    margin-top: 1px;
    cursor: pointer;
    transition: all 200ms;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: transparent;
  }
  .next-step-check.checked {
    background: var(--accent-thrive);
    border-color: var(--accent-thrive);
    color: var(--text-inverse);
  }

  /* === SCORECARD === */
  .scorecard {
    width: 100%;
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 24px;
    margin-bottom: 32px;
  }
  .scorecard-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
  }
  .scorecard-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .scorecard-row:last-child { border-bottom: none; }
  .scorecard-boss {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .scorecard-emoji { font-size: 24px; }
  .scorecard-name { font-weight: 600; font-size: 14px; }
  .scorecard-result {
    font-family: var(--font-data);
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: var(--radius-full);
  }
  .scorecard-result.win { color: var(--accent-thrive); background: rgba(125,212,163,0.12); }
  .scorecard-result.lose { color: var(--accent-alert); background: rgba(244,169,126,0.12); }
  .scorecard-result.draw { color: var(--accent-caution); background: rgba(242,212,119,0.12); }
  .scorecard-final {
    margin-top: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .scorecard-final .scorecard-boss { font-size: 16px; }
  .scorecard-final .scorecard-result { font-size: 15px; padding: 6px 16px; }

  /* === SKELETON === */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-mid) 25%, var(--bg-surface) 50%, var(--bg-mid) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: var(--radius-md);
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Empty / Error */
  .empty-state, .error-state {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 40px;
  }

  @media (max-width: 640px) {
    .boss-icon { font-size: 60px; }
    .boss-name { font-size: 24px; }
    .result-badge { font-size: 28px; }
    .arena { padding: 56px 16px 120px; }
    .skill-card { flex-direction: column; align-items: flex-start; }
    .skill-delta { margin-left: 0; margin-top: 6px; }
  }
</style>
</head>
<body>

<div class="profile-header">
  <span>dancing happy bear</span>
  <span>&#x1F43B;</span>
</div>

<div class="boss-wash" id="bossWash"></div>

<div class="arena" id="arena"></div>

<div class="scenario-bar">
  <button class="scenario-btn active" onclick="switchScenario('fight')">Fight</button>
  <button class="scenario-btn" onclick="switchScenario('reroll')">Reroll</button>
  <button class="scenario-btn" onclick="switchScenario('structural')">Structural</button>
  <button class="scenario-btn" onclick="switchScenario('scorecard')">Scorecard</button>
  <button class="scenario-btn" onclick="switchScenario('loading')">Loading</button>
  <button class="scenario-btn" onclick="switchScenario('empty')">Empty</button>
</div>

<script>
const STAT_FULL_NAMES = {
  ERN: 'Earning Power', ROI: 'Return on Investment', RES: 'AI Resilience', GRW: 'Growth', HMN: 'Human Edge'
};

const BOSSES = [
  { id: 'ai', emoji: '\u{1F916}', name: 'Fight AI', color: '#B8A9E8', tests: [
    { stat: 'RES', color: '#B8A9E8' }, { stat: 'HMN', color: '#E88BA9' }
  ], result: 'lose', score: '4.8 vs 5.5', narrative: 'AI is reshaping financial analysis fast. Your RES of 5 means moderate exposure \u2014 the models can build the spreadsheets, but they still need someone to ask the right questions.' },
  { id: 'loans', emoji: '\u{1F4B0}', name: 'Fight Student Loans', color: '#F4A97E', tests: [
    { stat: 'ROI', color: '#7DD4A3' }, { stat: 'ERN', color: '#F2D477' }
  ], result: 'win', score: '6.5 vs 5.0', narrative: 'Your earning power at the 75th percentile gives you real leverage against your debt load. At 50% loan coverage, the math works in your favor.' },
  { id: 'market', emoji: '\u{1F4C8}', name: 'Fight the Market', color: '#7BB8E0', tests: [
    { stat: 'GRW', color: '#7BB8E0' }, { stat: 'ERN', color: '#F2D477' }
  ], result: 'win', score: '7.5 vs 5.0', narrative: 'Financial analyst roles are projected to grow 9% this decade. The market is on your side \u2014 demand for people who can interpret data is climbing.' },
  { id: 'burnout', emoji: '\u{1F525}', name: 'Fight Burnout', color: '#E88BA9', tests: [
    { stat: 'HMN', color: '#E88BA9' }
  ], result: 'draw', score: '5.5 vs 5.5', narrative: 'Financial analysis means long hours during reporting seasons. Your Human Edge of 6 gives you interpersonal skills to manage stress, but the raw workload is real.' },
  { id: 'ceiling', emoji: '\u{1F4CA}', name: 'Fight the Ceiling', color: '#C4BFB0', tests: [
    { stat: 'ERN', color: '#F2D477' }
  ], result: 'win', score: '7.0 vs 5.0', narrative: 'The salary trajectory for financial analysts has strong upside. Senior roles, portfolio management, and CFO tracks all remain open \u2014 the ceiling is high.' }
];

const FINAL_BOSS = {
  emoji: '\u2694\uFE0F', name: 'Fight the Future', color: '#F5F0E8',
  result: 'win', score: '3W / 1D / 1L',
  narrative: 'Three wins, one draw, and one loss. Your ISU Business path into Financial Analysis is solid \u2014 strong earning power and a growing market. The AI fight is your one clear vulnerability.'
};

const SKILLS = [
  { title: 'Data Analytics Minor', rationale: 'Learn to direct AI analysis tools instead of competing with them', delta: 'AI Resilience +2', deltaColor: '#B8A9E8' },
  { title: 'Python for Finance Certificate', rationale: 'Automate your own workflows before someone automates them for you', delta: 'AI Resilience +1', deltaColor: '#B8A9E8' },
  { title: 'CFA Level I Preparation', rationale: 'Deep domain expertise that AI cannot replicate \u2014 judgment, ethics, client trust', delta: 'Human Edge +2', deltaColor: '#E88BA9' },
  { title: 'Client Advisory Internship', rationale: 'Build the human-facing skills that keep you irreplaceable', delta: 'Human Edge +1', deltaColor: '#E88BA9' }
];

const NEXT_STEPS = [
  { section: 'Education', icon: '\u{1F393}', items: [
    'Meet with your ISU Business advisor about adding a Data Analytics minor before Fall 2027 registration.',
    'Research the CFA Level I exam \u2014 ISU\'s Milner Library has free prep materials and a study group meets Thursdays.'
  ]},
  { section: 'Experience', icon: '\u{1F4BC}', items: [
    'Apply to at least 2 financial advisory internships for Summer 2027. Target Caterpillar (Peoria) and State Farm (Bloomington) \u2014 both recruit from ISU.',
    'Join ISU\'s Financial Management Association chapter to build client-facing presentation skills.'
  ]},
  { section: 'Skills', icon: '\u{1F6E0}\uFE0F', items: [
    'Start Python for Finance on Coursera \u2014 the 4-week certificate directly addresses your AI resilience gap.',
    'Practice with Bloomberg Terminal in ISU\'s trading room. Hands-on tool experience differentiates you.'
  ]},
  { section: 'Planning', icon: '\u{1F5FA}\uFE0F', items: [
    'Compare your financial analyst build against a second build \u2014 try Marketing Manager or Management Consultant to see different risk profiles.',
    'If the AI exposure concerns you, explore the branch tree \u2014 several branches pivot toward advisory roles with higher AI Resilience scores.'
  ]}
];

let currentBoss = 0;
let equippedSkills = new Set();

function switchScenario(scenario) {
  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === scenario);
  });
  equippedSkills = new Set();
  currentBoss = 0;

  switch(scenario) {
    case 'fight': renderFight(BOSSES[0]); break;
    case 'reroll': renderReroll(); break;
    case 'structural': renderStructural(); break;
    case 'scorecard': renderScorecard(); break;
    case 'loading': renderLoading(); break;
    case 'empty': renderEmpty(); break;
  }
}

function setBossWash(color, opacity = 0.06) {
  document.getElementById('bossWash').style.background =
    `radial-gradient(ellipse at 50% 30%, ${color}${Math.round(opacity*255).toString(16).padStart(2,'0')} 0%, transparent 60%)`;
}

function renderFight(boss) {
  setBossWash(boss.color);
  const arena = document.getElementById('arena');
  const resultClass = boss.result;
  const resultLabel = boss.result.toUpperCase();

  arena.innerHTML = `
    <div class="gauntlet-progress" id="gauntletProgress">
      ${BOSSES.map((b, i) => {
        let cls = '';
        if (i < currentBoss) cls = BOSSES[i].result;
        else if (i === currentBoss) cls = 'current';
        return `<div class="progress-pip ${cls}"></div>`;
      }).join('')}
      <div class="progress-divider"></div>
      <div class="progress-pip final"></div>
    </div>

    <div class="boss-icon" id="bossIcon">${boss.emoji}</div>
    <div class="boss-name" id="bossName">${boss.name}</div>
    <div class="stats-tested" id="statsTested">
      ${boss.tests.map(t => `
        <div class="stat-chip">
          <span class="dot" style="background:${t.color}"></span>
          ${STAT_FULL_NAMES[t.stat] || t.stat}
        </div>
      `).join('')}
    </div>
    <div class="result-badge ${resultClass}" id="resultBadge">${resultLabel}</div>
    <div class="fight-narrative" id="fightNarrative">${boss.narrative}</div>
    <div class="receipt-link" id="receiptLink" onclick="alert('Receipt: ${boss.name}\\nScore: ${boss.score}\\nTests: ${boss.tests.map(t=>t.stat).join(', ')}')">? See how this was scored</div>

    ${boss.result === 'lose' ? `
      <div class="reroll-section" id="rerollSection">
        <div class="reroll-header">Equip a skill to fight back</div>
        <div class="reroll-subtitle">Each skill adds stats that could flip this fight</div>
        ${SKILLS.map((s, i) => `
          <div class="skill-card" id="skill-${i}" onclick="equipSkill(${i})">
            <div>
              <div class="skill-title">${s.title}</div>
              <div class="skill-rationale">${s.rationale}</div>
            </div>
            <div class="skill-delta" style="color:${s.deltaColor}">${s.delta}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <div class="fight-actions">
      ${boss.result === 'lose' ? `<button class="btn-secondary" onclick="nextFight()">Skip</button>` : ''}
      <button class="btn-primary" onclick="nextFight()">${currentBoss < 4 ? 'Next Fight' : 'Final Boss'}</button>
    </div>
  `;

  // Staggered entrance
  setTimeout(() => document.getElementById('bossIcon').classList.add('visible'), 100);
  setTimeout(() => document.getElementById('bossName').classList.add('visible'), 300);
  setTimeout(() => document.getElementById('statsTested').classList.add('visible'), 500);
  setTimeout(() => document.getElementById('resultBadge').classList.add('visible'), 900);
  setTimeout(() => document.getElementById('fightNarrative').classList.add('visible'), 1100);
  const reroll = document.getElementById('rerollSection');
  if (reroll) setTimeout(() => reroll.classList.add('visible'), 1300);
}

function equipSkill(index) {
  const card = document.getElementById(`skill-${index}`);
  if (equippedSkills.has(index)) return;
  equippedSkills.add(index);
  card.classList.add('equipped');

  // Add equipped badge
  const delta = card.querySelector('.skill-delta');
  delta.innerHTML += '<span class="skill-equipped-badge">EQUIPPED</span>';

  // Simulate rescore after a beat
  setTimeout(() => {
    const badge = document.getElementById('resultBadge');
    if (equippedSkills.size >= 1) {
      badge.className = 'result-badge draw visible';
      badge.textContent = 'DRAW';
      setBossWash('#F2D477');
    }
    if (equippedSkills.size >= 2) {
      badge.className = 'result-badge win visible';
      badge.textContent = 'WIN';
      setBossWash('#7DD4A3');
      // Boss deflation
      const icon = document.getElementById('bossIcon');
      icon.style.transform = 'scale(0.8)';
      icon.style.opacity = '0.7';
    }
  }, 400);
}

function nextFight() {
  currentBoss++;
  equippedSkills = new Set();
  if (currentBoss < BOSSES.length) {
    renderFight(BOSSES[currentBoss]);
  } else {
    renderFinalBoss();
  }
}

function renderFinalBoss() {
  setBossWash('#F5F0E8', 0.04);
  const arena = document.getElementById('arena');
  arena.innerHTML = `
    <div class="gauntlet-progress">
      ${BOSSES.map(b => `<div class="progress-pip ${b.result}"></div>`).join('')}
      <div class="progress-divider"></div>
      <div class="progress-pip final current"></div>
    </div>
    <div class="boss-icon" id="bossIcon">${FINAL_BOSS.emoji}</div>
    <div class="boss-name" id="bossName">${FINAL_BOSS.name}</div>
    <div class="stats-tested" id="statsTested">
      <div class="stat-chip"><span class="dot" style="background:var(--text-primary)"></span>ALL STATS</div>
    </div>
    <div class="result-badge win" id="resultBadge">${FINAL_BOSS.result.toUpperCase()}</div>
    <div class="fight-narrative" id="fightNarrative">${FINAL_BOSS.narrative}</div>
    <div class="fight-actions">
      <button class="btn-primary" onclick="renderScorecard()">See Results</button>
    </div>
  `;
  setTimeout(() => document.getElementById('bossIcon').classList.add('visible'), 100);
  setTimeout(() => document.getElementById('bossName').classList.add('visible'), 300);
  setTimeout(() => document.getElementById('statsTested').classList.add('visible'), 500);
  setTimeout(() => document.getElementById('resultBadge').classList.add('visible'), 900);
  setTimeout(() => document.getElementById('fightNarrative').classList.add('visible'), 1100);
}

function renderReroll() {
  currentBoss = 0;
  BOSSES[0].result = 'lose';
  renderFight(BOSSES[0]);
}

function renderStructural() {
  setBossWash('#F4A97E', 0.05);
  const arena = document.getElementById('arena');
  arena.innerHTML = `
    <div class="gauntlet-progress">
      <div class="progress-pip current"></div>
      ${[1,2,3,4].map(() => '<div class="progress-pip"></div>').join('')}
      <div class="progress-divider"></div>
      <div class="progress-pip final"></div>
    </div>
    <div class="boss-icon visible">\u{1F916}</div>
    <div class="boss-name visible">Fight AI</div>
    <div class="stats-tested visible">
      <div class="stat-chip"><span class="dot" style="background:#B8A9E8"></span>AI Resilience</div>
      <div class="stat-chip"><span class="dot" style="background:#E88BA9"></span>Human Edge</div>
    </div>
    <div class="result-badge lose visible">LOSE</div>
    <div class="fight-narrative visible" style="color: var(--accent-alert); opacity: 0.9;">
      Every available skill for this fight has been equipped, and the result is still a loss. That's the most important signal this tool can give you: <strong>the gap isn't a skill-tree problem. It's structural to this school + major + career combination.</strong> Worth taking seriously.
    </div>

    <div class="structural-loss">
      <p>This doesn't mean the career is wrong. It means this specific risk needs a bigger move \u2014 a different minor, a different school, or a different career entirely. Try a second build to compare.</p>
    </div>

    <div class="fight-actions">
      <button class="btn-secondary" onclick="switchScenario('scorecard')">Continue anyway</button>
      <button class="btn-primary" onclick="alert('Start new build')">Try a different build</button>
    </div>
  `;
}

function renderScorecard() {
  setBossWash('#F5F0E8', 0.03);
  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === 'scorecard');
  });
  const arena = document.getElementById('arena');
  arena.innerHTML = `
    <div class="scorecard">
      <div class="scorecard-title">Boss Gauntlet Results</div>
      ${BOSSES.map(b => `
        <div class="scorecard-row">
          <div class="scorecard-boss">
            <span class="scorecard-emoji">${b.emoji}</span>
            <span class="scorecard-name">${b.name}</span>
          </div>
          <span class="scorecard-result ${b.result}">${b.result.toUpperCase()}</span>
        </div>
      `).join('')}
      <div class="scorecard-final">
        <div class="scorecard-boss">
          <span class="scorecard-emoji">${FINAL_BOSS.emoji}</span>
          <span class="scorecard-name" style="font-size:16px;font-family:var(--font-display);">${FINAL_BOSS.name}</span>
        </div>
        <span class="scorecard-result win">${FINAL_BOSS.result.toUpperCase()}</span>
      </div>
    </div>

    <div class="next-steps" id="nextSteps">
      <div class="next-steps-title">Next Steps</div>
      <div class="next-steps-subtitle">Real actions you can take \u2014 no boss metaphors, just a plan.</div>

      ${NEXT_STEPS.map(section => `
        <div class="next-steps-section">
          <div class="next-steps-section-title">${section.icon} ${section.section}</div>
          ${section.items.map((item, i) => `
            <div class="next-step-item">
              <div class="next-step-check" onclick="toggleCheck(this)">\u2713</div>
              <div>${item}</div>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>

    <div class="fight-actions" style="margin-top: 24px;">
      <button class="btn-primary" onclick="alert('Navigate to Branch Tree (Screen 8)')">See your branches \u{1F333}</button>
    </div>
  `;

  setTimeout(() => document.getElementById('nextSteps').classList.add('visible'), 400);
}

function toggleCheck(el) {
  el.classList.toggle('checked');
}

function renderLoading() {
  setBossWash('#B8A9E8', 0.04);
  const arena = document.getElementById('arena');
  arena.innerHTML = `
    <div class="empty-state">
      <div style="font-size:64px;animation:pulse-text 1.5s ease-in-out infinite;">\u2694\uFE0F</div>
      <div style="font-size:18px;font-weight:600;color:var(--text-secondary);animation:pulse-text 1.5s ease-in-out infinite;">
        Preparing the gauntlet for dancing happy bear \u{1F43B}...
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        ${[0,1,2].map(i => `<div style="width:8px;height:8px;border-radius:50%;background:var(--accent-insight);animation:dot-bounce 1.2s ease-in-out ${i*0.2}s infinite;"></div>`).join('')}
      </div>
      <div style="margin-top:32px;width:100%;max-width:400px;">
        <div class="skeleton" style="height:80px;margin-bottom:16px;"></div>
        <div class="skeleton" style="height:24px;width:50%;margin:0 auto 12px;"></div>
        <div class="skeleton" style="height:40px;width:30%;margin:0 auto;"></div>
      </div>
    </div>
  `;
}

function renderEmpty() {
  setBossWash('transparent', 0);
  const arena = document.getElementById('arena');
  arena.innerHTML = `
    <div class="empty-state">
      <div style="font-size:64px;opacity:0.5;">\u{1F6E1}\uFE0F</div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:600;">No build to fight with</div>
      <div style="font-size:16px;color:var(--text-secondary);max-width:360px;">
        Complete your stat reveal first, then come back to fight the bosses.
      </div>
      <button class="btn-primary" style="margin-top:12px;" onclick="alert('Go to Screen 6')">Back to Stats</button>
    </div>
  `;
}

// CSS for animations referenced in JS
const extraStyle = document.createElement('style');
extraStyle.textContent = `
  @keyframes pulse-text { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes dot-bounce { 0%,100% { transform:translateY(0);opacity:0.4; } 50% { transform:translateY(-6px);opacity:1; } }
`;
document.head.appendChild(extraStyle);

// Initial render
switchScenario('fight');
</script>
</body>
</html>
