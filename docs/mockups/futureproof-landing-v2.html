<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProof — Screen 1: Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-void: #12131F;
    --bg-deep: #1B1D30;
    --bg-mid: #232545;
    --bg-surface: #2D3060;
    --bg-raised: #3A3D75;
    --accent-thrive: #7DD4A3;
    --accent-alert: #F4A97E;
    --accent-caution: #F2D477;
    --accent-insight: #B8A9E8;
    --accent-info: #7BB8E0;
    --accent-empathy: #E88BA9;
    --stat-ern: #F2D477;
    --stat-roi: #7DD4A3;
    --stat-res: #B8A9E8;
    --stat-grw: #7BB8E0;
    --stat-hmn: #E88BA9;
    --text-primary: #F5F0E8;
    --text-secondary: #C4BFB0;
    --text-muted: #8A8595;
    --text-inverse: #1B1D30;
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --font-data: 'Space Mono', monospace;
  }

  body {
    background: var(--bg-void);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: var(--font-body);
    color: var(--text-primary);
  }

  .landing {
    position: relative;
    width: 100%;
    max-width: 1440px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
    background: radial-gradient(ellipse at 50% 40%, var(--bg-deep) 0%, var(--bg-void) 70%);
  }

  .ambient-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -62%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle,
      rgba(125,212,163,0.07) 0%,
      rgba(184,169,232,0.05) 30%,
      rgba(123,184,224,0.03) 50%,
      transparent 70%);
    pointer-events: none;
  }

  .stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--text-primary);
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100% { opacity: 0.05; } 50% { opacity: 0.5; } }

  .brand {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    position: absolute;
    top: 32px;
    opacity: 0.6;
  }

  .pentagon-container {
    position: relative;
    width: 260px; height: 260px;
    margin-bottom: 48px;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .pentagon-container svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 40px rgba(125,212,163,0.15));
  }

  .stat-label {
    position: absolute;
    font-family: var(--font-data);
    font-size: 10px;
    letter-spacing: 0.1em;
    opacity: 0.5;
  }
  .stat-label.ern { top: -4px; left: 50%; transform: translateX(-50%); color: var(--stat-ern); }
  .stat-label.roi { top: 32%; right: -44px; color: var(--stat-roi); }
  .stat-label.res { bottom: 6%; right: -16px; color: var(--stat-res); }
  .stat-label.grw { bottom: 6%; left: -16px; color: var(--stat-grw); }
  .stat-label.hmn { top: 32%; left: -44px; color: var(--stat-hmn); }

  .tagline {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 600;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 12px;
    max-width: 600px;
  }
  .tagline em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent-thrive), var(--accent-info));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: var(--font-body);
    font-size: 18px;
    color: var(--text-secondary);
    margin-bottom: 48px;
    text-align: center;
  }

  .cta {
    font-family: var(--font-body);
    font-size: 17px;
    font-weight: 700;
    color: var(--text-inverse);
    background: var(--accent-thrive);
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    cursor: pointer;
    transition: all 200ms ease-out;
    letter-spacing: 0.01em;
  }
  .cta:hover {
    transform: scale(1.03);
    box-shadow: 0 0 32px rgba(125,212,163,0.4);
  }
  .cta .spark { margin-left: 4px; }

  .footer-line {
    position: absolute;
    bottom: 32px;
    font-family: var(--font-data);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    opacity: 0.5;
  }

  @media (max-width: 640px) {
    .tagline { font-size: 28px; }
    .subtitle { font-size: 15px; }
    .pentagon-container { width: 180px; height: 180px; margin-bottom: 32px; }
    .cta { padding: 14px 32px; font-size: 15px; }
  }

  .landing > * { animation: fadeUp 0.8s ease-out both; }
  .pentagon-container { animation-delay: 0.1s; }
  .tagline { animation-delay: 0.3s; }
  .subtitle { animation-delay: 0.45s; }
  .cta { animation-delay: 0.6s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="landing">
  <div class="ambient-glow"></div>

  <div class="stars">
    <div class="star" style="top:6%;left:10%;animation-delay:0s;animation-duration:3.5s;"></div>
    <div class="star" style="top:12%;left:75%;animation-delay:0.7s;animation-duration:4.2s;"></div>
    <div class="star" style="top:30%;left:4%;animation-delay:1.5s;animation-duration:3.8s;"></div>
    <div class="star" style="top:18%;left:90%;animation-delay:0.3s;animation-duration:5s;"></div>
    <div class="star" style="top:65%;left:92%;animation-delay:2s;animation-duration:3.2s;"></div>
    <div class="star" style="top:78%;left:12%;animation-delay:1.1s;animation-duration:4.5s;"></div>
    <div class="star" style="top:55%;left:96%;animation-delay:0.6s;animation-duration:3.9s;"></div>
    <div class="star" style="top:88%;left:55%;animation-delay:1.8s;animation-duration:4.1s;"></div>
    <div class="star" style="top:4%;left:42%;animation-delay:2.3s;animation-duration:3.6s;"></div>
    <div class="star" style="top:55%;left:6%;animation-delay:0.9s;animation-duration:4.8s;"></div>
  </div>

  <div class="brand">FutureProof</div>

  <div class="pentagon-container">
    <span class="stat-label ern">ERN</span>
    <span class="stat-label roi">ROI</span>
    <span class="stat-label res">RES</span>
    <span class="stat-label grw">GRW</span>
    <span class="stat-label hmn">HMN</span>
    <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pgrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7DD4A3" stop-opacity="0.15"/>
          <stop offset="50%" stop-color="#B8A9E8" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#F2D477" stop-opacity="0.15"/>
        </linearGradient>
      </defs>
      <polygon points="110,22 188,86 158,172 62,172 32,86" fill="url(#pgrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <polygon points="110,46 164,92 144,160 76,160 56,92" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
      <polygon points="110,70 140,98 130,148 90,148 80,98" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="110" y1="110" x2="110" y2="22" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <line x1="110" y1="110" x2="188" y2="86" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <line x1="110" y1="110" x2="158" y2="172" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <line x1="110" y1="110" x2="62" y2="172" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <line x1="110" y1="110" x2="32" y2="86" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <polygon points="110,38 170,82 150,152 70,152 40,82" fill="url(#pgrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" opacity="0.8"/>
      <circle cx="110" cy="38" r="4" fill="#F2D477" opacity="0.9"/>
      <circle cx="170" cy="82" r="4" fill="#7DD4A3" opacity="0.9"/>
      <circle cx="150" cy="152" r="4" fill="#B8A9E8" opacity="0.9"/>
      <circle cx="70" cy="152" r="4" fill="#7BB8E0" opacity="0.9"/>
      <circle cx="40" cy="82" r="4" fill="#E88BA9" opacity="0.9"/>
    </svg>
  </div>

  <div class="tagline">A college degree isn't a destination.<br>It's a <em>starting position.</em></div>
  <div class="subtitle">See where every path leads.</div>
  <button class="cta">See where your path leads <span class="spark">✦</span></button>

  <div class="footer-line">Open model. Open futures.</div>
</div>

</body>
</html>
