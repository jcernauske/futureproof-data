<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProof — Screen 10: Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #12131F;
    --bg-deep: #1B1D30;
    --bg-mid: #232545;
    --bg-surface: #2D3060;
    --bg-raised: #3A3D75;
    --accent-thrive: #7DD4A3;
    --accent-alert: #F4A97E;
    --accent-caution: #F2D477;
    --accent-insight: #B8A9E8;
    --accent-info: #7BB8E0;
    --accent-empathy: #E88BA9;
    --stat-ern: #F2D477;
    --stat-roi: #7DD4A3;
    --stat-res: #B8A9E8;
    --stat-grw: #7BB8E0;
    --stat-hmn: #E88BA9;
    --text-primary: #F5F0E8;
    --text-secondary: #C4BFB0;
    --text-muted: #8A8595;
    --text-inverse: #1B1D30;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.1);
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --font-data: 'Space Mono', monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;
    --shadow-md: 0 4px 16px rgba(27,29,48,0.6);
    --shadow-lg: 0 8px 32px rgba(27,29,48,0.7);
  }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  .profile-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(27,29,48,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-size: 14px;
    color: var(--text-muted);
  }

  .scenario-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-full);
    padding: 4px;
    z-index: 200;
    box-shadow: var(--shadow-lg);
  }
  .scenario-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: var(--radius-full);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 200ms ease-out;
  }
  .scenario-btn.active { background: var(--bg-raised); color: var(--text-primary); }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 68px 24px 120px;
  }

  /* Hub header */
  .hub-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .hub-emoji { font-size: 48px; margin-bottom: 8px; }
  .hub-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .hub-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* Action tiles */
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .action-tile {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 24px 20px;
    cursor: pointer;
    transition: all 200ms ease-out;
    text-align: center;
  }
  .action-tile:hover {
    border-color: var(--accent-info);
    background: var(--bg-surface);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .action-tile.disabled {
    opacity: 0.4;
    pointer-events: none;
  }
  .tile-icon { font-size: 32px; margin-bottom: 10px; }
  .tile-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .tile-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .tile-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    margin-top: 8px;
  }

  /* Compare section */
  .compare-section {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 24px;
    margin-bottom: 24px;
  }
  .compare-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }
  .compare-builds {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .compare-build-card {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 16px;
    text-align: center;
  }
  .compare-build-emoji { font-size: 28px; margin-bottom: 6px; }
  .compare-build-name {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .compare-build-career {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .compare-mini-stats {
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .compare-stat {
    font-family: var(--font-data);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.04);
  }

  .compare-insight {
    background: rgba(184,169,232,0.06);
    border: 1px solid rgba(184,169,232,0.12);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .compare-insight strong { color: var(--text-primary); }

  /* Chat section */
  .chat-section {
    background: var(--bg-mid);
    border: 1px solid rgba(184,169,232,0.12);
    border-radius: var(--radius-xl);
    padding: 24px;
    margin-bottom: 24px;
  }
  .chat-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .chat-messages {
    margin-bottom: 12px;
    max-height: 240px;
    overflow-y: auto;
  }
  .chat-msg {
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
  }
  .chat-msg.user { justify-content: flex-end; }
  .chat-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    line-height: 1.5;
  }
  .chat-msg.gemma .chat-bubble {
    background: rgba(184,169,232,0.08);
    border: 1px solid rgba(184,169,232,0.12);
    color: var(--text-secondary);
  }
  .chat-msg.user .chat-bubble {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
  }
  .chat-input-row {
    display: flex;
    gap: 8px;
  }
  .chat-input {
    flex: 1;
    height: 40px;
    background: var(--bg-void);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 0 12px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 200ms;
  }
  .chat-input:focus { border-color: var(--accent-insight); }
  .chat-input::placeholder { color: var(--text-muted); }
  .chat-send {
    width: 40px;
    height: 40px;
    background: var(--accent-insight);
    border: none;
    border-radius: var(--radius-md);
    color: var(--text-inverse);
    font-size: 16px;
    cursor: pointer;
    transition: all 200ms;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-send:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(184,169,232,0.3); }

  @media (max-width: 640px) {
    .container { padding: 56px 16px 120px; }
    .action-grid { grid-template-columns: 1fr; }
    .compare-builds { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="profile-header">
  <span>dancing happy bear</span>
  <span>&#x1F43B;</span>
</div>

<div class="container" id="mainContent"></div>

<div class="scenario-bar">
  <button class="scenario-btn active" onclick="switchScenario('hub')">Hub</button>
  <button class="scenario-btn" onclick="switchScenario('compare')">Compare</button>
  <button class="scenario-btn" onclick="switchScenario('chat')">Ask Gemma</button>
  <button class="scenario-btn" onclick="switchScenario('single')">Single Build</button>
  <button class="scenario-btn" onclick="switchScenario('empty')">Empty</button>
</div>

<script>
function switchScenario(scenario) {
  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().replace(' ','') === scenario);
  });
  const c = document.getElementById('mainContent');

  switch(scenario) {
    case 'hub': renderHub(c); break;
    case 'compare': renderCompare(c); break;
    case 'chat': renderChat(c); break;
    case 'single': renderSingle(c); break;
    case 'empty': renderEmpty(c); break;
  }
}

function renderHub(c) {
  c.innerHTML = `
    <div class="hub-header">
      <div class="hub-emoji">\u{1F43B}</div>
      <div class="hub-title">dancing happy bear</div>
      <div class="hub-subtitle">2 builds saved</div>
    </div>

    <div class="action-grid">
      <div class="action-tile" onclick="switchScenario('compare')">
        <div class="tile-icon">\u2696\uFE0F</div>
        <div class="tile-title">Compare Builds</div>
        <div class="tile-desc">See which risks each build wins and loses</div>
        <div class="tile-badge" style="background:rgba(125,212,163,0.12);color:var(--accent-thrive);">2 builds</div>
      </div>
      <div class="action-tile" onclick="alert('Navigate to Branch Tree')">
        <div class="tile-icon">\u{1F333}</div>
        <div class="tile-title">Explore Branches</div>
        <div class="tile-desc">Dive deeper into career paths from your builds</div>
      </div>
      <div class="action-tile" onclick="switchScenario('chat')">
        <div class="tile-icon">\u2728</div>
        <div class="tile-title">Ask Gemma</div>
        <div class="tile-desc">Chat about your build with full context loaded</div>
        <div class="tile-badge" style="background:rgba(184,169,232,0.12);color:var(--accent-insight);">AI</div>
      </div>
      <div class="action-tile" onclick="alert('Navigate to Screen 3')">
        <div class="tile-icon">\u{1F195}</div>
        <div class="tile-title">New Build</div>
        <div class="tile-desc">Try a different school, major, or career path</div>
      </div>
    </div>

    <div style="text-align:center;">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">Saved Builds</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="action-tile" style="text-align:left;padding:16px 18px;display:flex;align-items:center;gap:14px;" onclick="alert('Load build')">
          <span style="font-size:28px;">\u{1F4CA}</span>
          <div>
            <div style="font-weight:700;font-size:15px;">Build #1: Financial Analyst</div>
            <div style="font-size:12px;color:var(--text-muted);">ISU Business \u2022 3W / 1D / 1L \u2022 Apr 12</div>
          </div>
        </div>
        <div class="action-tile" style="text-align:left;padding:16px 18px;display:flex;align-items:center;gap:14px;" onclick="alert('Load build')">
          <span style="font-size:28px;">\u{1F4BB}</span>
          <div>
            <div style="font-weight:700;font-size:15px;">Build #2: Software Developer</div>
            <div style="font-size:12px;color:var(--text-muted);">ISU Computer Science \u2022 4W / 1L / 0D \u2022 Apr 11</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderCompare(c) {
  c.innerHTML = `
    <div class="hub-header">
      <div class="hub-title" style="font-size:22px;">\u2696\uFE0F Risk Comparison</div>
      <div class="hub-subtitle">Which risks can you live with?</div>
    </div>

    <div class="compare-section">
      <div class="compare-builds">
        <div class="compare-build-card">
          <div class="compare-build-emoji">\u{1F4CA}</div>
          <div class="compare-build-name">Financial Analyst</div>
          <div class="compare-build-career">ISU Business</div>
          <div class="compare-mini-stats">
            <span class="compare-stat" style="color:var(--stat-ern)">E7</span>
            <span class="compare-stat" style="color:var(--stat-roi)">R6</span>
            <span class="compare-stat" style="color:var(--stat-res)">R5</span>
            <span class="compare-stat" style="color:var(--stat-grw)">G8</span>
            <span class="compare-stat" style="color:var(--stat-hmn)">H6</span>
          </div>
        </div>
        <div class="compare-build-card">
          <div class="compare-build-emoji">\u{1F4BB}</div>
          <div class="compare-build-name">Software Developer</div>
          <div class="compare-build-career">ISU Computer Science</div>
          <div class="compare-mini-stats">
            <span class="compare-stat" style="color:var(--stat-ern)">E9</span>
            <span class="compare-stat" style="color:var(--stat-roi)">R8</span>
            <span class="compare-stat" style="color:var(--stat-res)">R4</span>
            <span class="compare-stat" style="color:var(--stat-grw)">G9</span>
            <span class="compare-stat" style="color:var(--stat-hmn)">H3</span>
          </div>
        </div>
      </div>

      <!-- Boss comparison -->
      <div style="margin-bottom:16px;">
        ${[
          { boss: '\u{1F916} Fight AI', a: 'lose', b: 'lose' },
          { boss: '\u{1F4B0} Fight Loans', a: 'win', b: 'win' },
          { boss: '\u{1F4C8} Fight Market', a: 'win', b: 'win' },
          { boss: '\u{1F525} Fight Burnout', a: 'draw', b: 'lose' },
          { boss: '\u{1F4CA} Fight Ceiling', a: 'win', b: 'win' }
        ].map(row => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-subtle);font-size:13px;">
            <span class="boss-result-badge ${row.a}" style="font-family:var(--font-data);font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;
              ${row.a==='win'?'color:var(--accent-thrive);background:rgba(125,212,163,0.12);':''}
              ${row.a==='lose'?'color:var(--accent-alert);background:rgba(244,169,126,0.12);':''}
              ${row.a==='draw'?'color:var(--accent-caution);background:rgba(242,212,119,0.12);':''}">${row.a.toUpperCase()}</span>
            <span style="color:var(--text-muted);flex:1;text-align:center;">${row.boss}</span>
            <span class="boss-result-badge ${row.b}" style="font-family:var(--font-data);font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;
              ${row.b==='win'?'color:var(--accent-thrive);background:rgba(125,212,163,0.12);':''}
              ${row.b==='lose'?'color:var(--accent-alert);background:rgba(244,169,126,0.12);':''}
              ${row.b==='draw'?'color:var(--accent-caution);background:rgba(242,212,119,0.12);':''}">${row.b.toUpperCase()}</span>
          </div>
        `).join('')}
      </div>

      <div class="compare-insight">
        <strong>Build A</strong> (Financial Analyst) survives burnout better but has lower earning ceiling.
        <strong>Build B</strong> (Software Developer) earns more and has better return on investment, but the human edge is thin \u2014 burnout is a real risk in tech.
        <br><br>
        <strong>The tradeoff:</strong> Build A is the safer, more balanced path. Build B is higher risk, higher reward. Which risk can you live with?
      </div>
    </div>

    <button style="font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;display:block;margin:0 auto;" onclick="switchScenario('hub')">\u2190 Back to menu</button>
  `;
}

function renderChat(c) {
  c.innerHTML = `
    <div class="hub-header" style="margin-bottom:16px;">
      <div class="hub-title" style="font-size:22px;">\u2728 Ask Gemma</div>
      <div class="hub-subtitle">Full build context loaded \u2022 Financial Analyst, ISU Business</div>
    </div>

    <div class="chat-section">
      <div class="chat-messages">
        <div class="chat-msg user">
          <div class="chat-bubble">What internships should I look for as an ISU Business student going into financial analysis?</div>
        </div>
        <div class="chat-msg gemma">
          <div class="chat-bubble">
            Great question. For ISU Business students targeting financial analysis, I'd focus on three tiers:
            <br><br>
            <strong>Local opportunities:</strong> State Farm (Bloomington) and Country Financial (Normal) both have analyst internship programs and recruit heavily from ISU.
            <br><br>
            <strong>Regional targets:</strong> Caterpillar (Peoria) has a financial analyst rotation program. Deere & Company (Moline) does too, though it's a longer commute.
            <br><br>
            <strong>Stretch targets:</strong> The Chicago loop is 2.5 hours from campus. JPMorgan, Morningstar, and Northern Trust all take ISU interns, though competition is fierce.
            <br><br>
            Given your AI Resilience score of 5, I'd especially recommend internships where you work with data tools \u2014 that hands-on experience is what pushes your resilience score up in future builds.
          </div>
        </div>
        <div class="chat-msg user">
          <div class="chat-bubble">What if I added a data analytics minor?</div>
        </div>
        <div class="chat-msg gemma">
          <div class="chat-bubble">
            That's exactly the move your reroll data suggested. A data analytics minor at ISU would likely push your AI Resilience from 5 to 6-7, which could flip your Fight AI result from LOSE to DRAW or WIN. ISU's Milner Library has Bloomberg Terminal access \u2014 combine that with the minor and you're building a strong analytical toolkit that complements rather than competes with AI.
          </div>
        </div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" type="text" placeholder="Ask anything about your build...">
        <button class="chat-send" onclick="alert('Send message')">\u2191</button>
      </div>
    </div>

    <button style="font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;display:block;margin:0 auto;" onclick="switchScenario('hub')">\u2190 Back to menu</button>
  `;
}

function renderSingle(c) {
  c.innerHTML = `
    <div class="hub-header">
      <div class="hub-emoji">\u{1F43B}</div>
      <div class="hub-title">dancing happy bear</div>
      <div class="hub-subtitle">1 build saved</div>
    </div>

    <div class="action-grid">
      <div class="action-tile disabled">
        <div class="tile-icon">\u2696\uFE0F</div>
        <div class="tile-title">Compare Builds</div>
        <div class="tile-desc">Save 2+ builds to compare risk profiles</div>
        <div class="tile-badge" style="background:rgba(138,133,149,0.2);color:var(--text-muted);">Need 2+ builds</div>
      </div>
      <div class="action-tile" onclick="alert('Navigate to Branch Tree')">
        <div class="tile-icon">\u{1F333}</div>
        <div class="tile-title">Explore Branches</div>
        <div class="tile-desc">See where your Financial Analyst path leads</div>
      </div>
      <div class="action-tile" onclick="switchScenario('chat')">
        <div class="tile-icon">\u2728</div>
        <div class="tile-title">Ask Gemma</div>
        <div class="tile-desc">Chat about your build</div>
        <div class="tile-badge" style="background:rgba(184,169,232,0.12);color:var(--accent-insight);">AI</div>
      </div>
      <div class="action-tile" onclick="alert('Navigate to Screen 3')">
        <div class="tile-icon">\u{1F195}</div>
        <div class="tile-title">New Build</div>
        <div class="tile-desc">Try a different path to compare</div>
      </div>
    </div>
  `;
}

function renderEmpty(c) {
  c.innerHTML = `
    <div style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;">
      <div style="font-size:64px;opacity:0.5;">\u{1F3AE}</div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:600;">No builds yet</div>
      <div style="font-size:16px;color:var(--text-secondary);max-width:360px;">
        Complete your first build to unlock the menu. Compare builds, explore branches, and chat with Gemma.
      </div>
      <button style="font-family:var(--font-body);font-size:15px;font-weight:700;color:var(--text-inverse);background:var(--accent-thrive);border:none;border-radius:14px;padding:14px 28px;cursor:pointer;margin-top:8px;" onclick="alert('Start build')">Start your first build</button>
    </div>
  `;
}

switchScenario('hub');
</script>
</body>
</html>
