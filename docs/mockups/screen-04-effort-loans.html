<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProof — Screen 4: Effort + Loans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #12131F;
    --bg-deep: #1B1D30;
    --bg-mid: #232545;
    --bg-surface: #2D3060;
    --bg-raised: #3A3D75;
    --accent-thrive: #7DD4A3;
    --accent-alert: #F4A97E;
    --accent-caution: #F2D477;
    --accent-insight: #B8A9E8;
    --accent-info: #7BB8E0;
    --accent-empathy: #E88BA9;
    --stat-ern: #F2D477;
    --stat-roi: #7DD4A3;
    --stat-res: #B8A9E8;
    --stat-grw: #7BB8E0;
    --stat-hmn: #E88BA9;
    --text-primary: #F5F0E8;
    --text-secondary: #C4BFB0;
    --text-muted: #8A8595;
    --text-inverse: #1B1D30;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.1);
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --font-data: 'Space Mono', monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;
    --shadow-md: 0 4px 16px rgba(27,29,48,0.6);
    --shadow-lg: 0 8px 32px rgba(27,29,48,0.7);
  }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  /* Warm gradient overlay for this screen */
  .warm-gradient {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(242,212,119,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .profile-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(27,29,48,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-size: 14px;
    color: var(--text-muted);
  }

  .scenario-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-full);
    padding: 4px;
    z-index: 200;
    box-shadow: var(--shadow-lg);
  }
  .scenario-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: var(--radius-full);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 200ms ease-out;
  }
  .scenario-btn.active { background: var(--bg-raised); color: var(--text-primary); }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 80px 24px 120px;
  }

  .screen-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
  }
  .screen-subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 36px;
    line-height: 1.5;
  }

  /* === SLIDER SECTION === */
  .slider-section {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 24px;
    margin-bottom: 20px;
  }
  .slider-question {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .slider-context {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Custom slider */
  .slider-track {
    position: relative;
    width: 100%;
    height: 44px;
    display: flex;
    align-items: center;
  }
  .track-bg {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 4px;
    transform: translateY(-50%);
    background: var(--bg-void);
    border-radius: var(--radius-full);
  }
  .track-fill {
    position: absolute;
    top: 50%;
    left: 0;
    height: 4px;
    transform: translateY(-50%);
    border-radius: var(--radius-full);
    transition: width 200ms ease-out;
  }

  /* Discrete stops */
  .track-stops {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
    padding: 0;
  }
  .track-stop {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--bg-raised);
    border: 2px solid var(--bg-void);
    cursor: pointer;
    transition: all 200ms ease-out;
    z-index: 2;
  }
  .track-stop.active {
    background: var(--accent-thrive);
    border-color: var(--accent-thrive);
    box-shadow: 0 0 10px rgba(125,212,163,0.3);
    transform: scale(1.3);
  }
  .track-stop.past {
    background: var(--accent-thrive);
    border-color: var(--accent-thrive);
    opacity: 0.6;
  }

  /* Labels */
  .slider-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }
  .slider-label {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    max-width: 100px;
    line-height: 1.3;
    cursor: pointer;
    transition: color 200ms;
  }
  .slider-label.active { color: var(--text-primary); font-weight: 600; }

  /* Current value display */
  .slider-value {
    text-align: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
  }
  .slider-value-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .slider-value-impact {
    font-family: var(--font-data);
    font-size: 15px;
    font-weight: 700;
    transition: color 200ms;
  }

  /* === STAT PREVIEW === */
  .stat-preview {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 24px;
    margin-bottom: 24px;
  }
  .preview-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 16px;
    text-align: center;
  }

  .preview-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .preview-stat {
    text-align: center;
  }
  .preview-stat-label {
    font-family: var(--font-data);
    font-size: 10px;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .preview-stat-value {
    font-family: var(--font-data);
    font-size: 20px;
    font-weight: 700;
    transition: all 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .preview-stat-value.changed {
    transform: scale(1.15);
  }

  /* Mini pentagon + toggle */
  .stat-chart-toggle-wrap {
    position: relative;
    margin-top: 12px;
  }
  .stat-chart-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
  }
  .mini-chart-toggle {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px;
    border-radius: var(--radius-sm);
    transition: all 200ms ease-out;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mini-chart-toggle svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 200ms ease-out;
  }
  .mini-chart-toggle:hover svg { stroke: var(--text-primary); }
  .mini-chart-toggle:hover { background: rgba(255,255,255,0.05); }

  .mini-chart-view {
    transition: opacity 200ms ease-out;
  }
  .mini-chart-view.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
    top: 0; left: 0; right: 0;
  }

  .mini-pentagon {
    display: flex;
    justify-content: center;
  }

  .mini-bar-chart { padding: 8px 0; }
  .mini-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .mini-bar-label {
    font-family: var(--font-data);
    font-size: 9px;
    letter-spacing: 0.08em;
    width: 30px;
    text-align: right;
    flex-shrink: 0;
  }
  .mini-bar-track {
    flex: 1;
    height: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: var(--radius-full);
    overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%;
    border-radius: var(--radius-full);
    transform-origin: left center;
    transform: scaleX(0);
    transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .mini-bar-fill.animate { transform: scaleX(1); }
  .mini-bar-score {
    font-family: var(--font-data);
    font-size: 12px;
    font-weight: 700;
    width: 20px;
    text-align: left;
    flex-shrink: 0;
  }

  /* === CTA === */
  .cta-btn {
    font-family: var(--font-body);
    font-size: 17px;
    font-weight: 700;
    color: var(--text-inverse);
    background: var(--accent-thrive);
    border: none;
    border-radius: var(--radius-lg);
    padding: 16px 40px;
    cursor: pointer;
    transition: all 200ms ease-out;
    display: block;
    width: 100%;
  }
  .cta-btn:hover { transform: scale(1.02); box-shadow: 0 0 24px rgba(125,212,163,0.3); }

  /* Receipt */
  .receipt-link {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.5;
    cursor: pointer;
    margin-top: 8px;
    display: block;
    text-align: center;
    transition: opacity 200ms;
  }
  .receipt-link:hover { opacity: 1; }

  /* === STAT LEGEND (First Encounter) === */
  .stat-legend {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .stat-legend-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 16px;
  }
  .stat-legend-intro {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .stat-legend-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 200ms;
    border-radius: var(--radius-sm);
    padding-left: 6px;
    padding-right: 6px;
  }
  .stat-legend-row:last-child { border-bottom: none; }
  .stat-legend-row:hover { background: rgba(255,255,255,0.02); }
  .stat-legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .stat-legend-info { flex: 1; }
  .stat-legend-name {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
  }
  .stat-legend-abbr {
    font-family: var(--font-data);
    font-size: 10px;
    opacity: 0.5;
    margin-left: 4px;
    letter-spacing: 0.05em;
  }
  .stat-legend-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
    margin-top: 2px;
  }
  .stat-legend-expanded {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border-subtle);
    display: none;
  }
  .stat-legend-row.expanded .stat-legend-expanded { display: block; }

  .skeleton {
    background: linear-gradient(90deg, var(--bg-mid) 25%, var(--bg-surface) 50%, var(--bg-mid) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: var(--radius-md);
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  @media (max-width: 640px) {
    .container { padding: 60px 16px 120px; }
    .screen-title { font-size: 22px; }
    .preview-stats { grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .preview-stat-value { font-size: 16px; }
    .slider-label { font-size: 10px; max-width: 70px; }
  }
</style>
</head>
<body>

<div class="warm-gradient"></div>

<div class="profile-header">
  <span>dancing happy bear</span>
  <span>&#x1F43B;</span>
</div>

<div class="container" id="mainContent"></div>

<div class="scenario-bar">
  <button class="scenario-btn active" onclick="switchScenario('populated')">Populated</button>
  <button class="scenario-btn" onclick="switchScenario('default')">Default</button>
  <button class="scenario-btn" onclick="switchScenario('loading')">Loading</button>
  <button class="scenario-btn" onclick="switchScenario('empty')">Empty</button>
</div>

<script>
// State
let effortLevel = 2; // 0=Working, 1=Balanced, 2=All-in
let loanLevel = 2;   // 0=0%, 1=25%, 2=50%, 3=75%, 4=100%

const EFFORT_LABELS = [
  { short: 'Working + school', desc: 'Limited focus', ernShift: -1, percentile: '25th' },
  { short: 'Balanced', desc: 'Solid effort', ernShift: 0, percentile: '50th' },
  { short: 'All-in', desc: 'Maximum focus', ernShift: +1, percentile: '75th' }
];

const LOAN_LABELS = [
  { short: 'No loans', pct: '0%', roiEffect: 'Maximized' },
  { short: 'Some', pct: '25%', roiEffect: 'Good' },
  { short: 'Half', pct: '50%', roiEffect: 'Moderate' },
  { short: 'Mostly', pct: '75%', roiEffect: 'Strained' },
  { short: 'All loans', pct: '100%', roiEffect: 'Full debt' }
];

// Base stats for ISU Business -> Financial Analyst
const BASE_STATS = { ERN: 7, ROI: 7, RES: 5, GRW: 8, HMN: 6 };

// Full stat names and descriptions — the stat literacy system
const STAT_NAMES = {
  ERN: { full: 'Earning Power', short: 'What graduates actually earn', detail: 'Based on real salary data from your specific school and program. Your effort level shifts the percentile. Source: College Scorecard.' },
  ROI: { full: 'Return on Investment', short: 'Earnings vs. student debt', detail: 'Compares your expected earnings to your total student debt. Less borrowing means better ROI. Source: College Scorecard.' },
  RES: { full: 'AI Resilience', short: 'How safe from automation', detail: 'Measures how exposed this career is to AI automation. Higher means the work needs humans. Source: Karpathy AI Exposure + O*NET tasks.' },
  GRW: { full: 'Growth', short: 'Is the field expanding?', detail: 'Based on 10-year job projections. Higher means more opportunity ahead. Source: Bureau of Labor Statistics.' },
  HMN: { full: 'Human Edge', short: 'Needs uniquely human skills', detail: 'How much does this job depend on empathy, creativity, judgment, and persuasion? Higher means harder to replace. Source: O*NET Work Activities.' }
};

function getStats() {
  const stats = { ...BASE_STATS };
  stats.ERN = Math.max(1, Math.min(10, BASE_STATS.ERN + EFFORT_LABELS[effortLevel].ernShift));

  // Loan effect on ROI
  const roiAdj = [2, 1, 0, -1, -2];
  stats.ROI = Math.max(1, Math.min(10, BASE_STATS.ROI + roiAdj[loanLevel]));

  return stats;
}

function switchScenario(scenario) {
  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === scenario);
  });
  if (scenario === 'default') { effortLevel = 1; loanLevel = 2; }
  else if (scenario === 'populated') { effortLevel = 2; loanLevel = 2; }
  render(scenario);
}

function render(scenario) {
  const c = document.getElementById('mainContent');
  if (scenario === 'loading') { renderLoading(c); return; }
  if (scenario === 'empty') { renderEmpty(c); return; }

  const stats = getStats();
  const colors = { ERN: '#F2D477', ROI: '#7DD4A3', RES: '#B8A9E8', GRW: '#7BB8E0', HMN: '#E88BA9' };

  c.innerHTML = `
    <div class="screen-title">Personalize your build</div>
    <div class="screen-subtitle">These two questions shape your stats. Be honest \u2014 there are no wrong answers.</div>

    <!-- Effort Slider -->
    <div class="slider-section">
      <div class="slider-question">How much time will you have to focus on school?</div>
      <div class="slider-context">This isn't about ability or desire. It's about how much time you realistically have. Working two jobs? That's the reality, and this tool respects it.</div>

      <div class="slider-track">
        <div class="track-bg"></div>
        <div class="track-fill" id="effortFill" style="width:${effortLevel * 50}%;background:linear-gradient(90deg, var(--accent-info), var(--accent-thrive));"></div>
        <div class="track-stops">
          ${EFFORT_LABELS.map((_, i) => `
            <div class="track-stop ${i <= effortLevel ? (i === effortLevel ? 'active' : 'past') : ''}" onclick="setEffort(${i})"></div>
          `).join('')}
        </div>
      </div>
      <div class="slider-labels">
        ${EFFORT_LABELS.map((l, i) => `
          <div class="slider-label ${i === effortLevel ? 'active' : ''}" onclick="setEffort(${i})">${l.short}</div>
        `).join('')}
      </div>
      <div class="slider-value">
        <div class="slider-value-label">${EFFORT_LABELS[effortLevel].desc} \u2022 ${EFFORT_LABELS[effortLevel].percentile} percentile</div>
        <div class="slider-value-impact" style="color: ${EFFORT_LABELS[effortLevel].ernShift >= 0 ? 'var(--accent-thrive)' : 'var(--accent-alert)'}">
          Earning Power ${EFFORT_LABELS[effortLevel].ernShift >= 0 ? '+' : ''}${EFFORT_LABELS[effortLevel].ernShift}
        </div>
      </div>
    </div>

    <!-- Loan Slider -->
    <div class="slider-section">
      <div class="slider-question">How much of your school costs will you cover with loans?</div>
      <div class="slider-context">Scholarships, family help, savings \u2014 anything that isn't borrowed money brings this slider down. Less debt means better Return on Investment.</div>

      <div class="slider-track">
        <div class="track-bg"></div>
        <div class="track-fill" id="loanFill" style="width:${loanLevel * 25}%;background:linear-gradient(90deg, var(--accent-thrive), var(--accent-alert));"></div>
        <div class="track-stops">
          ${LOAN_LABELS.map((_, i) => `
            <div class="track-stop ${i <= loanLevel ? (i === loanLevel ? 'active' : 'past') : ''}" onclick="setLoan(${i})"></div>
          `).join('')}
        </div>
      </div>
      <div class="slider-labels">
        ${LOAN_LABELS.map((l, i) => `
          <div class="slider-label ${i === loanLevel ? 'active' : ''}" onclick="setLoan(${i})">${l.short}<br><span style="font-family:var(--font-data);font-size:10px;">${l.pct}</span></div>
        `).join('')}
      </div>
      <div class="slider-value">
        <div class="slider-value-label">${LOAN_LABELS[loanLevel].roiEffect}</div>
        <div class="slider-value-impact" style="color: ${loanLevel <= 2 ? 'var(--accent-thrive)' : 'var(--accent-alert)'}">
          Return on Investment ${stats.ROI >= BASE_STATS.ROI ? (stats.ROI > BASE_STATS.ROI ? '+' + (stats.ROI - BASE_STATS.ROI) : '\u00b10') : (stats.ROI - BASE_STATS.ROI)}
        </div>
      </div>
    </div>

    <!-- Stat Legend (First Encounter) -->
    <div class="stat-legend">
      <div class="stat-legend-title">Your five career stats</div>
      <div class="stat-legend-intro">Every career path in FutureProof is measured by these five stats, all backed by real data. Tap any stat to learn more.</div>
      ${['ERN', 'ROI', 'RES', 'GRW', 'HMN'].map(k => `
        <div class="stat-legend-row" onclick="this.classList.toggle('expanded')">
          <div class="stat-legend-dot" style="background:${colors[k]}"></div>
          <div class="stat-legend-info">
            <div class="stat-legend-name" style="color:${colors[k]}">${STAT_NAMES[k].full}<span class="stat-legend-abbr">${k}</span></div>
            <div class="stat-legend-desc">${STAT_NAMES[k].short}</div>
            <div class="stat-legend-expanded">${STAT_NAMES[k].detail}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- Stat Preview -->
    <div class="stat-preview">
      <div class="preview-title">Live stat preview</div>
      <div class="preview-stats">
        ${Object.entries(stats).map(([k, v]) => `
          <div class="preview-stat">
            <div class="preview-stat-label" style="color:${colors[k]};font-size:9px;line-height:1.2;">${STAT_NAMES[k].full}</div>
            <div class="preview-stat-value" style="color:${colors[k]}">${v}</div>
          </div>
        `).join('')}
      </div>
      <div class="stat-chart-toggle-wrap">
        <div class="stat-chart-toolbar">
          <button class="mini-chart-toggle" onclick="toggleChart04()" title="Switch view" id="chartToggle04">
            <svg viewBox="0 0 20 20" id="chartToggleIcon04">
              <rect x="2" y="12" width="3" height="6" rx="1"/>
              <rect x="7" y="6" width="3" height="12" rx="1"/>
              <rect x="12" y="9" width="3" height="9" rx="1"/>
              <rect x="15" y="3" width="3" height="15" rx="1"/>
            </svg>
          </button>
        </div>
        <div class="mini-chart-view" id="pentView04">
          <div class="mini-pentagon">
            <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" width="140" height="140">
              ${drawMiniPent(stats, 70, 70, 55)}
            </svg>
          </div>
        </div>
        <div class="mini-chart-view hidden" id="barView04">
          ${drawMiniBarChart(stats)}
        </div>
      </div>
      <div class="receipt-link" onclick="alert('Receipt: Effort = ${EFFORT_LABELS[effortLevel].percentile}, Loan = ${LOAN_LABELS[loanLevel].pct}\\nERN base: 7, shift: ${EFFORT_LABELS[effortLevel].ernShift}\\nROI base: 7, loan adjustment: ${stats.ROI - BASE_STATS.ROI}')">? How these numbers work</div>
    </div>

    <button class="cta-btn" onclick="alert('Navigate to Screen 5: Career Pick')">Spec my build</button>
  `;
}

function drawMiniPent(stats, cx, cy, r) {
  const order = ['ERN', 'ROI', 'RES', 'GRW', 'HMN'];
  const colors = { ERN: '#F2D477', ROI: '#7DD4A3', RES: '#B8A9E8', GRW: '#7BB8E0', HMN: '#E88BA9' };

  let svg = '';
  // Grid
  for (let ring = 1; ring <= 3; ring++) {
    const rr = r * ring / 3;
    const pts = order.map((_, i) => {
      const a = (Math.PI * 2 * i / 5) - Math.PI / 2;
      return `${cx + rr * Math.cos(a)},${cy + rr * Math.sin(a)}`;
    });
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
  }

  // Data
  const dataPts = order.map((s, i) => {
    const dr = r * (stats[s] / 10);
    const a = (Math.PI * 2 * i / 5) - Math.PI / 2;
    return `${cx + dr * Math.cos(a)},${cy + dr * Math.sin(a)}`;
  });
  svg += `<polygon points="${dataPts.join(' ')}" fill="rgba(125,212,163,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>`;

  order.forEach((s, i) => {
    const dr = r * (stats[s] / 10);
    const a = (Math.PI * 2 * i / 5) - Math.PI / 2;
    svg += `<circle cx="${cx + dr * Math.cos(a)}" cy="${cy + dr * Math.sin(a)}" r="3" fill="${colors[s]}"/>`;
  });
  return svg;
}

function setEffort(level) {
  effortLevel = level;
  chartMode04 = 'pentagon'; // Reset toggle on re-render
  render('populated');
}

function setLoan(level) {
  loanLevel = level;
  chartMode04 = 'pentagon'; // Reset toggle on re-render
  render('populated');
}

function renderLoading(c) {
  c.innerHTML = `
    <div class="screen-title">Personalize your build</div>
    <div class="screen-subtitle">These two questions shape your stats.</div>
    <div class="skeleton" style="height:200px;margin-bottom:16px;border-radius:20px;"></div>
    <div class="skeleton" style="height:200px;margin-bottom:16px;border-radius:20px;"></div>
    <div class="skeleton" style="height:140px;border-radius:20px;"></div>
  `;
}

function renderEmpty(c) {
  c.innerHTML = `
    <div style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;">
      <div style="font-size:64px;opacity:0.5;">\u{1F3AF}</div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:600;">Pick a school first</div>
      <div style="font-size:16px;color:var(--text-secondary);max-width:360px;">
        Your effort and loan sliders depend on which school you've selected. Head back and pick one.
      </div>
      <button class="cta-btn" style="max-width:280px;margin-top:8px;" onclick="alert('Go to Screen 3')">Pick a school</button>
    </div>
  `;
}

// === CHART TOGGLE (Screen 04) ===
let chartMode04 = 'pentagon';

function drawMiniBarChart(stats) {
  const order = ['ERN', 'ROI', 'RES', 'GRW', 'HMN'];
  const colors = { ERN: '#F2D477', ROI: '#7DD4A3', RES: '#B8A9E8', GRW: '#7BB8E0', HMN: '#E88BA9' };
  return `<div class="mini-bar-chart">${order.map((s, i) => {
    const val = stats[s];
    return `<div class="mini-bar-row">
      <div class="mini-bar-label" style="color:${colors[s]};width:70px;font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:0;">${STAT_NAMES[s].full}</div>
      <div class="mini-bar-track">
        <div class="mini-bar-fill" data-bar-index="${i}" style="width:${val * 10}%;background:${colors[s]};opacity:0.85;"></div>
      </div>
      <div class="mini-bar-score" style="color:${colors[s]}">${val}</div>
    </div>`;
  }).join('')}</div>`;
}

function toggleChart04() {
  const pentView = document.getElementById('pentView04');
  const barView = document.getElementById('barView04');
  const iconEl = document.getElementById('chartToggleIcon04');
  if (!pentView || !barView) return;

  if (chartMode04 === 'pentagon') {
    chartMode04 = 'bar';
    pentView.classList.add('hidden');
    barView.classList.remove('hidden');
    iconEl.outerHTML = `<svg viewBox="0 0 20 20" id="chartToggleIcon04"><polygon points="10,1 18.5,7.2 15.2,17 4.8,17 1.5,7.2" fill="none" stroke="inherit" stroke-width="1.5"/></svg>`;
    setTimeout(() => {
      barView.querySelectorAll('.mini-bar-fill').forEach((bar, i) => {
        setTimeout(() => bar.classList.add('animate'), i * 60);
      });
    }, 50);
  } else {
    chartMode04 = 'pentagon';
    barView.classList.add('hidden');
    pentView.classList.remove('hidden');
    iconEl.outerHTML = `<svg viewBox="0 0 20 20" id="chartToggleIcon04"><rect x="2" y="12" width="3" height="6" rx="1"/><rect x="7" y="6" width="3" height="12" rx="1"/><rect x="12" y="9" width="3" height="9" rx="1"/><rect x="15" y="3" width="3" height="15" rx="1"/></svg>`;
    barView.querySelectorAll('.mini-bar-fill').forEach(bar => bar.classList.remove('animate'));
  }
}

switchScenario('populated');
</script>
