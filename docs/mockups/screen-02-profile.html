<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProof — Screen 2: Profile Name</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #12131F;
    --bg-deep: #1B1D30;
    --bg-mid: #232545;
    --bg-surface: #2D3060;
    --bg-raised: #3A3D75;
    --accent-thrive: #7DD4A3;
    --accent-alert: #F4A97E;
    --accent-caution: #F2D477;
    --accent-insight: #B8A9E8;
    --accent-info: #7BB8E0;
    --accent-empathy: #E88BA9;
    --text-primary: #F5F0E8;
    --text-secondary: #C4BFB0;
    --text-muted: #8A8595;
    --text-inverse: #1B1D30;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.1);
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --font-data: 'Space Mono', monospace;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;
    --shadow-md: 0 4px 16px rgba(27,29,48,0.6);
    --shadow-lg: 0 8px 32px rgba(27,29,48,0.7);
  }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  .scenario-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-full);
    padding: 4px;
    z-index: 200;
    box-shadow: var(--shadow-lg);
  }
  .scenario-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: var(--radius-full);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 200ms ease-out;
  }
  .scenario-btn.active { background: var(--bg-raised); color: var(--text-primary); }

  .profile-page {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
  }

  .you-are {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 0.2s forwards;
  }

  .profile-emoji {
    font-size: 64px;
    margin-bottom: 12px;
    display: block;
    opacity: 0;
    transform: scale(0.8);
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
  }

  .profile-name {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
    opacity: 0;
    transform: scale(0.9);
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
    transition: opacity 150ms, transform 150ms;
  }
  .profile-name.switching {
    opacity: 0;
    transform: scale(0.95);
  }

  .profile-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 0.7s forwards;
  }

  /* Reroll button */
  .reroll-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-info);
    background: transparent;
    border: 1px solid rgba(123,184,224,0.3);
    border-radius: var(--radius-full);
    padding: 8px 20px;
    cursor: pointer;
    transition: all 200ms ease-out;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 0.8s forwards;
  }
  .reroll-btn:hover {
    background: rgba(123,184,224,0.08);
    border-color: var(--accent-info);
  }
  .reroll-btn:active { transform: scale(0.96); }
  .dice-icon {
    font-size: 16px;
    display: inline-block;
    transition: transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .reroll-btn:active .dice-icon { transform: rotate(180deg); }

  /* CTA */
  .cta-btn {
    font-family: var(--font-body);
    font-size: 17px;
    font-weight: 700;
    color: var(--text-inverse);
    background: var(--accent-thrive);
    border: none;
    border-radius: var(--radius-lg);
    padding: 16px 40px;
    cursor: pointer;
    transition: all 200ms ease-out;
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto 24px;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 0.9s forwards;
  }
  .cta-btn:hover { transform: scale(1.03); box-shadow: 0 0 32px rgba(125,212,163,0.4); }
  .cta-btn:active { transform: scale(0.97); }

  /* Returning user */
  .returning-link {
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 200ms;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 1s forwards;
  }
  .returning-link:hover { color: var(--text-secondary); }

  /* Returning user expanded */
  .returning-form {
    margin-top: 16px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: all 300ms ease-out;
  }
  .returning-form.visible {
    max-height: 200px;
    opacity: 1;
  }
  .returning-input {
    width: 100%;
    max-width: 280px;
    height: 44px;
    background: var(--bg-void);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 0 16px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
    text-align: center;
    margin-bottom: 8px;
    transition: border-color 200ms;
  }
  .returning-input:focus { border-color: var(--accent-info); box-shadow: 0 0 0 3px rgba(123,184,224,0.15); }
  .returning-input::placeholder { color: var(--text-muted); }
  .lookup-btn {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-info);
    background: transparent;
    border: 1px solid rgba(123,184,224,0.3);
    border-radius: var(--radius-lg);
    padding: 8px 20px;
    cursor: pointer;
    transition: all 200ms;
  }
  .lookup-btn:hover { background: rgba(123,184,224,0.08); }

  /* Lookup results */
  .lookup-result {
    margin-top: 12px;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    display: none;
  }
  .lookup-result.found {
    display: block;
    background: rgba(125,212,163,0.08);
    border: 1px solid rgba(125,212,163,0.15);
    color: var(--accent-thrive);
  }
  .lookup-result.suggestion {
    display: block;
    background: rgba(242,212,119,0.08);
    border: 1px solid rgba(242,212,119,0.15);
    color: var(--accent-caution);
  }
  .lookup-result.not-found {
    display: block;
    background: rgba(244,169,126,0.08);
    border: 1px solid rgba(244,169,126,0.15);
    color: var(--accent-alert);
  }

  /* Emoji glow */
  .emoji-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -65%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(125,212,163,0.06) 0%,
      rgba(123,184,224,0.03) 40%,
      transparent 65%);
    pointer-events: none;
    animation: glow-pulse 4s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%,100% { transform: translate(-50%,-65%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%,-65%) scale(1.1); opacity: 1; }
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounceIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

  @media (max-width: 640px) {
    .profile-name { font-size: 32px; }
    .profile-emoji { font-size: 52px; }
    .cta-btn { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="profile-page" id="profilePage" style="position:relative;">
  <div class="emoji-glow"></div>
</div>

<div class="scenario-bar">
  <button class="scenario-btn active" onclick="switchScenario('default')">Default</button>
  <button class="scenario-btn" onclick="switchScenario('returning')">Returning</button>
  <button class="scenario-btn" onclick="switchScenario('found')">Found</button>
  <button class="scenario-btn" onclick="switchScenario('suggestion')">Suggestion</button>
  <button class="scenario-btn" onclick="switchScenario('notfound')">Not Found</button>
  <button class="scenario-btn" onclick="switchScenario('loading')">Loading</button>
</div>

<script>
const NAMES = [
  { adj1: 'dancing', adj2: 'happy', animal: 'bear', emoji: '\u{1F43B}' },
  { adj1: 'steady', adj2: 'bold', animal: 'turtle', emoji: '\u{1F422}' },
  { adj1: 'brave', adj2: 'curious', animal: 'fox', emoji: '\u{1F98A}' },
  { adj1: 'bright', adj2: 'gentle', animal: 'rabbit', emoji: '\u{1F430}' },
  { adj1: 'swift', adj2: 'clever', animal: 'squirrel', emoji: '\u{1F43F}\uFE0F' }
];

let currentNameIdx = 0;
let showingReturning = false;

function switchScenario(scenario) {
  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === scenario);
  });
  showingReturning = false;
  currentNameIdx = 0;
  render(scenario);
}

function render(scenario) {
  const page = document.getElementById('profilePage');
  const name = NAMES[currentNameIdx];
  const fullName = `${name.adj1} ${name.adj2} ${name.animal}`;

  let returningHTML = '';
  let lookupHTML = '';

  if (scenario === 'returning' || scenario === 'found' || scenario === 'suggestion' || scenario === 'notfound') {
    returningHTML = `
      <div class="returning-form visible">
        <input class="returning-input" type="text" placeholder="Type your profile name..." value="${scenario !== 'returning' ? 'stedy bold turtl' : ''}">
        <button class="lookup-btn" onclick="alert('Look up')">Look up</button>
        ${scenario === 'found' ? `<div class="lookup-result found">\u2713 Found! Welcome back, <strong>steady bold turtle \u{1F422}</strong>. Loading your builds...</div>` : ''}
        ${scenario === 'suggestion' ? `<div class="lookup-result suggestion">Did you mean <strong>steady bold turtle \u{1F422}</strong>?<br><a href="#" style="color:var(--accent-caution);" onclick="alert('Accept suggestion')">Yes, that's me</a></div>` : ''}
        ${scenario === 'notfound' ? `<div class="lookup-result not-found">No profile found for that name. Try a different spelling, or continue with your new name above.</div>` : ''}
      </div>
    `;
  }

  if (scenario === 'loading') {
    page.innerHTML = `
      <div class="emoji-glow"></div>
      <div class="you-are" style="opacity:1;">You are</div>
      <div style="font-size:64px;margin-bottom:12px;opacity:0.4;animation:pulse-text 1.5s ease-in-out infinite;">\u2728</div>
      <div style="height:48px;width:280px;margin:0 auto 32px;" class="skeleton"></div>
      <div style="font-size:14px;color:var(--text-muted);">Generating your profile name...</div>
    `;
    return;
  }

  page.innerHTML = `
    <div class="emoji-glow"></div>
    <div class="you-are">You are</div>
    <span class="profile-emoji">${name.emoji}</span>
    <div class="profile-name" id="profileName">${fullName}</div>
    <div class="profile-subtitle">No accounts. No passwords. Just you.</div>
    <button class="reroll-btn" onclick="reroll()">
      <span class="dice-icon">\u{1F3B2}</span> New name
    </button>
    <button class="cta-btn" onclick="alert('Navigate to Screen 3: School + Major')">Let's go</button>
    <div class="returning-link" onclick="toggleReturning()">Already have a name?</div>
    ${returningHTML}
  `;
}

function reroll() {
  currentNameIdx = (currentNameIdx + 1) % NAMES.length;
  const name = NAMES[currentNameIdx];
  const el = document.getElementById('profileName');
  const emoji = document.querySelector('.profile-emoji');

  el.classList.add('switching');
  setTimeout(() => {
    el.textContent = `${name.adj1} ${name.adj2} ${name.animal}`;
    emoji.textContent = name.emoji;
    el.classList.remove('switching');
  }, 150);
}

function toggleReturning() {
  const form = document.querySelector('.returning-form');
  if (form) {
    form.classList.toggle('visible');
  } else {
    showingReturning = true;
    // Insert form
    const link = document.querySelector('.returning-link');
    link.insertAdjacentHTML('afterend', `
      <div class="returning-form visible">
        <input class="returning-input" type="text" placeholder="Type your profile name...">
        <button class="lookup-btn">Look up</button>
      </div>
    `);
  }
}

// Extra CSS
const style = document.createElement('style');
style.textContent = `
  @keyframes pulse-text { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  .skeleton { background: linear-gradient(90deg, var(--bg-mid) 25%, var(--bg-surface) 50%, var(--bg-mid) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 10px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
`;
document.head.appendChild(style);

switchScenario('default');
</script>
</body>
</html>
