<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProof — Application Chrome Shell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #12131F;
    --bg-deep: #1B1D30;
    --bg-mid: #232545;
    --bg-surface: #2D3060;
    --bg-raised: #3A3D75;
    --accent-thrive: #7DD4A3;
    --accent-alert: #F4A97E;
    --accent-caution: #F2D477;
    --accent-insight: #B8A9E8;
    --accent-info: #7BB8E0;
    --accent-empathy: #E88BA9;
    --stat-ern: #F2D477;
    --stat-roi: #7DD4A3;
    --stat-res: #B8A9E8;
    --stat-grw: #7BB8E0;
    --stat-hmn: #E88BA9;
    --text-primary: #F5F0E8;
    --text-secondary: #C4BFB0;
    --text-muted: #8A8595;
    --text-inverse: #1B1D30;
    --border-subtle: rgba(255,255,255,0.04);
    --border-bright: rgba(255,255,255,0.08);
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --font-data: 'Space Mono', monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;
    --shadow-md: 0 4px 16px rgba(27,29,48,0.6);
    --shadow-lg: 0 8px 32px rgba(27,29,48,0.7);
    --chrome-height: 48px;
  }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow-x: hidden;
    transition: background 0.5s ease;
  }

  /* Noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  /* ========== CHROME HEADER ========== */
  .chrome-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--chrome-height);
    background: rgba(27, 29, 48, 0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
    transition: opacity 0.4s ease, background 0.4s ease, border-color 0.4s ease;
  }

  .chrome-header.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-100%);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .chrome-header.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
    transition: opacity 0.4s ease 0.3s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
  }

  .chrome-header.cinematic {
    background: rgba(27, 29, 48, 0.55);
    border-bottom-color: rgba(255,255,255,0.02);
  }
  .chrome-header.cinematic .profile-name {
    opacity: 0.35;
  }
  .chrome-header.cinematic .back-btn {
    opacity: 0.5;
  }

  .chrome-header.bright-border {
    border-bottom-color: var(--border-bright);
  }

  /* Left zone */
  .header-left {
    width: 80px;
    display: flex;
    align-items: center;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 8px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, background 0.2s, opacity 0.3s;
    font-size: 18px;
    width: 36px;
    height: 36px;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
  }
  .back-btn.home-mode {
    font-size: 16px;
  }

  /* Center zone */
  .header-center {
    flex: 1;
    text-align: center;
    font-size: 14px;
    transition: color 0.5s ease;
  }
  .profile-name {
    transition: color 0.5s ease, opacity 0.4s ease;
  }
  .profile-name.muted {
    color: var(--text-muted);
  }
  .profile-name.secondary {
    color: var(--text-secondary);
  }
  .wordmark {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  /* Right zone */
  .header-right {
    width: 80px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .new-build-btn {
    background: transparent;
    border: 1px solid var(--accent-info);
    color: var(--accent-info);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: var(--radius-full);
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, opacity 0.4s;
    opacity: 0;
    transform: translateX(20px);
    white-space: nowrap;
  }
  .new-build-btn.visible {
    opacity: 1;
    transform: translateX(0);
    transition: background 0.2s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
  }
  .new-build-btn:hover {
    background: rgba(123, 184, 224, 0.12);
  }
  .new-build-btn:active {
    transform: scale(0.96);
  }

  /* ========== SCREEN CONTENT ========== */
  .screen-content {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: calc(var(--chrome-height) + 32px) 24px 32px;
    transition: padding 0.4s ease;
    position: relative;
  }
  .screen-content.no-header-pad {
    padding-top: 0;
  }
  .screen-content.chromeless {
    padding-top: 32px;
  }

  /* ========== PLACEHOLDER SCREEN CONTENT ========== */
  .screen-title {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
    text-align: center;
  }
  .screen-subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    text-align: center;
    max-width: 480px;
  }
  .screen-number {
    font-family: var(--font-data);
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Placeholder content boxes */
  .content-placeholder {
    width: 100%;
    max-width: 560px;
    background: var(--bg-mid);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-xl);
    padding: 32px;
    margin-bottom: 24px;
  }
  .content-placeholder .label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    font-family: var(--font-data);
  }
  .content-placeholder .mock-input {
    width: 100%;
    height: 48px;
    background: var(--bg-deep);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-md);
    margin-bottom: 12px;
  }
  .content-placeholder .mock-text {
    height: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .content-placeholder .mock-text:last-child { margin-bottom: 0; }
  .content-placeholder .mock-text.short { width: 60%; }
  .content-placeholder .mock-text.med { width: 80%; }

  /* CTA Button */
  .cta-btn {
    background: var(--accent-thrive);
    color: var(--text-inverse);
    border: none;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    padding: 14px 48px;
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(125, 212, 163, 0.25);
    margin-top: 16px;
  }
  .cta-btn:hover {
    box-shadow: 0 6px 28px rgba(125, 212, 163, 0.35);
    transform: translateY(-1px);
  }
  .cta-btn:active {
    transform: scale(0.97);
  }

  /* Pentagon glow for landing */
  .pentagon-glow {
    width: 200px;
    height: 200px;
    position: relative;
    margin-bottom: 48px;
  }
  .pentagon-glow .dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse 3s ease-in-out infinite;
  }
  .pentagon-glow .dot:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); background: var(--stat-ern); animation-delay: 0s; }
  .pentagon-glow .dot:nth-child(2) { top: 38%; right: 0; background: var(--stat-roi); animation-delay: 0.6s; }
  .pentagon-glow .dot:nth-child(3) { bottom: 5%; right: 12%; background: var(--stat-res); animation-delay: 1.2s; }
  .pentagon-glow .dot:nth-child(4) { bottom: 5%; left: 12%; background: var(--stat-grw); animation-delay: 1.8s; }
  .pentagon-glow .dot:nth-child(5) { top: 38%; left: 0; background: var(--stat-hmn); animation-delay: 2.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; box-shadow: 0 0 12px currentColor; }
    50% { opacity: 0.9; box-shadow: 0 0 24px currentColor; }
  }

  /* Profile name hero */
  .profile-hero {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .profile-hero .emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 16px;
  }
  .you-are {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  /* Boss gauntlet pips */
  .gauntlet-pips {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
  }
  .pip {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--bg-surface);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
  }
  .pip.win { background: var(--accent-thrive); border-color: transparent; box-shadow: 0 0 8px rgba(125,212,163,0.4); }
  .pip.lose { background: var(--accent-alert); border-color: transparent; box-shadow: 0 0 8px rgba(244,169,126,0.4); }
  .pip.draw { background: var(--accent-caution); border-color: transparent; box-shadow: 0 0 8px rgba(242,212,119,0.4); }
  .pip.current { background: var(--text-primary); border-color: transparent; transform: scale(1.3); box-shadow: 0 0 10px rgba(245,240,232,0.3); }
  .pip-divider {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.1);
    margin: 0 4px;
  }
  .pip.final { width: 14px; height: 14px; }

  /* Boss emoji */
  .boss-display {
    font-size: 72px;
    margin-bottom: 16px;
  }
  .boss-name {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .boss-desc {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  /* Branch tree placeholder */
  .tree-placeholder {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .tree-root {
    position: absolute;
    left: 60px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .tree-root-emoji { font-size: 40px; }
  .tree-root-label {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-thrive);
    white-space: nowrap;
  }
  .tree-root-glow {
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(125,212,163,0.12) 0%, transparent 70%);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .branch-line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, rgba(125,212,163,0.4), rgba(184,169,232,0.3));
    border-radius: 1px;
    transform-origin: left center;
  }
  .branch-node {
    position: absolute;
    background: var(--bg-mid);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-md);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .branch-node:hover {
    border-color: var(--accent-thrive);
    color: var(--text-primary);
    box-shadow: 0 0 16px rgba(125,212,163,0.15);
  }

  /* Menu grid */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 560px;
  }
  .menu-card {
    background: var(--bg-mid);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-xl);
    padding: 24px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .menu-card:hover {
    border-color: rgba(255,255,255,0.12);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  .menu-card .card-icon { font-size: 28px; margin-bottom: 12px; }
  .menu-card .card-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .menu-card .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* ========== SCREEN SELECTOR ========== */
  .screen-selector {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: rgba(35, 37, 69, 0.92);
    backdrop-filter: blur(12px);
    padding: 6px 8px;
    border-radius: var(--radius-full);
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 200;
    flex-wrap: wrap;
    justify-content: center;
    max-width: calc(100vw - 32px);
  }
  .screen-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-data);
    font-size: 11px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: var(--radius-full);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .screen-btn:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
  }
  .screen-btn.active {
    background: var(--accent-thrive);
    color: var(--text-inverse);
  }

  /* ========== CHROME ANNOTATION ========== */
  .chrome-annotations {
    position: fixed;
    top: var(--chrome-height);
    left: 0;
    right: 0;
    z-index: 99;
  }
  .annotation {
    position: fixed;
    background: rgba(184, 169, 232, 0.12);
    border: 1px solid rgba(184, 169, 232, 0.25);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    font-size: 11px;
    font-family: var(--font-data);
    color: var(--accent-insight);
    line-height: 1.4;
    max-width: 220px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 101;
  }
  .annotation.visible { opacity: 1; }
  .annotation.left-zone { top: 56px; left: 24px; }
  .annotation.center-zone { top: 56px; left: 50%; transform: translateX(-50%); }
  .annotation.right-zone { top: 56px; right: 24px; }

  .annotation-toggle {
    position: fixed;
    top: 8px;
    right: calc(50% - 200px);
    z-index: 201;
    background: rgba(184, 169, 232, 0.15);
    border: 1px solid rgba(184, 169, 232, 0.3);
    color: var(--accent-insight);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: var(--radius-full);
    cursor: pointer;
    transition: background 0.2s;
  }
  .annotation-toggle:hover {
    background: rgba(184, 169, 232, 0.25);
  }

  /* Responsive */
  @media (max-width: 640px) {
    .chrome-header { padding: 0 16px; }
    .header-left { width: 44px; }
    .header-right { width: 44px; }
    .profile-hero { font-size: 36px; }
    .screen-title { font-size: 28px; }
    .menu-grid { grid-template-columns: 1fr; }
    .content-placeholder { padding: 24px; }
    .new-build-btn span.label { display: none; }
    .screen-selector { gap: 2px; padding: 4px 6px; }
    .screen-btn { padding: 5px 7px; font-size: 10px; }
    .annotation { max-width: 160px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="chrome-header hidden" id="chromeHeader">
  <div class="header-left">
    <button class="back-btn" id="backBtn" title="Go back" style="display:none;">
      <span id="backIcon">&#8592;</span>
    </button>
  </div>
  <div class="header-center">
    <span id="headerCenter"></span>
  </div>
  <div class="header-right">
    <button class="new-build-btn" id="newBuildBtn">
      + <span class="label">New</span>
    </button>
  </div>
</div>

<!-- Annotations -->
<div class="annotation left-zone" id="annotLeft"></div>
<div class="annotation center-zone" id="annotCenter"></div>
<div class="annotation right-zone" id="annotRight"></div>
<button class="annotation-toggle" id="annotToggle" style="display:none;">Show Chrome Notes</button>

<div class="screen-content" id="screenContent"></div>

<div class="screen-selector" id="screenSelector"></div>

<script>

const SCREENS = [

  {

  {
    id: 8,
    label: '8 Branches',
    title: 'Branch Tree',
    bg: '#12131F',
    header: true,
    voidBlended: true,
    backBtn: true,
    backMode: 'arrow',
    centerContent: 'profile',
    newBuild: false,
    brightBorder: true,
    nameColor: 'secondary',
    noPadTop: true,
    annotations: {
      center: 'Header floats over the tree. No padding-top -- tree extends to full viewport edge.',
      left: 'Frosted glass blends with bg-void. Nearly invisible against the dark canvas.'
    }
  },
  {
    id: 9,
    label: '9 Save',

let currentScreen = 0;
let showAnnotations = false;

function setScreen(index) {
  currentScreen = index;
  const s = SCREENS[index];
  const header = document.getElementById('chromeHeader');
  const backBtn = document.getElementById('backBtn');
  const backIcon = document.getElementById('backIcon');
  const headerCenter = document.getElementById('headerCenter');
  const newBuildBtn = document.getElementById('newBuildBtn');
  const content = document.getElementById('screenContent');
  const annotToggle = document.getElementById('annotToggle');

  // Background
  document.body.style.background = s.bg;

  // Header visibility
  if (!s.header) {
    header.className = 'chrome-header hidden';
    annotToggle.style.display = 'none';
  } else {
    let classes = 'chrome-header visible';
    if (s.cinematic) classes += ' cinematic';
    if (s.brightBorder) classes += ' bright-border';
    header.className = classes;
    annotToggle.style.display = 'block';
  }

  // Back button
  if (s.backBtn) {
    backBtn.style.display = 'flex';
    if (s.backMode === 'home') {
      backIcon.innerHTML = '&#8962;';
      backBtn.className = 'back-btn home-mode';
      backBtn.title = 'Menu';
    } else {
      backIcon.innerHTML = '&#8592;';
      backBtn.className = 'back-btn';
      backBtn.title = 'Go back';
    }
  } else {
    backBtn.style.display = 'none';
  }

  // Center content
  if (s.centerContent === 'wordmark') {
    headerCenter.innerHTML = '<span class="wordmark">FutureProof</span>';
  } else if (s.centerContent === 'profile') {
    const colorClass = s.nameColor === 'secondary' ? 'secondary' : 'muted';
    headerCenter.innerHTML = `<span class="profile-name ${colorClass}">${PROFILE.name} ${PROFILE.emoji}</span>`;
  } else {
    headerCenter.innerHTML = '';
  }

  // New build button
  if (s.newBuild) {
    newBuildBtn.classList.add('visible');
  } else {
    newBuildBtn.classList.remove('visible');
  }

  // Render content
  content.innerHTML = renderScreenContent(s);
  content.className = 'screen-content' + (s.noPadTop ? ' no-header-pad' : '') + (!s.header ? ' chromeless' : '');

  // Annotations
  updateAnnotations(s);

  // Update selector
  document.querySelectorAll('.screen-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
}

function renderScreenContent(s) {
  switch(s.id) {
    case 1: return renderLanding();
    case 2: return renderProfile();
    case 3: return renderSchool();
    case 4: return renderEffort();
    case 5: return renderCareerPick();
    case 6: return renderReveal();
    case 7: return renderGauntlet();
    case 8: return renderBranchTree();
    case 9: return renderSaveShare();
    case 10: return renderMenu();
    default: return '';
  }
}

function updateAnnotations(s) {
  const left = document.getElementById('annotLeft');
  const center = document.getElementById('annotCenter');
  const right = document.getElementById('annotRight');

  left.textContent = s.annotations?.left || '';
  center.textContent = s.annotations?.center || '';
  right.textContent = s.annotations?.right || '';

  if (showAnnotations && s.header) {
    left.classList.toggle('visible', !!s.annotations?.left);
    center.classList.toggle('visible', !!s.annotations?.center);
    right.classList.toggle('visible', !!s.annotations?.right);
  } else {
    left.classList.remove('visible');
    center.classList.remove('visible');
    right.classList.remove('visible');
  }
}

// Build screen selector
const selectorEl = document.getElementById('screenSelector');
SCREENS.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'screen-btn';
  btn.textContent = s.label;
  btn.addEventListener('click', () => setScreen(i));
  selectorEl.appendChild(btn);
});

// Annotation toggle
document.getElementById('annotToggle').addEventListener('click', () => {
  showAnnotations = !showAnnotations;
  document.getElementById('annotToggle').textContent = showAnnotations ? 'Hide Chrome Notes' : 'Show Chrome Notes';
  updateAnnotations(SCREENS[currentScreen]);
});

// Back button navigates backward
document.getElementById('backBtn').addEventListener('click', () => {
  if (SCREENS[currentScreen].backMode === 'home') {
    setScreen(9); // Menu
  } else if (currentScreen > 0) {
    setScreen(currentScreen - 1);
  }
});
