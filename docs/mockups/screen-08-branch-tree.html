<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProof — Screen 8: Branch Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #12131F;
    --bg-deep: #1B1D30;
    --bg-mid: #232545;
    --bg-surface: #2D3060;
    --bg-raised: #3A3D75;
    --accent-thrive: #7DD4A3;
    --accent-alert: #F4A97E;
    --accent-caution: #F2D477;
    --accent-insight: #B8A9E8;
    --accent-info: #7BB8E0;
    --accent-empathy: #E88BA9;
    --stat-ern: #F2D477;
    --stat-roi: #7DD4A3;
    --stat-res: #B8A9E8;
    --stat-grw: #7BB8E0;
    --stat-hmn: #E88BA9;
    --text-primary: #F5F0E8;
    --text-secondary: #C4BFB0;
    --text-muted: #8A8595;
    --text-inverse: #1B1D30;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.1);
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --font-data: 'Space Mono', monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;
    --shadow-md: 0 4px 16px rgba(27,29,48,0.6);
    --shadow-lg: 0 8px 32px rgba(27,29,48,0.7);
  }

  body {
    background: var(--bg-void);
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.02;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  .profile-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(18,19,31,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-size: 14px;
    color: var(--text-muted);
  }

  .scenario-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-full);
    padding: 4px;
    z-index: 200;
    box-shadow: var(--shadow-lg);
  }
  .scenario-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: var(--radius-full);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 200ms ease-out;
  }
  .scenario-btn.active { background: var(--bg-raised); color: var(--text-primary); }

  /* === TREE CANVAS === */
  .tree-viewport {
    position: fixed;
    top: 44px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: auto;
  }

  .tree-canvas {
    position: relative;
    width: 1600px;
    min-height: calc(100vh - 44px);
    padding: 60px 40px 100px;
  }

  /* Radial glow from root */
  .root-glow {
    position: absolute;
    top: 50%;
    left: 120px;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(125,212,163,0.08) 0%,
      rgba(184,169,232,0.04) 30%,
      transparent 60%);
    pointer-events: none;
  }

  /* === NODES === */
  .tree-node {
    position: absolute;
    cursor: pointer;
    transition: all 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0;
    transform: scale(0.8);
  }
  .tree-node.visible {
    opacity: 1;
    transform: scale(1);
  }
  .tree-node:hover { transform: scale(1.05); z-index: 10; }

  .node-inner {
    background: var(--bg-mid);
    border: 1.5px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 14px 18px;
    min-width: 160px;
    max-width: 200px;
    box-shadow: var(--shadow-md);
    transition: all 200ms ease-out;
  }
  .tree-node:hover .node-inner {
    border-color: var(--accent-thrive);
    box-shadow: var(--shadow-md), 0 0 20px rgba(125,212,163,0.15);
  }
  .tree-node.active .node-inner {
    border-color: var(--accent-thrive);
    background: rgba(125,212,163,0.06);
    box-shadow: var(--shadow-md), 0 0 24px rgba(125,212,163,0.2);
  }

  .node-emoji { font-size: 24px; margin-bottom: 4px; }
  .node-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .node-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.3;
  }
  .node-salary {
    font-family: var(--font-data);
    font-size: 13px;
    font-weight: 700;
    color: var(--stat-ern);
    margin-top: 6px;
  }

  /* Root node special treatment */
  .root-node .node-inner {
    background: var(--bg-surface);
    border-color: var(--accent-thrive);
    box-shadow: var(--shadow-lg), 0 0 30px rgba(125,212,163,0.15);
    min-width: 200px;
    padding: 18px 22px;
  }
  .root-node .node-title {
    font-size: 16px;
    color: var(--accent-thrive);
  }
  .root-node .node-emoji { font-size: 32px; }

  /* Branch labels */
  .branch-label {
    position: absolute;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--bg-void);
    padding: 3px 10px;
    border-radius: var(--radius-full);
    border: 1px solid var(--border-subtle);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 400ms ease-out;
    pointer-events: none;
  }
  .branch-label.visible { opacity: 1; }

  /* === DETAIL PANEL === */
  .detail-panel {
    position: fixed;
    top: 44px;
    right: 0;
    bottom: 0;
    width: 360px;
    background: var(--bg-deep);
    border-left: 1px solid var(--border-subtle);
    box-shadow: -4px 0 32px rgba(18,19,31,0.5);
    padding: 28px 24px;
    overflow-y: auto;
    z-index: 50;
    transform: translateX(100%);
    transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .detail-panel.visible { transform: translateX(0); }
  .detail-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-surface);
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms;
  }
  .detail-close:hover { background: var(--bg-raised); color: var(--text-primary); }
  .detail-emoji { font-size: 48px; margin-bottom: 8px; }
  .detail-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .detail-path {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .detail-salary {
    font-family: var(--font-data);
    font-size: 20px;
    font-weight: 700;
    color: var(--stat-ern);
    margin-bottom: 4px;
  }
  .detail-salary-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* Mini pentagon in detail + toggle */
  .detail-chart-wrap {
    position: relative;
    margin: 0 auto 20px;
    width: 180px;
  }
  .detail-pentagon {
    width: 180px;
    height: 180px;
  }
  .detail-chart-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
  }
  .detail-chart-toggle {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px;
    border-radius: var(--radius-sm);
    transition: all 200ms ease-out;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .detail-chart-toggle svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 200ms ease-out;
  }
  .detail-chart-toggle:hover svg { stroke: var(--text-primary); }
  .detail-chart-toggle:hover { background: rgba(255,255,255,0.05); }

  .detail-chart-view {
    transition: opacity 200ms ease-out;
  }
  .detail-chart-view.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
    top: 0; left: 0; right: 0;
  }
  .detail-bar-chart { padding: 8px 0; }
  .detail-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .detail-bar-label {
    font-family: var(--font-data);
    font-size: 9px;
    letter-spacing: 0.08em;
    width: 30px;
    text-align: right;
    flex-shrink: 0;
  }
  .detail-bar-track {
    flex: 1;
    height: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: var(--radius-full);
    overflow: hidden;
  }
  .detail-bar-fill {
    height: 100%;
    border-radius: var(--radius-full);
    transform-origin: left center;
    transform: scaleX(0);
    transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .detail-bar-fill.animate { transform: scaleX(1); }
  .detail-bar-score {
    font-family: var(--font-data);
    font-size: 12px;
    font-weight: 700;
    width: 20px;
    text-align: left;
    flex-shrink: 0;
  }

  .detail-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .detail-stat-chip {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    text-align: center;
  }
  .detail-stat-label {
    font-family: var(--font-body);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    margin-bottom: 2px;
    line-height: 1.2;
  }
  .detail-stat-value {
    font-family: var(--font-data);
    font-size: 18px;
    font-weight: 700;
  }

  .detail-boss-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
  }
  .detail-boss-result {
    font-family: var(--font-data);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: var(--radius-full);
  }
  .detail-boss-result.win { color: var(--accent-thrive); background: rgba(125,212,163,0.12); }
  .detail-boss-result.lose { color: var(--accent-alert); background: rgba(244,169,126,0.12); }
  .detail-boss-result.draw { color: var(--accent-caution); background: rgba(242,212,119,0.12); }

  .detail-section-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin: 20px 0 10px;
    padding-top: 16px;
    border-top: 1px solid var(--border-subtle);
  }

  .detail-receipt {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.6;
    cursor: pointer;
    margin-top: 12px;
    transition: opacity 200ms;
  }
  .detail-receipt:hover { opacity: 1; }

  /* === SVG BRANCHES === */
  .branch-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .branch-line {
    fill: none;
    stroke-width: 2;
    opacity: 0;
    transition: opacity 400ms ease-out, stroke-width 200ms;
  }
  .branch-line.visible { opacity: 1; }
  .branch-line.highlight { stroke-width: 3; filter: drop-shadow(0 0 6px rgba(125,212,163,0.3)); }
  .branch-line.dim { opacity: 0.2; }

  /* Particles along branches */
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
  }

  /* === EMPTY / LOADING / ERROR === */
  .state-overlay {
    position: fixed;
    top: 44px;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 40px;
    z-index: 30;
  }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-mid) 25%, var(--bg-surface) 50%, var(--bg-mid) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: var(--radius-md);
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* === MOBILE FALLBACK === */
  .mobile-list {
    display: none;
    max-width: 560px;
    margin: 68px auto 120px;
    padding: 0 16px;
  }
  .mobile-branch-card {
    background: var(--bg-mid);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 200ms ease-out;
  }
  .mobile-branch-card:hover { border-color: var(--accent-info); }
  .mobile-branch-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .mobile-branch-careers {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* CTA at bottom of tree */
  .tree-cta {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
  }
  .tree-cta button {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 700;
    color: var(--text-inverse);
    background: var(--accent-thrive);
    border: none;
    border-radius: var(--radius-lg);
    padding: 14px 28px;
    cursor: pointer;
    box-shadow: var(--shadow-lg), 0 0 24px rgba(125,212,163,0.2);
    transition: all 200ms ease-out;
  }
  .tree-cta button:hover { transform: scale(1.03); }

  @media (max-width: 800px) {
    .tree-viewport { display: none; }
    .mobile-list { display: block; }
    .detail-panel { width: 100%; }
  }
</style>
</head>
<body>

<div class="profile-header">
  <span>dancing happy bear</span>
  <span>&#x1F43B;</span>
</div>

<!-- Desktop tree viewport -->
<div class="tree-viewport" id="treeViewport">
  <div class="tree-canvas" id="treeCanvas">
    <div class="root-glow"></div>
    <svg class="branch-svg" id="branchSVG" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<!-- Mobile fallback -->
<div class="mobile-list" id="mobileList"></div>

<!-- Detail panel -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div id="detailContent"></div>
</div>

<!-- State overlays -->
<div class="state-overlay" id="stateOverlay" style="display:none;"></div>

<div class="tree-cta" id="treeCTA">
  <button onclick="alert('Navigate to Save + Share (Screen 9)')">Save & Share Your Build</button>
</div>

<div class="scenario-bar">
  <button class="scenario-btn active" onclick="switchScenario('populated')">Populated</button>
  <button class="scenario-btn" onclick="switchScenario('loading')">Loading</button>
  <button class="scenario-btn" onclick="switchScenario('empty')">Empty</button>
  <button class="scenario-btn" onclick="switchScenario('fallback')">No Branches</button>
</div>

<script>
// === TREE DATA ===
const TREE = {
  root: {
    id: 'root',
    title: 'Financial Analyst',
    emoji: '\u{1F4CA}',
    subtitle: 'Your starting career',
    salary: '$68,400',
    x: 80, y: 280
  },
  branches: [
    {
      direction: 'Stay Technical',
      label: { x: 320, y: 120 },
      nodes: [
        { id: 'quant', title: 'Quantitative Analyst', emoji: '\u{1F9EE}', salary: '$112,000', x: 420, y: 80,
          stats: { ERN: 9, ROI: 8, RES: 4, GRW: 7, HMN: 3 },
          bosses: [{ name: 'Fight AI', result: 'lose' }, { name: 'Fight Loans', result: 'win' }, { name: 'Fight Market', result: 'win' }],
          path: 'Financial Analyst \u2192 Sr. Analyst \u2192 Quantitative Analyst',
          detail: 'Deep quantitative modeling with heavy Python/R usage. High earning ceiling but significant AI exposure \u2014 the models you build could eventually build themselves.'
        },
        { id: 'data-sci', title: 'Data Scientist', emoji: '\u{1F52C}', salary: '$103,500', x: 420, y: 180,
          stats: { ERN: 8, ROI: 7, RES: 5, GRW: 9, HMN: 4 },
          bosses: [{ name: 'Fight AI', result: 'draw' }, { name: 'Fight Loans', result: 'win' }, { name: 'Fight Market', result: 'win' }],
          path: 'Financial Analyst \u2192 Analytics Lead \u2192 Data Scientist',
          detail: 'Pivot from finance-specific analysis to broader data science. Strong growth trajectory and decent AI resilience if you focus on the business context AI struggles with.'
        }
      ]
    },
    {
      direction: 'Go Management',
      label: { x: 320, y: 310 },
      nodes: [
        { id: 'fp-mgr', title: 'FP&A Manager', emoji: '\u{1F4CB}', salary: '$95,000', x: 420, y: 280,
          stats: { ERN: 8, ROI: 7, RES: 6, GRW: 6, HMN: 7 },
          bosses: [{ name: 'Fight AI', result: 'draw' }, { name: 'Fight Loans', result: 'win' }, { name: 'Fight Burnout', result: 'draw' }],
          path: 'Financial Analyst \u2192 Senior Analyst \u2192 FP&A Manager',
          detail: 'Lead a team of analysts. More human interaction, better AI resilience, but watch for burnout during quarterly reporting cycles.'
        },
        { id: 'cfo', title: 'Chief Financial Officer', emoji: '\u{1F451}', salary: '$185,000', x: 720, y: 260,
          stats: { ERN: 10, ROI: 9, RES: 8, GRW: 5, HMN: 9 },
          bosses: [{ name: 'Fight AI', result: 'win' }, { name: 'Fight Loans', result: 'win' }, { name: 'Fight Ceiling', result: 'win' }],
          path: 'Financial Analyst \u2192 FP&A Manager \u2192 VP Finance \u2192 CFO',
          detail: 'The summit. Strategy, board relationships, and judgment calls AI cannot replicate. Long road (15-20 years), but the ceiling is virtually unlimited.'
        },
        { id: 'controller', title: 'Financial Controller', emoji: '\u{1F4D1}', salary: '$125,000', x: 720, y: 350,
          stats: { ERN: 9, ROI: 8, RES: 7, GRW: 5, HMN: 7 },
          bosses: [{ name: 'Fight AI', result: 'win' }, { name: 'Fight Loans', result: 'win' }, { name: 'Fight Burnout', result: 'lose' }],
          path: 'Financial Analyst \u2192 FP&A Manager \u2192 Financial Controller',
          detail: 'Oversee all accounting and financial reporting. High AI resilience because the role is as much about compliance judgment as computation.'
        }
      ]
    },
    {
      direction: 'Pivot Lateral',
      label: { x: 320, y: 470 },
      nodes: [
        { id: 'consultant', title: 'Management Consultant', emoji: '\u{1F4A1}', salary: '$92,000', x: 420, y: 430,
          stats: { ERN: 7, ROI: 6, RES: 7, GRW: 7, HMN: 8 },
          bosses: [{ name: 'Fight AI', result: 'win' }, { name: 'Fight Burnout', result: 'lose' }, { name: 'Fight Market', result: 'win' }],
          path: 'Financial Analyst \u2192 Strategy Analyst \u2192 Management Consultant',
          detail: 'Apply your analytical skills across industries. High human edge because the job is fundamentally about relationships and persuasion. Watch for burnout.'
        },
        { id: 'pm', title: 'Product Manager', emoji: '\u{1F680}', salary: '$110,000', x: 420, y: 530,
          stats: { ERN: 8, ROI: 7, RES: 7, GRW: 9, HMN: 8 },
          bosses: [{ name: 'Fight AI', result: 'win' }, { name: 'Fight Market', result: 'win' }, { name: 'Fight Burnout', result: 'draw' }],
          path: 'Financial Analyst \u2192 Business Analyst \u2192 Product Manager',
          detail: 'Translate between business and engineering. One of the strongest growth trajectories and excellent AI resilience \u2014 product decisions require human judgment at every step.'
        },
        { id: 'strategy', title: 'Strategy Director', emoji: '\u{1F3AF}', salary: '$140,000', x: 720, y: 470,
          stats: { ERN: 9, ROI: 8, RES: 8, GRW: 6, HMN: 9 },
          bosses: [{ name: 'Fight AI', result: 'win' }, { name: 'Fight Loans', result: 'win' }, { name: 'Fight Ceiling', result: 'win' }],
          path: 'Financial Analyst \u2192 Consultant \u2192 Sr. Consultant \u2192 Strategy Director',
          detail: 'Set organizational direction. Very high human edge and AI resilience \u2014 this is the kind of role where uniquely human judgment is the product.'
        }
      ]
    }
  ]
};

// All nodes flat
function getAllNodes() {
  const nodes = [];
  TREE.branches.forEach(b => b.nodes.forEach(n => nodes.push(n)));
  return nodes;
}

const STAT_FULL_NAMES = {
  ERN: 'Earning Power', ROI: 'Return on Investment', RES: 'AI Resilience', GRW: 'Growth', HMN: 'Human Edge'
};

// === RENDERING ===
let selectedNode = null;

function switchScenario(scenario) {
  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().replace(' ', '') === scenario);
  });
  closeDetail();
  const overlay = document.getElementById('stateOverlay');
  const viewport = document.getElementById('treeViewport');
  const cta = document.getElementById('treeCTA');

  switch(scenario) {
    case 'populated':
      overlay.style.display = 'none';
      viewport.style.display = 'block';
      cta.style.display = 'block';
      renderTree();
      renderMobileList();
      break;
    case 'loading':
      viewport.style.display = 'none';
      cta.style.display = 'none';
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div style="font-size:64px;animation:pulse-text 1.5s ease-in-out infinite;">\u{1F333}</div>
        <div style="font-size:18px;font-weight:600;color:var(--text-secondary);animation:pulse-text 1.5s ease-in-out infinite;">
          Mapping your branches...
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          ${[0,1,2].map(i => `<div style="width:8px;height:8px;border-radius:50%;background:var(--accent-thrive);animation:dot-bounce 1.2s ease-in-out ${i*0.2}s infinite;"></div>`).join('')}
        </div>
      `;
      break;
    case 'empty':
      viewport.style.display = 'none';
      cta.style.display = 'none';
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div style="font-size:64px;opacity:0.5;">\u{1F52D}</div>
        <div style="font-family:var(--font-display);font-size:24px;font-weight:600;">No career build yet</div>
        <div style="font-size:16px;color:var(--text-secondary);max-width:360px;">
          Complete your stat reveal and boss gauntlet first. Then come explore where your career leads.
        </div>
      `;
      break;
    case 'fallback':
      viewport.style.display = 'none';
      cta.style.display = 'block';
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div style="font-size:64px;">\u{1F4CA}</div>
        <div style="font-family:var(--font-display);font-size:22px;font-weight:600;">Financial Analyst</div>
        <div style="font-size:15px;color:var(--text-secondary);max-width:400px;text-align:center;line-height:1.6;">
          We're mapping the career branches for Financial Analyst. The full branch tree will be available soon.
          In the meantime, your stats, boss fights, and Gemma's recommendations are all ready.
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:8px;">
          This career has no O*NET pathway data yet.
        </div>
      `;
      break;
  }
}

function renderTree() {
  const canvas = document.getElementById('treeCanvas');
  const svg = document.getElementById('branchSVG');

  // Clear existing nodes (keep svg and glow)
  canvas.querySelectorAll('.tree-node, .branch-label').forEach(el => el.remove());

  // Set SVG dimensions
  svg.setAttribute('width', '1600');
  svg.setAttribute('height', '650');
  svg.setAttribute('viewBox', '0 0 1600 650');
  svg.innerHTML = '';

  const root = TREE.root;

  // Render root node
  const rootEl = createNode(root, true);
  canvas.appendChild(rootEl);

  // Render branches with staggered animation
  let delay = 0;
  TREE.branches.forEach((branch, bi) => {
    // Branch label
    const label = document.createElement('div');
    label.className = 'branch-label';
    label.style.left = branch.label.x + 'px';
    label.style.top = branch.label.y + 'px';
    label.textContent = branch.direction;
    canvas.appendChild(label);

    delay += 200;
    setTimeout(() => label.classList.add('visible'), delay);

    branch.nodes.forEach((node, ni) => {
      // Draw bezier from parent to node
      const fromX = ni === 0 ? root.x + 200 : branch.nodes[0].x + 200;
      const fromY = ni === 0 ? root.y + 40 : branch.nodes[0].y + 30;
      const toX = node.x;
      const toY = node.y + 30;

      const midX = (fromX + toX) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M ${fromX} ${fromY} C ${midX} ${fromY}, ${midX} ${toY}, ${toX} ${toY}`;
      path.setAttribute('d', d);
      path.setAttribute('stroke', node.stats ? getNodeColor(node) : 'rgba(255,255,255,0.1)');
      path.classList.add('branch-line');
      path.dataset.nodeId = node.id;

      // Animate stroke drawing
      const length = path.getTotalLength ? 400 : 400;
      path.style.strokeDasharray = length;
      path.style.strokeDashoffset = length;

      svg.appendChild(path);

      delay += 100;
      const nodeDelay = delay;
      setTimeout(() => {
        path.classList.add('visible');
        path.style.transition = `stroke-dashoffset 600ms ease-out, opacity 400ms ease-out, stroke-width 200ms`;
        path.style.strokeDashoffset = '0';
      }, nodeDelay);

      // Node element
      const el = createNode(node);
      canvas.appendChild(el);
      setTimeout(() => el.classList.add('visible'), nodeDelay + 200);
    });
  });

  // Root appears first
  setTimeout(() => rootEl.classList.add('visible'), 100);
}

function createNode(node, isRoot = false) {
  const el = document.createElement('div');
  el.className = `tree-node ${isRoot ? 'root-node' : ''}`;
  el.style.left = node.x + 'px';
  el.style.top = node.y + 'px';
  el.dataset.nodeId = node.id;

  el.innerHTML = `
    <div class="node-inner">
      <div class="node-emoji">${node.emoji}</div>
      <div class="node-title">${node.title}</div>
      ${node.subtitle ? `<div class="node-subtitle">${node.subtitle}</div>` : ''}
      <div class="node-salary">${node.salary}</div>
    </div>
  `;

  if (!isRoot) {
    el.addEventListener('click', () => selectNode(node));
    el.addEventListener('mouseenter', () => highlightBranch(node.id, true));
    el.addEventListener('mouseleave', () => highlightBranch(node.id, false));
  }
  return el;
}

function getNodeColor(node) {
  // Return dominant stat color
  const stats = node.stats;
  if (!stats) return 'rgba(255,255,255,0.1)';
  const max = Object.entries(stats).reduce((a, b) => a[1] > b[1] ? a : b);
  const colors = { ERN: '#F2D477', ROI: '#7DD4A3', RES: '#B8A9E8', GRW: '#7BB8E0', HMN: '#E88BA9' };
  return colors[max[0]] || '#7DD4A3';
}

function highlightBranch(nodeId, on) {
  document.querySelectorAll('.branch-line').forEach(line => {
    if (on) {
      line.classList.toggle('highlight', line.dataset.nodeId === nodeId);
      line.classList.toggle('dim', line.dataset.nodeId !== nodeId);
    } else {
      line.classList.remove('highlight', 'dim');
    }
  });
}

function selectNode(node) {
  selectedNode = node;
  // Mark active
  document.querySelectorAll('.tree-node').forEach(el => {
    el.classList.toggle('active', el.dataset.nodeId === node.id);
  });
  showDetail(node);
}

function showDetail(node) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const statColors = { ERN: '#F2D477', ROI: '#7DD4A3', RES: '#B8A9E8', GRW: '#7BB8E0', HMN: '#E88BA9' };

  content.innerHTML = `
    <div class="detail-emoji">${node.emoji}</div>
    <div class="detail-title">${node.title}</div>
    <div class="detail-path">${node.path}</div>
    <div class="detail-salary">${node.salary}</div>
    <div class="detail-salary-label">Median annual salary</div>

    <div class="detail-chart-wrap">
      <div class="detail-chart-toolbar">
        <button class="detail-chart-toggle" onclick="toggleChart08()" title="Switch view" id="chartToggle08">
          <svg viewBox="0 0 20 20" id="chartToggleIcon08">
            <rect x="2" y="12" width="3" height="6" rx="1"/>
            <rect x="7" y="6" width="3" height="12" rx="1"/>
            <rect x="12" y="9" width="3" height="9" rx="1"/>
            <rect x="15" y="3" width="3" height="15" rx="1"/>
          </svg>
        </button>
      </div>
      <div class="detail-chart-view" id="pentView08">
        <div class="detail-pentagon">
          <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
            ${drawMiniPentagon(node.stats, 90, 90, 70)}
          </svg>
        </div>
      </div>
      <div class="detail-chart-view hidden" id="barView08">
        ${drawDetailBarChart(node.stats)}
      </div>
    </div>

    <div class="detail-stats">
      ${Object.entries(node.stats).map(([k, v]) => `
        <div class="detail-stat-chip">
          <div class="detail-stat-label" style="color:${statColors[k]}">${STAT_FULL_NAMES[k] || k}</div>
          <div class="detail-stat-value" style="color:${statColors[k]}">${v}</div>
        </div>
      `).join('')}
    </div>

    <div style="font-size:14px;line-height:1.6;color:var(--text-secondary);margin-bottom:16px;">
      ${node.detail}
    </div>

    ${node.bosses ? `
      <div class="detail-section-title">Boss Fights at This Branch</div>
      ${node.bosses.map(b => `
        <div class="detail-boss-row">
          <span>${b.name}</span>
          <span class="detail-boss-result ${b.result}">${b.result.toUpperCase()}</span>
        </div>
      `).join('')}
    ` : ''}

    <div class="detail-receipt" onclick="alert('Receipt: Full provenance for ${node.title}')">? Data provenance</div>
  `;

  panel.classList.add('visible');
}

function drawMiniPentagon(stats, cx, cy, r) {
  const order = ['ERN', 'ROI', 'RES', 'GRW', 'HMN'];
  const colors = { ERN: '#F2D477', ROI: '#7DD4A3', RES: '#B8A9E8', GRW: '#7BB8E0', HMN: '#E88BA9' };

  // Grid rings
  let svg = '';
  for (let ring = 1; ring <= 3; ring++) {
    const rr = r * ring / 3;
    const pts = order.map((_, i) => {
      const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
      return `${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`;
    });
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>`;
  }

  // Data polygon
  const dataPts = order.map((s, i) => {
    const dr = r * (stats[s] / 10);
    const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
    return `${cx + dr * Math.cos(angle)},${cy + dr * Math.sin(angle)}`;
  });
  svg += `<polygon points="${dataPts.join(' ')}" fill="rgba(125,212,163,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;

  // Vertex dots
  order.forEach((s, i) => {
    const dr = r * (stats[s] / 10);
    const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
    const x = cx + dr * Math.cos(angle);
    const y = cy + dr * Math.sin(angle);
    svg += `<circle cx="${x}" cy="${y}" r="3" fill="${colors[s]}"/>`;
  });

  return svg;
}

// === CHART TOGGLE (Screen 08) ===
let chartMode08 = 'pentagon';

function drawDetailBarChart(stats) {
  const order = ['ERN', 'ROI', 'RES', 'GRW', 'HMN'];
  const colors = { ERN: '#F2D477', ROI: '#7DD4A3', RES: '#B8A9E8', GRW: '#7BB8E0', HMN: '#E88BA9' };
  return `<div class="detail-bar-chart">${order.map((s, i) => {
    const val = stats[s];
    return `<div class="detail-bar-row">
      <div class="detail-bar-label" style="color:${colors[s]}">${s}</div>
      <div class="detail-bar-track">
        <div class="detail-bar-fill" data-bar-index="${i}" style="width:${val * 10}%;background:${colors[s]};opacity:0.85;"></div>
      </div>
      <div class="detail-bar-score" style="color:${colors[s]}">${val}</div>
    </div>`;
  }).join('')}</div>`;
}

function toggleChart08() {
  const pentView = document.getElementById('pentView08');
  const barView = document.getElementById('barView08');
  const iconEl = document.getElementById('chartToggleIcon08');
  if (!pentView || !barView) return;

  if (chartMode08 === 'pentagon') {
    chartMode08 = 'bar';
    pentView.classList.add('hidden');
    barView.classList.remove('hidden');
    iconEl.outerHTML = `<svg viewBox="0 0 20 20" id="chartToggleIcon08"><polygon points="10,1 18.5,7.2 15.2,17 4.8,17 1.5,7.2" fill="none" stroke="inherit" stroke-width="1.5"/></svg>`;
    setTimeout(() => {
      barView.querySelectorAll('.detail-bar-fill').forEach((bar, i) => {
        setTimeout(() => bar.classList.add('animate'), i * 60);
      });
    }, 50);
  } else {
    chartMode08 = 'pentagon';
    barView.classList.add('hidden');
    pentView.classList.remove('hidden');
    iconEl.outerHTML = `<svg viewBox="0 0 20 20" id="chartToggleIcon08"><rect x="2" y="12" width="3" height="6" rx="1"/><rect x="7" y="6" width="3" height="12" rx="1"/><rect x="12" y="9" width="3" height="9" rx="1"/><rect x="15" y="3" width="3" height="15" rx="1"/></svg>`;
    barView.querySelectorAll('.detail-bar-fill').forEach(bar => bar.classList.remove('animate'));
  }
}

function closeDetail() {
  chartMode08 = 'pentagon'; // Reset toggle when panel closes
  document.getElementById('detailPanel').classList.remove('visible');
  document.querySelectorAll('.tree-node').forEach(el => el.classList.remove('active'));
  selectedNode = null;
}

function renderMobileList() {
  const list = document.getElementById('mobileList');
  list.innerHTML = `
    <div style="font-family:var(--font-display);font-size:24px;font-weight:700;margin-bottom:8px;text-align:center;">
      \u{1F4CA} Financial Analyst
    </div>
    <div style="font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:24px;">
      Where this career leads
    </div>
    ${TREE.branches.map(branch => `
      <div style="margin-bottom:20px;">
        <div style="font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--accent-info);margin-bottom:8px;">${branch.direction}</div>
        ${branch.nodes.map(node => `
          <div class="mobile-branch-card" onclick='selectNode(${JSON.stringify(node).replace(/'/g, "\\'")})'>

              <span style="font-family:var(--font-data);color:var(--stat-ern);">${node.salary}</span>
              <span style="color:var(--text-muted);margin:0 8px;">\u2022</span>
              <span>${node.path}</span>
            </div>
          </div>
        `).join('')}
      </div>
    `).join('')}
  `;
}

const style = document.createElement('style');
style.textContent = `

  @keyframes dot-bounce { 0%,100% { transform:translateY(0);opacity:0.4; } 50% { transform:translateY(-6px);opacity:1; } }

</script>
