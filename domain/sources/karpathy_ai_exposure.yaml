# Karpathy AI Exposure Scores
# Andrej Karpathy's karpathy/jobs GitHub repository
#
# AI exposure scores (0-10) for 342 BLS occupations, generated by Gemini Flash
# evaluating BLS occupation descriptions against a structured rubric.
# SOC-keyed dataset that joins directly to existing BLS OOH data.

name: karpathy_ai_exposure
namespace: bronze
table: karpathy_ai_exposure

# Fetch config
fetch:
  github_download:
    scores_url: https://raw.githubusercontent.com/karpathy/jobs/master/scores.json
    occupations_url: https://raw.githubusercontent.com/karpathy/jobs/master/occupations.csv
    fallback_path: data/raw/karpathy_cache
    user_agent: "FutureProof/0.1 (jeff@hyenastudios.com)"
    format: json+csv
    size_estimate: "~500KB total"

# Single logical entity representing the full AI exposure dataset
entities:
  karpathy: "Karpathy AI Exposure Scores — All Scored Occupations"

# Dedup grain — one row per occupation slug
dedup_grain:
  - slug

# Cache directory for downloaded files
cache_dir: data/raw/karpathy_cache

# --- Domain Documentation (not consumed by loader) ---

# Source metadata
# authority: Andrej Karpathy (personal project)
# url: https://github.com/karpathy/jobs
# license: Public repository; LLM-generated scores (not copyrighted)
# methodology: Gemini Flash via OpenRouter scoring BLS occupation descriptions

# Grain description: One row per occupation (slug identifier)

# Key fields:
#   Identity: slug (kebab-case), occupation_title, soc_code (XX-XXXX, nullable)
#   Scores: exposure_score (0-10 integer)
#   Metadata: rationale (LLM-generated explanation), category (BLS category grouping)
#   Cross-validation: median_pay_annual, num_jobs_2024, entry_education

# Data quality notes:
#   - Scores are LLM estimates, not empirical measurements
#   - Self-referential bias: LLM scoring jobs for LLM replaceability
#   - Some occupations have empty SOC codes — preserve with null
#   - ~342 occupations expected
#   - Karpathy: "a saturday morning 2 hour vibe coded project"
