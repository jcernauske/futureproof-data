<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FutureProof · Identity</title>
<style>{{ base_css | safe }}

.frame {
  justify-content: space-between;
}

.top-band {
  display: flex;
  justify-content: center;
  width: 100%;
  padding-top: 16px;
}

.center-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  width: 100%;
  gap: 48px;
  position: relative;
}

.emoji-aurora {
  position: relative;
  width: 360px;
  height: 360px;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at 50% 50%, rgba(123, 184, 224, 0.18) 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(184, 169, 232, 0.22) 0%, transparent 58%),
    radial-gradient(circle at 50% 50%, rgba(125, 212, 163, 0.28) 0%, transparent 70%);
}

.emoji {
  font-size: 180px;
  line-height: 1;
  filter: drop-shadow(0 10px 40px rgba(125, 212, 163, 0.35));
}

.profile-name {
  font-family: "Fredoka", sans-serif;
  font-weight: 700;
  font-size: 120px;
  line-height: 1.02;
  letter-spacing: -2px;
  text-align: center;
  max-width: 920px;
  background-image: linear-gradient(
    135deg,
    #F5F0E8 0%,
    #F5F0E8 45%,
    #7DD4A3 72%,
    #B8A9E8 100%
  );
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
}

.divider {
  width: 90px;
  height: 2px;
  background: var(--border-strong);
  border-radius: 2px;
}

.school-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.school-action {
  font-family: "Nunito", sans-serif;
  font-weight: 600;
  font-size: 34px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.school-name {
  font-family: "Fredoka", sans-serif;
  font-weight: 600;
  font-size: 56px;
  color: var(--text-primary);
  text-align: center;
  max-width: 920px;
  line-height: 1.1;
}

.bottom-band {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding-bottom: 24px;
}

.caption {
  font-family: "Nunito", sans-serif;
  font-size: 26px;
  color: var(--text-muted);
}
</style>
</head>
<body>
  <div class="frame">
    <div class="top-band">
      <div class="wordmark">FUTUREPROOF</div>
    </div>

    <div class="center-stack">
      <div class="emoji-aurora">
        <div class="emoji">{{ profile_emoji }}</div>
      </div>

      <div class="profile-name">{{ profile_name_display }}</div>

      <div class="divider"></div>

      <div class="school-block">
        <div class="school-action">just speced</div>
        <div class="school-name">{{ school_name }} {{ major_text }}</div>
      </div>
    </div>

    <div class="bottom-band">
      <div class="caption">futureproof.app</div>
    </div>
  </div>
</body>
</html>
