<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FutureProof · Your Turn</title>
<style>{{ base_css | safe }}

.frame {
  justify-content: space-between;
  background:
    radial-gradient(ellipse 900px 600px at 50% 15%, rgba(125, 212, 163, 0.12), transparent 65%),
    radial-gradient(ellipse 900px 500px at 50% 95%, rgba(184, 169, 232, 0.08), transparent 65%),
    var(--bg-deep);
}

.top-band {
  display: flex;
  justify-content: center;
  width: 100%;
}

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 48px;
  width: 100%;
}

.cta-headline {
  font-family: "Fredoka", sans-serif;
  font-weight: 700;
  font-size: 96px;
  line-height: 1.05;
  text-align: center;
  max-width: 920px;
  letter-spacing: -2px;
  background-image: linear-gradient(135deg, #F5F0E8 0%, #F5F0E8 50%, #7DD4A3 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
}

.cta-subline {
  font-family: "Nunito", sans-serif;
  font-weight: 400;
  font-size: 32px;
  color: var(--text-secondary);
  text-align: center;
  max-width: 820px;
  line-height: 1.35;
}

/* The fake button — six craftsmanship moves per design vision:
   1) linear gradient for "curved metal" depth
   2) rim highlight strip on top edge for "catching light"
   3) drop-shadow ellipse as layered background (NOT box-shadow)
   4) outer thrive corona
   5) trailing arrow
   6) dark text on bright fill (highest contrast = most tappable)
*/
.button-host {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin-top: 16px;
}

.button-corona {
  position: absolute;
  width: 820px;
  height: 200px;
  background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(125, 212, 163, 0.28) 0%, transparent 60%);
  pointer-events: none;
}

.cta-button {
  position: relative;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 30px 64px;
  border-radius: 9999px;
  background-image:
    linear-gradient(180deg, rgba(255, 255, 255, 0.35) 0%, transparent 4px, transparent 100%),
    linear-gradient(135deg, var(--accent-thrive) 0%, #6bc494 50%, var(--accent-thrive) 100%);
  color: var(--text-inverse);
  font-family: "Fredoka", sans-serif;
  font-weight: 700;
  font-size: 48px;
}

.cta-button-shadow {
  position: absolute;
  bottom: -40px;
  width: 600px;
  height: 50px;
  background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(12, 13, 20, 0.55) 0%, transparent 60%);
}

.cta-arrow {
  font-size: 52px;
  line-height: 1;
  margin-left: 4px;
}

.friction-killer {
  font-family: "Space Mono", monospace;
  font-weight: 400;
  font-size: 22px;
  color: var(--text-muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 32px;
}

.bottom-band {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding-bottom: 16px;
}

.made-by {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: "Nunito", sans-serif;
  font-size: 24px;
  color: var(--text-muted);
}

.made-by-emoji {
  font-size: 36px;
  line-height: 1;
}
</style>
</head>
<body>
  <div class="frame">
    <div class="top-band">
      <div class="wordmark">FUTUREPROOF</div>
    </div>

    <div class="center">
      <div class="cta-headline">See where<br>your path leads</div>
      <div class="cta-subline">Build your own character.<br>It takes two minutes.</div>

      <div class="button-host">
        <div class="button-corona"></div>
        <div class="cta-button">
          <span>futureproof.app</span>
          <span class="cta-arrow">→</span>
        </div>
        <div class="cta-button-shadow"></div>
      </div>

      <div class="friction-killer">Free · No signup · 2 min</div>
    </div>

    <div class="bottom-band">
      <div class="made-by">
        <span>Made by</span>
        <span class="made-by-emoji">{{ profile_emoji }}</span>
        <span>{{ profile_name_display }}</span>
      </div>
    </div>
  </div>
</body>
</html>
