target-version = "py311"
line-length = 88

[lint]
select = ["E", "F", "I"]

[lint.per-file-ignores]
# `_RECEIPT_JSON_TEMPLATE` in this file is a filled-in JSON example
# with embedded multi-sentence prose strings used as a few-shot
# prompt template. Wrapping the JSON values would corrupt the JSON
# AND hurt prompt quality — Gemma 4 reads the unbroken example as
# a structural template (per @genai-architect Phase-1 finding 2 in
# docs/specs/feature-explain-stat-receipt.md). E501 suppressed for
# this file only.
"app/services/ask_gemma.py" = ["E501"]

# pdf_copy.py holds the 25-string risk-one-liner table and must keep
# each template one-line so f-string formatting works without manual
# concatenation. Same applies to pdf_questions.py's _SYSTEM constant
# (single Gemma system prompt; wrapping mid-token would change Gemma's
# tokenization) and pdf_export.py's glossary entries + risk-one-liner
# context strings. E501 suppressed for all three files.
"app/services/pdf_copy.py" = ["E501"]
"app/services/pdf_questions.py" = ["E501"]
"app/services/pdf_export.py" = ["E501"]

# career_description.py holds three Gemma system prompts (Tier A/B/C).
# Same logic as ask_gemma / pdf_questions: breaking these mid-line
# would change Gemma's tokenization and hurt prompt quality.
"app/services/career_description.py" = ["E501"]

# test_pdf_export.py: inline conditional expression in a tuple literal
# is an unavoidable single-line assert pattern; wrapping it would
# create a multi-line tuple that obscures the assertion intent.
"tests/routers/test_pdf_export.py" = ["E501"]

# test_ask_gemma_explain_receipt.py: inline JSON string in a few-shot
# fixture; same reasoning as app/services/ask_gemma.py above.
"tests/services/test_ask_gemma_explain_receipt.py" = ["E501"]
