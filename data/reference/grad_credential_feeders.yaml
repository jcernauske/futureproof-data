# Graduate/professional credential feeder programs.
# Used by the requires-graduate-credential chip bucket and pre-flag short-circuit.
# Each entry maps a credential (DPT, JD, etc.) to its SOC outcomes and the
# undergraduate CIP-4 families that commonly feed into it.

credentials:
  - credential_id: "dpt"
    credential_name_full: "Doctor of Physical Therapy"
    credential_acronym: "DPT"
    socs: ["29-1123"]
    feeder_cip4_codes:
      - cip4: "31.05"
        note: "Exercise Science — strong anatomy and physiology core"
      - cip4: "26.01"
        note: "Biology — covers all prerequisite sciences"
      - cip4: "51.22"
        note: "Public Health — population health perspective"
      - cip4: "26.09"
        note: "Physiology — deep dive into body systems"
      - cip4: "30.19"
        note: "Nutrition Sciences — health and wellness foundation"
      - cip4: "42.01"
        note: "Psychology — behavioral science and patient interaction"
      - cip4: "31.01"
        note: "Parks, Recreation, and Leisure — movement science track"
    context: >
      Physical therapists must earn a Doctor of Physical Therapy (DPT) from an
      accredited program (typically 3 years post-baccalaureate). Prerequisites
      include anatomy, physiology, biology, chemistry, physics, and psychology.
      Most applicants major in exercise science, biology, or a health-related field.

  - credential_id: "jd"
    credential_name_full: "Juris Doctor"
    credential_acronym: "JD"
    socs: ["23-1011"]
    feeder_cip4_codes:
      - cip4: "22.00"
        note: "Pre-Law/Legal Studies — direct pipeline"
      - cip4: "45.10"
        note: "Political Science — government and policy focus"
      - cip4: "38.01"
        note: "Philosophy — critical reasoning and argumentation"
      - cip4: "23.01"
        note: "English — strong writing and analysis skills"
      - cip4: "45.11"
        note: "Sociology — understanding social structures"
      - cip4: "52.02"
        note: "Business Administration — corporate law track"
      - cip4: "45.01"
        note: "Social Sciences — broad analytical foundation"
    context: >
      Lawyers must earn a Juris Doctor (JD) from an ABA-accredited law school
      (3 years full-time) and pass the bar exam. There is no required undergrad
      major — law schools value strong writing, critical thinking, and analytical
      skills. Political science, philosophy, and English are popular feeders.

  - credential_id: "md"
    credential_name_full: "Doctor of Medicine"
    credential_acronym: "MD"
    socs: ["29-1215", "29-1216", "29-1217", "29-1218", "29-1221", "29-1223", "29-1224", "29-1228", "29-1229", "29-1241", "29-1242", "29-1243", "29-1249"]
    feeder_cip4_codes:
      - cip4: "26.01"
        note: "Biology — most common pre-med major"
      - cip4: "26.02"
        note: "Biochemistry — strong chemistry and biology overlap"
      - cip4: "40.05"
        note: "Chemistry — covers all pre-med chemistry prerequisites"
      - cip4: "26.09"
        note: "Physiology — deep body systems foundation"
      - cip4: "51.22"
        note: "Public Health — health systems perspective"
      - cip4: "42.01"
        note: "Psychology — behavioral science and patient interaction"
      - cip4: "30.01"
        note: "Biological and Physical Sciences — interdisciplinary"
    context: >
      Physicians must complete medical school (MD or DO, 4 years) followed by
      residency (3-7 years depending on specialty). Prerequisites include
      biology, general chemistry, organic chemistry, physics, biochemistry,
      and English. Any major can apply, but most pre-med students choose a
      science field to cover prerequisites naturally.

  - credential_id: "dds"
    credential_name_full: "Doctor of Dental Surgery"
    credential_acronym: "DDS"
    socs: ["29-1021"]
    feeder_cip4_codes:
      - cip4: "26.01"
        note: "Biology — covers core science prerequisites"
      - cip4: "26.02"
        note: "Biochemistry — strong chemistry and biology foundation"
      - cip4: "40.05"
        note: "Chemistry — prerequisite chemistry courses built in"
      - cip4: "51.22"
        note: "Public Health — community health perspective"
      - cip4: "26.09"
        note: "Physiology — detailed anatomical knowledge"
    context: >
      Dentists must earn a DDS or DMD from an accredited dental school (4 years)
      after completing undergraduate prerequisites in biology, chemistry, organic
      chemistry, physics, and biochemistry. Most successful applicants major in a
      biological or chemical science.

  - credential_id: "dvm"
    credential_name_full: "Doctor of Veterinary Medicine"
    credential_acronym: "DVM"
    socs: ["29-1131"]
    feeder_cip4_codes:
      - cip4: "01.09"
        note: "Animal Sciences — direct animal-focused curriculum"
      - cip4: "26.01"
        note: "Biology — broad science coverage"
      - cip4: "26.02"
        note: "Biochemistry — molecular biology foundation"
      - cip4: "26.07"
        note: "Zoology — animal biology specialization"
      - cip4: "40.05"
        note: "Chemistry — prerequisite courses included"
      - cip4: "01.00"
        note: "Agriculture — livestock and production animal focus"
    context: >
      Veterinarians must earn a DVM from an AVMA-accredited college of veterinary
      medicine (4 years). Prerequisites include biology, chemistry, organic
      chemistry, physics, biochemistry, and animal science coursework. Animal
      science and biology are the most common feeder majors.

  - credential_id: "pharmd"
    credential_name_full: "Doctor of Pharmacy"
    credential_acronym: "PharmD"
    socs: ["29-1051"]
    feeder_cip4_codes:
      - cip4: "26.01"
        note: "Biology — strong science prerequisite coverage"
      - cip4: "26.02"
        note: "Biochemistry — pharmaceutical chemistry foundation"
      - cip4: "40.05"
        note: "Chemistry — organic and general chemistry"
      - cip4: "51.22"
        note: "Public Health — health systems and epidemiology"
      - cip4: "26.09"
        note: "Physiology — pharmacology prerequisite base"
    context: >
      Pharmacists must earn a PharmD from an ACPE-accredited program (4 years,
      often entered after 2-3 years of undergraduate prerequisites). Required
      coursework includes biology, chemistry, organic chemistry, physics, calculus,
      and anatomy/physiology. Many pharmacy programs accept students after 2-3
      years of undergraduate work.

  - credential_id: "od"
    credential_name_full: "Doctor of Optometry"
    credential_acronym: "OD"
    socs: ["29-1041"]
    feeder_cip4_codes:
      - cip4: "26.01"
        note: "Biology — most common pre-optometry major"
      - cip4: "26.02"
        note: "Biochemistry — strong science overlap"
      - cip4: "40.05"
        note: "Chemistry — prerequisite chemistry built in"
      - cip4: "26.09"
        note: "Physiology — visual and neural systems"
      - cip4: "42.01"
        note: "Psychology — perception and cognition courses"
    context: >
      Optometrists must earn an OD from an ASCO-accredited school (4 years after
      undergraduate prerequisites). Prerequisites include biology, chemistry,
      organic chemistry, physics, calculus, and psychology. Biology and
      biochemistry are the most popular feeder majors.

  - credential_id: "msw"
    credential_name_full: "Master of Social Work"
    credential_acronym: "MSW"
    socs: ["21-1021", "21-1022"]
    feeder_cip4_codes:
      - cip4: "44.07"
        note: "Social Work — direct BSW-to-MSW pathway"
      - cip4: "42.01"
        note: "Psychology — behavioral science foundation"
      - cip4: "45.11"
        note: "Sociology — social systems understanding"
      - cip4: "44.00"
        note: "Human Services — community services focus"
      - cip4: "42.28"
        note: "Clinical Psychology — therapeutic skills"
    context: >
      Licensed clinical social workers (LCSWs) must earn a Master of Social Work
      from a CSWE-accredited program (2 years, or 1 year for BSW holders in
      advanced-standing programs). A BSW is the most direct feeder, but psychology
      and sociology are also common. Post-MSW supervised clinical hours are
      required for licensure.

  - credential_id: "ms-slp"
    credential_name_full: "Master of Science in Speech-Language Pathology"
    credential_acronym: "MS-SLP"
    socs: ["29-1127"]
    feeder_cip4_codes:
      - cip4: "51.02"
        note: "Communication Sciences and Disorders — direct pipeline"
      - cip4: "42.01"
        note: "Psychology — language development and cognition"
      - cip4: "16.01"
        note: "Linguistics — language structure and phonetics"
      - cip4: "13.10"
        note: "Special Education — working with communication needs"
      - cip4: "26.01"
        note: "Biology — anatomy and physiology prerequisites"
    context: >
      Speech-language pathologists must earn a master's degree (MS or MA) in
      speech-language pathology from a CAA-accredited program (2 years) and
      complete a supervised fellowship. Communication sciences and disorders
      (CSD) is the most direct undergraduate feeder, though leveling coursework
      makes other majors viable.

  - credential_id: "ms-counseling"
    credential_name_full: "Master of Science in Clinical Mental Health Counseling"
    credential_acronym: "MS-CMHC"
    socs: ["21-1014"]
    feeder_cip4_codes:
      - cip4: "42.01"
        note: "Psychology — most common and direct feeder"
      - cip4: "44.07"
        note: "Social Work — community mental health overlap"
      - cip4: "42.28"
        note: "Clinical Psychology — therapeutic orientation"
      - cip4: "44.00"
        note: "Human Services — applied helping professions"
      - cip4: "45.11"
        note: "Sociology — social context of mental health"
    context: >
      Licensed professional counselors (LPCs) must earn a master's degree in
      counseling (typically 60 credit hours, 2-3 years) from a CACREP-accredited
      program and complete 2,000-4,000 post-master's supervised clinical hours.
      Psychology is the most common undergraduate feeder.

  - credential_id: "mlis"
    credential_name_full: "Master of Library and Information Science"
    credential_acronym: "MLIS"
    socs: ["25-4022"]
    feeder_cip4_codes:
      - cip4: "23.01"
        note: "English — literature and research skills"
      - cip4: "45.01"
        note: "Social Sciences — research methodology"
      - cip4: "54.01"
        note: "History — archival and research expertise"
      - cip4: "09.01"
        note: "Communication — information dissemination"
      - cip4: "11.01"
        note: "Computer Science — data and systems management"
    context: >
      Librarians must earn an MLIS (or equivalent) from an ALA-accredited program
      (1-2 years). There is no required undergraduate major — library schools
      welcome all backgrounds. English, history, and education are traditional
      feeders, while computer science is increasingly valued for digital services.

  - credential_id: "ms-pa"
    credential_name_full: "Master of Science in Physician Assistant Studies"
    credential_acronym: "MS-PA"
    socs: ["29-1071"]
    feeder_cip4_codes:
      - cip4: "26.01"
        note: "Biology — covers most prerequisite sciences"
      - cip4: "51.22"
        note: "Public Health — health systems perspective"
      - cip4: "26.02"
        note: "Biochemistry — molecular and clinical overlap"
      - cip4: "26.09"
        note: "Physiology — deep body systems knowledge"
      - cip4: "31.05"
        note: "Exercise Science — anatomy and patient care orientation"
      - cip4: "42.01"
        note: "Psychology — behavioral health and patient interaction"
    context: >
      Physician assistants must earn a master's degree from an ARC-PA accredited
      PA program (typically 27 months) and pass the PANCE. Prerequisites include
      biology, chemistry, organic chemistry, anatomy, physiology, microbiology,
      and patient care hours. Biology and health sciences are the most common
      feeder majors.
